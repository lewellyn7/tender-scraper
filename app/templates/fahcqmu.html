{% extends "base.html" %}
{% block title %}重医附一院 · 采集系统{% endblock %}
{% block content %}

<!-- 头部 + 健康检查 -->
<div class="flex items-center justify-between mb-6">
    <div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">🏥 重医附一院</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
            来源: <a href="https://www.fahcqmu.cn" target="_blank" class="text-blue-600 dark:text-blue-400 hover:underline">fahcqmu.cn</a>
            · 7 分类 · 每日 21:00 自动采集
        </p>
    </div>
    <div class="flex items-center gap-2">
        <div id="health-dot" class="w-2 h-2 rounded-full bg-gray-300"></div>
        <span class="text-xs text-gray-500 dark:text-gray-400" id="health-label">检测中…</span>
    </div>
</div>

<!-- 统计卡片 (4 张) -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 px-4 py-3">
        <p class="text-xs text-gray-500 dark:text-gray-400">总项目数</p>
        <p class="text-2xl font-semibold text-gray-900 dark:text-white mt-1" id="stat-total">—</p>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 px-4 py-3">
        <p class="text-xs text-gray-500 dark:text-gray-400">信息数据处</p>
        <p class="text-2xl font-semibold text-blue-600 dark:text-blue-400 mt-1" id="stat-xxsjc">—</p>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 px-4 py-3">
        <p class="text-xs text-gray-500 dark:text-gray-400">总务处</p>
        <p class="text-2xl font-semibold text-emerald-600 dark:text-emerald-400 mt-1" id="stat-zongwu">—</p>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 px-4 py-3">
        <p class="text-xs text-gray-500 dark:text-gray-400">其他</p>
        <p class="text-2xl font-semibold text-gray-600 dark:text-gray-400 mt-1" id="stat-qt">—</p>
    </div>
</div>

<!-- 筛选栏 -->
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 p-4 mb-6">
    <div class="flex flex-wrap items-center gap-3">
        <input id="kw" type="text" placeholder="关键词 (title / content_preview)" class="flex-1 min-w-[200px] px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg text-sm" />

        <select id="orgUnit" class="px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg text-sm">
            <option value="">全部部门</option>
            <option value="信息数据处">信息数据处</option>
            <option value="总务处">总务处</option>
            <option value="其他">其他</option>
        </select>

        <select id="infoType" class="px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg text-sm">
            <option value="">全部类型</option>
            <option value="ygtjgg">阳光推介</option>
            <option value="dygg">调研公告</option>
            <option value="cggg">采购公告</option>
            <option value="cgjggs">采购结果 (信息处)</option>
            <option value="jggs">采购结果 (总务处)</option>
            <option value="qt">其他</option>
        </select>

        <input type="date" id="dateStart" class="px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg text-sm" title="起始日期" />
        <span class="text-gray-500">→</span>
        <input type="date" id="dateEnd" class="px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg text-sm" title="结束日期" />

        <button id="btnSearch" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium">搜索</button>
        <button id="btnClear" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg text-sm">清除</button>
    </div>
</div>

<!-- 项目列表 -->
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
    <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-700 flex items-center justify-between">
        <h2 class="text-sm font-semibold text-gray-900 dark:text-white">项目列表 <span class="text-gray-400 ml-1" id="list-count">(—)</span></h2>
        <div class="flex items-center gap-2">
            <button id="btnPrev" class="px-2 py-1 text-xs rounded bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 disabled:opacity-30" disabled>← 上一页</button>
            <span class="text-xs text-gray-500" id="page-info">第 1 页</span>
            <button id="btnNext" class="px-2 py-1 text-xs rounded bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 disabled:opacity-30" disabled>下一页 →</button>
        </div>
    </div>

    <div id="project-list" class="divide-y divide-gray-100 dark:divide-gray-700">
        <div class="px-4 py-12 text-center text-gray-400 text-sm">加载中…</div>
    </div>
</div>

<!-- 详情模态框 -->
<div id="detail-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onclick="if(event.target===this)closeDetail()">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-3xl w-full max-h-[85vh] overflow-y-auto">
        <div class="sticky top-0 bg-white dark:bg-gray-800 border-b border-gray-100 dark:border-gray-700 px-6 py-4 flex items-center justify-between">
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white" id="detail-title">详情</h3>
            <button onclick="closeDetail()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-2xl leading-none">&times;</button>
        </div>
        <div class="px-6 py-4" id="detail-body">
            <p class="text-gray-400 text-sm">加载中…</p>
        </div>
        <div class="px-6 py-3 border-t border-gray-100 dark:border-gray-700 flex justify-end">
            <a id="detail-link" href="#" target="_blank" rel="noopener" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium">打开原文 ↗</a>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';

    var state = {
        page: 1,
        pageSize: 20,
        keyword: '',
        orgUnit: '',
        infoType: '',
        dateStart: '',
        dateEnd: '',
        total: 0,
    };

    function getAuthHeaders() {
        var t = (document.cookie.match(/(?:^|; )session_token=([^;]+)/) || [])[1] || '';
        return t ? {'X-Session-Token': t} : {};
    }

    function formatDate(s) {
        if (!s) return '—';
        return s.substring(0, 10);
    }

    function infoTypeLabel(t) {
        return {
            'ygtjgg': '阳光推介', 'dygg': '调研公告', 'cggg': '采购公告',
            'cgjggs': '采购结果(信息处)', 'jggs': '采购结果(总务处)', 'qt': '其他'
        }[t] || t || '—';
    }

    function orgUnitColor(u) {
        if (u === '信息数据处') return 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300';
        if (u === '总务处') return 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300';
        return 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300';
    }

    // ── Health ──────────────────────────────────────────────────
    function loadHealth() {
        fetch('/api/fahcqmu/health', {headers: getAuthHeaders()})
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.status === 'ok') {
                    document.getElementById('health-dot').className = 'w-2 h-2 rounded-full bg-emerald-500';
                    var lastStr = d.last_scraped_at ? d.last_scraped_at.substring(0, 16).replace('T', ' ') : '—';
                    document.getElementById('health-label').textContent = '共 ' + d.total_rows + ' 条 · 最近 ' + lastStr;
                } else {
                    document.getElementById('health-dot').className = 'w-2 h-2 rounded-full bg-red-500';
                    document.getElementById('health-label').textContent = '异常: ' + (d.error || 'unknown');
                }
            })
            .catch(function() {
                document.getElementById('health-dot').className = 'w-2 h-2 rounded-full bg-red-500';
                document.getElementById('health-label').textContent = '请求失败';
            });
    }

    // ── Stats ───────────────────────────────────────────────────
    function loadStats() {
        fetch('/api/fahcqmu/stats', {headers: getAuthHeaders()})
            .then(function(r) { return r.json(); })
            .then(function(d) {
                document.getElementById('stat-total').textContent = d.total || 0;
                document.getElementById('stat-xxsjc').textContent = (d.by_org_unit || {})['信息数据处'] || 0;
                document.getElementById('stat-zongwu').textContent = (d.by_org_unit || {})['总务处'] || 0;
                document.getElementById('stat-qt').textContent = (d.by_org_unit || {})['其他'] || 0;
            })
            .catch(function() {});
    }

    // ── List ────────────────────────────────────────────────────
    function loadList() {
        var params = new URLSearchParams();
        params.set('page', state.page);
        params.set('page_size', state.pageSize);
        if (state.keyword) params.set('keyword', state.keyword);
        if (state.orgUnit) params.set('org_unit', state.orgUnit);
        if (state.infoType) params.set('info_type', state.infoType);
        if (state.dateStart) params.set('date_start', state.dateStart);
        if (state.dateEnd) params.set('date_end', state.dateEnd);

        var listEl = document.getElementById('project-list');
        listEl.innerHTML = '<div class="px-4 py-12 text-center text-gray-400 text-sm">加载中…</div>';

        fetch('/api/fahcqmu/projects?' + params.toString(), {headers: getAuthHeaders()})
            .then(function(r) { return r.json(); })
            .then(function(d) {
                state.total = d.total || 0;
                document.getElementById('list-count').textContent = '(共 ' + state.total + ' 条)';
                document.getElementById('page-info').textContent = '第 ' + state.page + ' 页';
                document.getElementById('btnPrev').disabled = state.page <= 1;
                document.getElementById('btnNext').disabled = !d.has_more;

                var items = d.items || [];
                if (items.length === 0) {
                    listEl.innerHTML = '<div class="px-4 py-12 text-center text-gray-400 text-sm">无数据</div>';
                    return;
                }

                var html = '';
                items.forEach(function(p) {
                    html += '<div class="px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-700/30 cursor-pointer" onclick="openDetail(\'' + (p.url || '').replace(/'/g, "\\'") + '\')">'
                        + '<div class="flex items-start justify-between gap-3">'
                        + '<div class="flex-1 min-w-0">'
                        + '<div class="flex items-center gap-2 mb-1">'
                        + '<span class="inline-block px-1.5 py-0.5 rounded text-xs ' + orgUnitColor(p.org_unit) + '">' + (p.org_unit || '—') + '</span>'
                        + '<span class="inline-block px-1.5 py-0.5 rounded text-xs bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300">' + infoTypeLabel(p.info_type) + '</span>'
                        + (p.budget ? '<span class="text-xs text-orange-600 dark:text-orange-400">💰 ' + p.budget + '</span>' : '')
                        + '</div>'
                        + '<h3 class="text-sm font-medium text-gray-900 dark:text-white truncate">' + (p.title || '(无标题)') + '</h3>'
                        + (p.content_preview ? '<p class="text-xs text-gray-500 dark:text-gray-400 mt-1 line-clamp-2">' + p.content_preview.substring(0, 200) + '</p>' : '')
                        + '</div>'
                        + '<div class="text-right text-xs text-gray-500 dark:text-gray-400 flex-shrink-0">'
                        + '<div>' + formatDate(p.publish_date) + '</div>'
                        + '<div class="text-gray-400 mt-1">' + formatDate(p.scraped_at) + '</div>'
                        + '</div>'
                        + '</div>'
                        + '</div>';
                });
                listEl.innerHTML = html;
            })
            .catch(function(e) {
                listEl.innerHTML = '<div class="px-4 py-12 text-center text-red-400 text-sm">加载失败: ' + e.message + '</div>';
            });
    }

    // ── Detail modal ────────────────────────────────────────────
    window.openDetail = function(url) {
        if (!url) return;
        document.getElementById('detail-modal').classList.remove('hidden');
        document.getElementById('detail-link').href = url;
        document.getElementById('detail-body').innerHTML = '<p class="text-gray-400 text-sm">加载中…</p>';
        document.getElementById('detail-title').textContent = '详情';

        fetch('/api/fahcqmu/project/' + encodeURIComponent(url), {headers: getAuthHeaders()})
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.error) {
                    document.getElementById('detail-body').innerHTML = '<p class="text-red-500 text-sm">' + d.error + '</p>';
                    return;
                }
                document.getElementById('detail-title').textContent = d.title || '(无标题)';
                // 关键 metadata 顶部行内徽章 — 不再用 2-col 表格 (#28357)
                var meta = ''
                    + '<div class="flex flex-wrap items-center gap-2 mb-4 pb-3 border-b border-gray-100 dark:border-gray-700 text-xs">'
                    + (d.org_unit ? '<span class="inline-flex items-center px-2 py-1 rounded bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300">🏢 ' + d.org_unit + '</span>' : '')
                    + '<span class="inline-flex items-center px-2 py-1 rounded bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300">' + (infoTypeLabel(d.info_type) || '—') + '</span>'
                    + (d.budget ? '<span class="inline-flex items-center px-2 py-1 rounded bg-orange-100 text-orange-700 dark:bg-orange-900/40 dark:text-orange-300">💰 ' + d.budget + '</span>' : '')
                    + (d.publish_date ? '<span class="inline-flex items-center px-2 py-1 rounded bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300">🗓 发布 ' + formatDate(d.publish_date) + '</span>' : '')
                    + (d.contact_name ? '<span class="inline-flex items-center px-2 py-1 rounded bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300">👤 ' + d.contact_name + (d.contact_phone ? ' · ' + d.contact_phone : '') + '</span>' : '')
                    + '</div>';
                // 完整内容 — 纯文本流 + 滚动条 (#28357 去表格 / #28443 加滚动)
                var content = d.full_content || d.content_preview || '';
                var body = meta
                    + (content
                        ? '<div class="text-sm text-gray-700 dark:text-gray-300 whitespace-pre-wrap leading-relaxed max-h-[60vh] overflow-y-auto pr-2">' + content + '</div>'
                        : '<p class="text-gray-400 text-sm">无内容</p>');
                document.getElementById('detail-body').innerHTML = body;
            })
            .catch(function(e) {
                document.getElementById('detail-body').innerHTML = '<p class="text-red-500 text-sm">加载失败: ' + e.message + '</p>';
            });
    };

    window.closeDetail = function() {
        document.getElementById('detail-modal').classList.add('hidden');
    };

    // ── Event bindings ──────────────────────────────────────────
    document.getElementById('btnSearch').onclick = function() {
        state.keyword = document.getElementById('kw').value.trim();
        state.orgUnit = document.getElementById('orgUnit').value;
        state.infoType = document.getElementById('infoType').value;
        state.dateStart = document.getElementById('dateStart').value;
        state.dateEnd = document.getElementById('dateEnd').value;
        state.page = 1;
        loadList();
    };

    document.getElementById('btnClear').onclick = function() {
        document.getElementById('kw').value = '';
        document.getElementById('orgUnit').value = '';
        document.getElementById('infoType').value = '';
        document.getElementById('dateStart').value = '';
        document.getElementById('dateEnd').value = '';
        state.keyword = state.orgUnit = state.infoType = state.dateStart = state.dateEnd = '';
        state.page = 1;
        loadList();
    };

    document.getElementById('btnPrev').onclick = function() {
        if (state.page > 1) { state.page--; loadList(); }
    };
    document.getElementById('btnNext').onclick = function() {
        state.page++; loadList();
    };

    document.getElementById('kw').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('btnSearch').click();
    });

    // ESC 关模态框
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeDetail();
    });

    // ── Init ────────────────────────────────────────────────────
    loadHealth();
    loadStats();
    loadList();
})();
</script>

{% endblock %}
