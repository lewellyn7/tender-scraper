<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- Inline theme script — runs BEFORE any paint to prevent flash -->
    <script>
        (function() {
            var saved = localStorage.getItem('theme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            var theme = saved || (prefersDark ? 'dark' : 'light');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

<style>
/* Tooltip气泡 - 不遮挡按钮 */
.help-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 50%;
  background: #d1d5db; color: #6b7280; font-size: 11px; font-weight: 700;
  cursor: help; line-height: 1; flex-shrink: 0;
  transition: background 0.2s, color 0.2s;
  border: none; padding: 0; font-family: inherit;
}
.help-btn:hover { background: #9ca3af; color: #374151; }

/* 标题中的help按钮使用flex gap推开，不遮挡文字 */
h1 .help-btn, h2 .help-btn { margin-left: 6px; }

/* Tooltip主体 */
[data-tooltip] { position: relative; display: inline-flex; align-items: center; }
/* 箭头 */
[data-tooltip]::before {
  content: ''; position: absolute; bottom: calc(100% + 5px); left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent; border-top-color: #1f2937;
  opacity: 0; transition: opacity 0.15s; pointer-events: none;
}
/* 气泡内容 */
[data-tooltip]::after {
  content: attr(data-tooltip);
  position: absolute; bottom: calc(100% + 12px); left: 50%; transform: translateX(-50%);
  background: #1f2937; color: #f3f4f6; font-size: 13px; font-weight: 400;
  padding: 10px 14px; border-radius: 8px;
  white-space: pre-line; max-width: 320px; min-width: 200px;
  pointer-events: none; opacity: 0; visibility: hidden;
  transition: opacity 0.15s 0.1s, visibility 0.15s 0.1s;
  z-index: 9999; line-height: 1.6;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  text-align: left;
}
[data-tooltip]:hover::after,
[data-tooltip]:hover::before { opacity: 1; visibility: visible; }

/* 统计数字旁的help按钮更小 */
.stat-help {
  width: 14px; height: 14px; font-size: 9px;
  background: transparent; color: #9ca3af;
}
.stat-help:hover { background: #e5e7eb; color: #6b7280; }
</style>

    <!-- ========== STATE (vanilla JS, no Alpine) ========== -->
    <script>
        // User state
        window.AppState = {
            user: {
                role: '{{ user_info.role if user_info else "guest" }}',
                username: '{{ user_info.username if user_info else "" }}',
                display_name: '{{ user_info.display_name if user_info else "" }}'
            },
            nav: { mobileOpen: false },
            theme: localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        };

        // ── Common Helpers (must load before page scripts) ──────────────────────
        function $(id) { return document.getElementById(id); }
        function escapeHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }
        function authHeaders() {
            var t = localStorage.getItem('session_token');
            var headers = t ? {'X-Session-Token': t} : {};
            var csrf = getCookie('csrf_token');
            if (csrf) headers['X-CSRF-Token'] = csrf;
            return headers;
        }
        function authFetch(u, o) {
            o = o || {};
            var headers = Object.assign({'Content-Type': 'application/json'}, authHeaders(), o.headers || {});
            return fetch(u, Object.assign({headers: headers}, o));
        }
        function show(el) { if (el) el.classList.remove('hidden'); }
        function hide(el) { if (el) el.classList.add('hidden'); }
        function toggle(el, visible) { if (el) el.classList.toggle('hidden', !visible); }

        // ── Toast helper ───────────────────────────────────────────────────────
        function showToast(msg, type) {
            type = type || 'success';
            var container = document.getElementById('toastContainer');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toastContainer';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            var el = document.createElement('div');
            el.className = 'toast-message toast-' + type;
            el.textContent = msg;
            container.appendChild(el);
            setTimeout(function() {
                el.classList.add('toast-exit');
                setTimeout(function() { el.remove(); }, 300);
            }, 3000);
        }
        function escHtml(s) {
            if (s == null) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
    </script>

    <!-- ========== SCRIPTS ========== -->
    <script>
        // ── Theme toggle ───────────────────────────────────────────────
        function applyTheme(theme) {
            const isDark = theme === 'dark';
            document.documentElement.classList.toggle('dark', isDark);
            document.getElementById('iconSun').classList.toggle('hidden', !isDark);
            document.getElementById('iconMoon').classList.toggle('hidden', isDark);
            localStorage.setItem('theme', theme);
            window.AppState.theme = theme;
        }

        document.getElementById('themeToggle').addEventListener('click', function() {
            const next = window.AppState.theme === 'light' ? 'dark' : 'light';
            applyTheme(next);
        });

        // Apply initial theme icon state
        applyTheme(window.AppState.theme);

        // ── Session: localStorage token + server validation ───────────────
        function clearSession() {
            localStorage.removeItem('session_token');
            localStorage.removeItem('user_role');
            localStorage.removeItem('user_name');
            localStorage.removeItem('session_checked');
        }
        (async function restoreSession() {
            const token = localStorage.getItem('session_token');
            if (!token) { updateRoleVisibility(); return; }
            try {
                const r = await fetch('/api/users/me', {headers: {'X-Session-Token': token}});
                if (r.ok) {
                    const d = await r.json();
                    window.AppState.user = {role: d.role, username: d.username, display_name: d.display_name || d.username};
                    localStorage.setItem('user_role', d.role);
                    localStorage.setItem('user_name', d.username);
                } else {
                    clearSession();
                }
            } catch(e) { /* offline, keep localStorage state */ }
            updateRoleVisibility();
        })();

        // ── Role-based visibility ───────────────────────────────────────
        function updateRoleVisibility() {
            const role = window.AppState.user.role;
            const isGuest = role === 'guest';

            // User badge / login link
            document.getElementById('userBadge').classList.toggle('hidden', isGuest);
            document.getElementById('loginLink').classList.toggle('hidden', !isGuest);
            if (!isGuest) {
                document.getElementById('userDisplayName').textContent =
                    window.AppState.user.display_name || window.AppState.user.username;
                document.getElementById('userRoleBadge').textContent = role;
            }
        }

        // ── Active nav highlighting ────────────────────────────────────
        document.addEventListener('DOMContentLoaded', function() {
            updateRoleVisibility();

            const path = window.location.pathname;
            document.querySelectorAll('.nav-link').forEach(function(link) {
                const href = link.getAttribute('href');
                if (href === path) {
                    link.classList.add('text-blue-600', 'dark:text-blue-400', 'bg-blue-50', 'dark:bg-blue-900/30');
                } else {
                    link.classList.add(
                        'text-gray-500', 'dark:text-gray-400', 'hover:text-gray-700', 'dark:hover:text-gray-200',
                        'hover:bg-gray-50', 'dark:hover:bg-gray-700/30'
                    );
                }
            });
        });

        // ── Mobile nav toggle ───────────────────────────────────────────
        document.getElementById('mobileMenuToggle').addEventListener('click', function() {
            const mobileNav = document.getElementById('mobileNav');
            const isOpen = !mobileNav.classList.contains('hidden');
            mobileNav.classList.toggle('hidden', isOpen);
            document.getElementById('iconHamburger').classList.toggle('hidden', !isOpen);
            document.getElementById('iconClose').classList.toggle('hidden', isOpen);
            window.AppState.nav.mobileOpen = !isOpen;
        });

        // ── Back to top button ─────────────────────────────────────────
        (function() {
            const btn = document.getElementById('backToTop');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 300) {
                    btn.classList.remove('opacity-0', 'pointer-events-none');
                } else {
                    btn.classList.add('opacity-0', 'pointer-events-none');
                }
            });
            btn.addEventListener('click', function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        })();

    </script>

    <!-- ========== Command Palette (Linear Cmd+K) ========== -->
    <div id="cmd-palette" class="fixed inset-0 z-[9999] hidden" role="dialog" aria-modal="true">
      <!-- Backdrop (above sticky nav z-40, below dialog) -->
      <div id="cmd-backdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm z-[45]"></div>
      <!-- Dialog (highest z) -->
      <div class="absolute top-[15vh] left-1/2 -translate-x-1/2 w-full max-w-xl z-[9999]">
        <div class="bg-[#1a1a1f] border border-white/10 rounded-2xl shadow-2xl overflow-hidden ring-1 ring-white/5"
             style="animation: cmdOpen 150ms ease-out">
          <!-- Search input -->
          <div class="flex items-center border-b border-white/8">
            <svg class="w-4 h-4 ml-4 text-gray-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input id="cmd-input" type="text" placeholder="搜索页面、触发采集..."
              class="w-full bg-transparent px-4 py-4 text-base text-white placeholder-gray-500 outline-none border-none">
            <kbd class="mr-4 px-2 py-1 text-xs text-gray-400 bg-white/10 rounded">Esc</kbd>
          </div>
          <!-- Results -->

            <!-- Populated by JS -->

            <span><kbd class="px-1.5 py-0.5 bg-white/10 rounded text-gray-400">↑↓</kbd> 导航</span>
            <span><kbd class="px-1.5 py-0.5 bg-white/10 rounded text-gray-400">↵</kbd> 确认</span>
            <span><kbd class="px-1.5 py-0.5 bg-white/10 rounded text-gray-400">Esc</kbd> 关闭</span>
          </div>

    <style>
    @keyframes cmdOpen {
      from { opacity: 0; transform: translate-x(-50%) scale(0.96); }
      to   { opacity: 1; transform: translate-x(-50%) scale(1); }
    }
    #cmd-palette:not(.hidden) { display: flex; }
    </style>

    <script>
    (function() {
      var palette = document.getElementById('cmd-palette');
      var input   = document.getElementById('cmd-input');
      var results = document.getElementById('cmd-results');

      var commands = [
        { group: 'Recent', items: [
          { label: 'Dashboard',    href: '/',                    icon: '◈' },
          { label: '采集内容',     href: '/data',                icon: '◈' },
          { label: '收藏夹',       href: '/favorites',            icon: '◈' },
        ]},
        { group: 'Pages', items: [
          { label: '仪表盘',       href: '/',                    icon: '◈' },
          { label: '数据管理',     href: '/data',                icon: '◈' },
          { label: '收藏夹',       href: '/favorites',            icon: '◈' },
          { label: '数据分析',     href: '/analytics',           icon: '◈' },
          { label: '任务管理',     href: '/tasks',               icon: '◈' },
          { label: '设置',         href: '/settings',            icon: '◈' },
          { label: '日志',         href: '/logs',                icon: '◈' },
        ]},
        { group: 'Actions', items: [
          { label: '触发采集',     href: '/api/collect',          icon: '▸', action: 'collect' },
          { label: '刷新页面',     href: '#',                    icon: '↻', action: 'refresh' },
          { label: '快捷键帮助',   href: '#',                    icon: '?',  action: 'shortcuts' },
        ]},
      ];

      var selectedIdx = -1;

      function render(q) {
        q = q.toLowerCase();
        var html = '';
        var globalIdx = 0;
        commands.forEach(function(g) {
          var matched = g.items.filter(function(i) {
            return !q || i.label.toLowerCase().includes(q);
          });
          if (!matched.length) return;
          html += '<div class="px-3 py-1.5 text-xs font-medium text-gray-500 uppercase tracking-wider">' + g.group + '</div>';
          matched.forEach(function(item) {
            var active = globalIdx === selectedIdx ? ' bg-white/8' : '';
            html += '<a href="' + item.href + '" class="cmd-item flex items-center gap-3 px-3 py-2.5 text-sm text-gray-200 hover:bg-white/5 cursor-pointer' + active + '"' +
                    (item.action ? ' data-action="' + item.action + '"' : '') + '>' +
                    '<span class="text-gray-500 w-4 text-center flex-shrink-0">' + item.icon + '</span>' +
                    '<span class="flex-1">' + item.label + '</span>' +
                    '<span class="text-xs text-gray-600">' + (item.href.startsWith('/') && item.href !== '#' ? item.href : '') + '</span>' +
                    '</a>';
            globalIdx++;
          });
        });
        if (!html) {
          html = '<div class="px-4 py-8 text-center text-sm text-gray-500">No results for "' + escHtml(q) + '"</div>';
        }
        results.innerHTML = html;
        selectedIdx = -1;
      }

      function open() {
        palette.classList.remove('hidden');
        input.value = '';
        render('');
        input.focus();
      }

      function close() {
        palette.classList.add('hidden');
        input.value = '';
      }

      function navigate(dir) {
        var items = results.querySelectorAll('.cmd-item');
        if (!items.length) return;
        if (selectedIdx >= 0) items[selectedIdx].classList.remove('bg-white/8');
        selectedIdx = Math.max(0, Math.min(items.length - 1, selectedIdx + dir));
        items[selectedIdx].classList.add('bg-white/8');
        items[selectedIdx].scrollIntoView({ block: 'nearest' });
      }

      function execute() {
        var active = results.querySelector('.bg-white\/8');
        if (!active) {
          var first = results.querySelector('.cmd-item');
          if (first) active = first;
        }
        if (active) {
          var action = active.dataset.action;
          if (action === 'refresh') { window.location.reload(); return; }
          if (action === 'collect')  { window.location.href = '/api/collect'; return; }
          if (action === 'shortcuts') { alert('⌘K: 命令面板\nG D: Dashboard\nC: 采集\n/: 搜索\n?: 帮助'); return; }
          window.location.href = active.href;
        }
        close();
      }

      // Keyboard
      document.addEventListener('keydown', function(e) {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); open(); }
        if (e.key === 'Escape') { close(); }
        if (e.key === 'ArrowDown') { e.preventDefault(); navigate(1); }
        if (e.key === 'ArrowUp')   { e.preventDefault(); navigate(-1); }
        if (e.key === 'Enter')     { e.preventDefault(); execute(); }
      });

      // Backdrop click
      document.getElementById('cmd-backdrop').addEventListener('click', close);

      // Search input
      input.addEventListener('input', function(e) { render(e.target.value); });

      // Init
      render('');
    })();
    </script>
</body>
</html>
