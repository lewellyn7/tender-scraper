<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- Inline theme script — runs BEFORE any paint to prevent flash -->
    <script>
        (function() {
            var saved = localStorage.getItem('theme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            var theme = saved || (prefersDark ? 'dark' : 'light');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}招投标采集系统{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">

    <!-- Tailwind CSS (local build) -->
    <link rel="stylesheet" href="/static/css/tailwind-built.css">

    <!-- Shared stylesheet -->
    <link rel="stylesheet" href="/static/css/app.css">

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-200">

    <!-- ========== STATE (vanilla JS, no Alpine) ========== -->
    <script>
        // User state
        window.AppState = {
            user: {
                role: '{{ user_info.role if user_info else "guest" }}',
                username: '{{ user_info.username if user_info else "" }}',
                display_name: '{{ user_info.display_name if user_info else "" }}'
            },
            nav: { mobileOpen: false },
            theme: localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        };

        // ── Common Helpers (must load before page scripts) ──────────────────────
        function $(id) { return document.getElementById(id); }
        function escapeHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
        function authHeaders() {
            var t = localStorage.getItem('session_token');
            return t ? {'X-Session-Token': t} : {};
        }
        function authFetch(u, o) {
            return fetch(u, Object.assign({headers: Object.assign({'Content-Type': 'application/json'}, authHeaders())}, o || {}));
        }
        function show(el) { if (el) el.classList.remove('hidden'); }
        function hide(el) { if (el) el.classList.add('hidden'); }
        function toggle(el, visible) { if (el) el.classList.toggle('hidden', !visible); }

        // ── Toast helper ───────────────────────────────────────────────────────
        function showToast(msg, type) {
            type = type || 'success';
            var container = document.getElementById('toastContainer');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toastContainer';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            var el = document.createElement('div');
            el.className = 'toast-message toast-' + type;
            el.textContent = msg;
            container.appendChild(el);
            setTimeout(function() {
                el.classList.add('toast-exit');
                setTimeout(function() { el.remove(); }, 300);
            }, 3000);
        }
        function showMascotToast() {
            showToast('你好！我是 Jarvis！有事随时叫我 🦞', 'info');
        }
    </script>

    <!-- ========== NAVBAR ========== -->
    <nav class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center min-w-0">
                    <a href="/data" class="flex items-center gap-2 flex-shrink-0">
                        <span class="text-2xl">📊</span>
                        <span class="hidden sm:block text-xl font-bold text-gray-900 dark:text-white tracking-tight">招投标采集</span>
                    </a>
                    <!-- Desktop nav links -->
                    <div class="hidden md:flex md:ml-6 md:space-x-0.5">
                        <a href="/data" class="nav-link nav-link--desk">📋<span class="nav-label">采集内容</span></a>
                        <a href="/content" class="nav-link nav-link--desk">💾<span class="nav-label">数据管理</span></a>
                        <a href="/favorites" class="nav-link nav-link--desk">⭐<span class="nav-label">收藏</span></a>
                        <a href="/analytics" class="nav-link nav-link--desk">📈<span class="nav-label">分析</span></a>
                        <a href="/nl-query" class="nav-link nav-link--desk">🔍<span class="nav-label">智能查询</span></a>
                        <a href="/qualifications" class="nav-link nav-link--desk">📜<span class="nav-label">资质管理</span></a>
                        <a href="/logs" class="nav-link nav-link--desk">📋<span class="nav-label">日志</span></a>
                        <a href="/documents/upload" class="nav-link nav-link--desk">📎<span class="nav-label">文档上传</span></a>
                        <a href="/settings" class="nav-link nav-link--desk">⚙️<span class="nav-label">设置</span></a>
                    </div>
                </div>

                <!-- Right cluster -->
                <div class="flex items-center gap-2 sm:gap-3">
                    <!-- User badge (logged in) -->
                    <div id="userBadge" class="hidden sm:flex items-center gap-1.5 px-2.5 py-1 bg-blue-50 dark:bg-blue-900/30 rounded-full">
                        <span id="userDisplayName" class="text-xs font-medium text-blue-600 dark:text-blue-400 truncate max-w-[80px]"></span>
                        <span id="userRoleBadge" class="text-xs px-1.5 py-0.5 bg-blue-200 dark:bg-blue-800 rounded text-blue-700 dark:text-blue-300"></span>
                    </div>
                    <!-- Login link (guest) -->
                    <a id="loginLink" href="/login"
                       class="hidden sm:inline-flex text-sm text-blue-600 hover:text-blue-500 font-medium">
                        登录 / 注册
                    </a>
                    <!-- Theme toggle -->
                    <button id="themeToggle"
                            class="p-2 rounded-md text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition"
                            title="切换主题" aria-label="切换明暗主题">
                        <!-- Sun (shown in dark mode) -->
                        <svg id="iconSun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                        <!-- Moon (shown in light mode) -->
                        <svg id="iconMoon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                    </button>
                    <!-- Mobile hamburger -->
                    <button id="mobileMenuToggle"
                            class="md:hidden p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition"
                            aria-label="打开菜单">
                        <svg id="iconHamburger" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                        <svg id="iconClose" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile bottom sheet nav -->
        <div id="mobileNav" class="md:hidden hidden border-t border-gray-100 dark:border-gray-700 py-3 px-4 space-y-1">
            <a href="/data" class="mobile-nav-item">📋 采集内容</a>
            <a href="/content" class="mobile-nav-item">💾 数据管理</a>
            <a href="/favorites" class="mobile-nav-item">⭐ 收藏</a>
            <a href="/analytics" class="mobile-nav-item">📈 分析</a>
            <a href="/nl-query" class="mobile-nav-item">🔍 智能查询</a>
            <a href="/qualifications" class="mobile-nav-item">📜 资质管理</a>
            <a href="/logs" class="mobile-nav-item">📋 日志</a>
            <a href="/documents/upload" class="mobile-nav-item">📎 文档上传</a>
            <a href="/settings" class="mobile-nav-item">⚙️ 设置</a>
        </div>
    </nav>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        {% include "partials/animations.html" %}
        {% block content %}{% endblock %}
    </main>

    <!-- ========== BACK TO TOP ========== -->
    <button id="backToTop"
            class="fixed bottom-6 right-6 p-3 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-lg hover:shadow-xl transition-all z-50 opacity-0 pointer-events-none"
            aria-label="回到顶部">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
        </svg>
    </button>

    <!-- ========== LIGHTWEIGHT SVG MASCOT (replaces 500KB Three.js) ========== -->
    <div id="mascot-container">
        <svg id="mascot-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" width="100" height="125">
            <!-- Ears -->
            <ellipse cx="42" cy="28" rx="11" ry="30" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"
                     transform="rotate(-8 42 28)"/>
            <ellipse cx="42" cy="30" rx="6" ry="20" fill="#fce7f3" transform="rotate(-8 42 30)"/>
            <ellipse cx="78" cy="28" rx="11" ry="30" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"
                     transform="rotate(8 78 28)"/>
            <ellipse cx="78" cy="30" rx="6" ry="20" fill="#fce7f3" transform="rotate(8 78 30)"/>
            <!-- Body -->
            <ellipse cx="60" cy="105" rx="38" ry="42" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
            <!-- Head -->
            <ellipse cx="60" cy="68" rx="30" ry="28" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
            <!-- Eyes -->
            <ellipse cx="48" cy="65" rx="6" ry="7" fill="#1e293b"/>
            <ellipse cx="72" cy="65" rx="6" ry="7" fill="#1e293b"/>
            <circle cx="50" cy="63" r="2.5" fill="#fff"/>
            <circle cx="74" cy="63" r="2.5" fill="#fff"/>
            <!-- Nose -->
            <ellipse cx="60" cy="75" rx="5" ry="3.5" fill="#f9a8d4"/>
            <!-- Mouth -->
            <path d="M52 80 Q60 87 68 80" stroke="#f472b6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <!-- Whiskers -->
            <line x1="15" y1="72" x2="43" y2="74" stroke="#d1d5db" stroke-width="1" stroke-linecap="round"/>
            <line x1="15" y1="78" x2="43" y2="78" stroke="#d1d5db" stroke-width="1" stroke-linecap="round"/>
            <line x1="77" y1="74" x2="105" y2="72" stroke="#d1d5db" stroke-width="1" stroke-linecap="round"/>
            <line x1="77" y1="78" x2="105" y2="78" stroke="#d1d5db" stroke-width="1" stroke-linecap="round"/>
            <!-- Front paws -->
            <ellipse cx="35" cy="120" rx="13" ry="9" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
            <ellipse cx="85" cy="120" rx="13" ry="9" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
            <!-- Feet -->
            <ellipse cx="40" cy="138" rx="17" ry="9" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
            <ellipse cx="80" cy="138" rx="17" ry="9" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
            <!-- Tail -->
            <circle cx="98" cy="108" r="12" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
        </svg>
    </div>

    <!-- ========== SCRIPTS ========== -->
    <script>
        // ── Theme toggle ───────────────────────────────────────────────
        function applyTheme(theme) {
            const isDark = theme === 'dark';
            document.documentElement.classList.toggle('dark', isDark);
            document.getElementById('iconSun').classList.toggle('hidden', !isDark);
            document.getElementById('iconMoon').classList.toggle('hidden', isDark);
            localStorage.setItem('theme', theme);
            window.AppState.theme = theme;
        }

        document.getElementById('themeToggle').addEventListener('click', function() {
            const next = window.AppState.theme === 'light' ? 'dark' : 'light';
            applyTheme(next);
        });

        // Apply initial theme icon state
        applyTheme(window.AppState.theme);

        // ── Session: localStorage token + server validation ───────────────
        function clearSession() {
            localStorage.removeItem('session_token');
            localStorage.removeItem('user_role');
            localStorage.removeItem('user_name');
            localStorage.removeItem('session_checked');
        }
        (async function restoreSession() {
            const token = localStorage.getItem('session_token');
            if (!token) { updateRoleVisibility(); return; }
            try {
                const r = await fetch('/api/users/me', {headers: {'X-Session-Token': token}});
                if (r.ok) {
                    const d = await r.json();
                    window.AppState.user = {role: d.role, username: d.username, display_name: d.display_name || d.username};
                    localStorage.setItem('user_role', d.role);
                    localStorage.setItem('user_name', d.username);
                } else {
                    clearSession();
                }
            } catch(e) { /* offline, keep localStorage state */ }
            updateRoleVisibility();
        })();

        // ── Role-based visibility ───────────────────────────────────────
        function updateRoleVisibility() {
            const role = window.AppState.user.role;
            const isGuest = role === 'guest';

            // User badge / login link
            document.getElementById('userBadge').classList.toggle('hidden', isGuest);
            document.getElementById('loginLink').classList.toggle('hidden', !isGuest);
            if (!isGuest) {
                document.getElementById('userDisplayName').textContent =
                    window.AppState.user.display_name || window.AppState.user.username;
                document.getElementById('userRoleBadge').textContent = role;
            }
        }

        // ── Active nav highlighting ────────────────────────────────────
        document.addEventListener('DOMContentLoaded', function() {
            updateRoleVisibility();

            const path = window.location.pathname;
            document.querySelectorAll('.nav-link').forEach(function(link) {
                const href = link.getAttribute('href');
                if (href === path) {
                    link.classList.add('text-blue-600', 'dark:text-blue-400', 'bg-blue-50', 'dark:bg-blue-900/30');
                } else {
                    link.classList.add(
                        'text-gray-500', 'dark:text-gray-400', 'hover:text-gray-700', 'dark:hover:text-gray-200',
                        'hover:bg-gray-50', 'dark:hover:bg-gray-700/30'
                    );
                }
            });
        });

        // ── Mobile nav toggle ───────────────────────────────────────────
        document.getElementById('mobileMenuToggle').addEventListener('click', function() {
            const mobileNav = document.getElementById('mobileNav');
            const isOpen = !mobileNav.classList.contains('hidden');
            mobileNav.classList.toggle('hidden', isOpen);
            document.getElementById('iconHamburger').classList.toggle('hidden', !isOpen);
            document.getElementById('iconClose').classList.toggle('hidden', isOpen);
            window.AppState.nav.mobileOpen = !isOpen;
        });

        // ── Back to top button ─────────────────────────────────────────
        (function() {
            const btn = document.getElementById('backToTop');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 300) {
                    btn.classList.remove('opacity-0', 'pointer-events-none');
                } else {
                    btn.classList.add('opacity-0', 'pointer-events-none');
                }
            });
            btn.addEventListener('click', function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        })();

        // ── Mascot bounce on click ─────────────────────────────────────
        (function() {
            const container = document.getElementById('mascot-container');
            const svg = document.getElementById('mascot-svg');
            container.addEventListener('click', function() {
                svg.classList.add('rabbit-bounce');
                showMascotToast();
                setTimeout(function() { svg.classList.remove('rabbit-bounce'); }, 750);
            });
        })();

    </script>
</body>
</html>
