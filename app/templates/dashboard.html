{% extends "base.html" %}
{% block title %}仪表盘 - 招投标采集系统{% endblock %}
{% block content %}
<div class="toast-container" id="toastContainer"></div>

<!-- Skeleton loader -->
<div id="skeletonLoader" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
    <div class="skeleton h-20 rounded-xl"></div>
    <div class="skeleton h-20 rounded-xl"></div>
    <div class="skeleton h-20 rounded-xl"></div>
    <div class="skeleton h-20 rounded-xl"></div>
</div>

<!-- 统计卡片（ClickHouse 风格 — 数字即主角） -->
<div class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 mb-6">
    <div class="bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-lg p-4 hover:bg-gray-50 dark:hover:bg-white/8 transition-colors duration-100 cursor-pointer">
        <div class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2">关键词匹配</div>
        <p id="statFiltered" class="text-5xl font-bold tracking-tight text-gray-900 dark:text-white">0</p>
        <div class="mt-2 flex items-center gap-1.5">
            <span class="w-2 h-2 rounded-full bg-emerald-400 flex-shrink-0"></span>
            <span class="text-xs text-gray-400">匹配项目</span>
        </div>
    </div>
    <div class="bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-lg p-4 hover:bg-gray-50 dark:hover:bg-white/8 transition-colors duration-100 cursor-pointer">
        <div class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2">来源站点</div>
        <p id="statSourceCount" class="text-5xl font-bold tracking-tight text-gray-900 dark:text-white">0</p>
        <div class="mt-2 flex items-center gap-1.5">
            <span class="w-2 h-2 rounded-full bg-blue-400 flex-shrink-0"></span>
            <span class="text-xs text-gray-400">活跃采集源</span>
        </div>
    </div>
    <div class="bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-lg p-4 hover:bg-gray-50 dark:hover:bg-white/8 transition-colors duration-100 cursor-pointer">
        <div class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2">最后运行</div>
        <p id="statLastRun" class="text-xl font-semibold text-gray-700 dark:text-gray-200 mt-1">-</p>
        <div class="mt-2 flex items-center gap-1.5">
            <span class="w-2 h-2 rounded-full bg-orange-400 flex-shrink-0"></span>
            <span class="text-xs text-gray-400">采集调度</span>
        </div>
    </div>
    <div class="bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-lg p-4 hover:bg-gray-50 dark:hover:bg-white/8 transition-colors duration-100 cursor-pointer">
        <div class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2">收藏项目</div>
        <p id="statFavorites" class="text-5xl font-bold tracking-tight text-gray-900 dark:text-white">-</p>
        <div class="mt-2 flex items-center gap-1.5">
            <span class="w-2 h-2 rounded-full bg-purple-400 flex-shrink-0"></span>
            <span class="text-xs text-gray-400">已收藏</span>
        </div>
    </div>
</div>

<!-- 站点健康状态栏 -->
<div id="healthBar" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
    <div class="flex items-center gap-3 bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 px-4 py-3">
        <div id="health-cqggzy" class="w-2 h-2 rounded-full bg-gray-300 flex-shrink-0"></div>
        <div class="min-w-0">
            <p class="text-xs text-gray-500 truncate">重庆公共资源</p>
            <p class="text-sm font-medium text-gray-900 dark:text-white truncate" id="health-cqggzy-label">检测中...</p>
        </div>
    </div>
    <div class="flex items-center gap-3 bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 px-4 py-3">
        <div id="health-ccgp" class="w-2 h-2 rounded-full bg-gray-300 flex-shrink-0"></div>
        <div class="min-w-0">
            <p class="text-xs text-gray-500 truncate">全国政府采购</p>
            <p class="text-sm font-medium text-gray-900 dark:text-white truncate" id="health-ccgp-label">检测中...</p>
        </div>
    </div>
    <div class="flex items-center gap-3 bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 px-4 py-3">
        <div id="health-db" class="w-2 h-2 rounded-full bg-gray-300 flex-shrink-0"></div>
        <div class="min-w-0">
            <p class="text-xs text-gray-500 truncate">数据库</p>
            <p class="text-sm font-medium text-gray-900 dark:text-white truncate" id="health-db-label">检测中...</p>
        </div>
    </div>
    <div class="flex items-center gap-3 bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 px-4 py-3">
        <div id="health-redis" class="w-2 h-2 rounded-full bg-gray-300 flex-shrink-0"></div>
        <div class="min-w-0">
            <p class="text-xs text-gray-500 truncate">缓存</p>
            <p class="text-sm font-medium text-gray-900 dark:text-white truncate" id="health-redis-label">检测中...</p>
        </div>
    </div>
</div>

<!-- 筛选栏 -->
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm mb-6 p-4 border border-gray-100 dark:border-gray-700">
    <div class="flex flex-wrap items-center gap-3">
        <span class="text-sm font-medium text-gray-600 dark:text-gray-300">类型：</span>
        <button id="filterAll" class="px-4 py-2 rounded-lg text-sm font-medium transition bg-blue-600 text-white">全部 (<span id="countAll">0</span>)</button>
        <button id="filterGov" class="px-4 py-2 rounded-lg text-sm font-medium transition bg-gray-200 text-gray-700">政府采购 (<span id="countGov">0</span>)</button>
        <button id="filterEng" class="px-4 py-2 rounded-lg text-sm font-medium transition bg-gray-200 text-gray-700">工程招投标 (<span id="countEng">0</span>)</button>

        <div class="h-6 w-px bg-gray-300 mx-2"></div>

        <span class="text-sm font-medium text-gray-700">日期：</span>
        <input type="date" id="dateStart" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
        <span class="text-gray-500">至</span>
        <input type="date" id="dateEnd" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
        <button id="clearDateFilter" class="px-3 py-2 text-sm text-gray-500 hover:text-gray-700 border border-gray-300 rounded-lg">清除</button>

        <div class="h-6 w-px bg-gray-300 mx-2"></div>

        <span class="text-sm font-medium text-gray-700">快速选择：</span>
        <button id="presetToday" class="px-3 py-1 text-xs rounded-lg bg-gray-200 text-gray-700">今天</button>
        <button id="preset3days" class="px-3 py-1 text-xs rounded-lg bg-gray-200 text-gray-700">近3天</button>
        <button id="preset7days" class="px-3 py-1 text-xs rounded-lg bg-gray-200 text-gray-700">近7天</button>
        <button id="preset30days" class="px-3 py-1 text-xs rounded-lg bg-gray-200 text-gray-700">近30天</button>
    </div>
</div>

<!-- 来源分组渲染容器 -->
<div id="sourceGroups"></div>

<script>
(function() {
    var projects = [];
    var bySource = {};
    var filterType = 'all';
    var dateStart = '';
    var dateEnd = '';
    var dateRangePreset = null;
    var impPageSize = 6;
    var impPages = {};  // { sourceName: pageNumber }

    // ── Init ──────────────────────────────────────────────────────────
    function initData() {
        document.getElementById('skeletonLoader').style.display = 'grid';
        fetch('/api/projects?page_size=1000', {headers: authHeaders()})
            .then(function(res) { return res.json(); })
            .then(function(data) {
                projects = data.data || data.projects || [];
                document.getElementById('skeletonLoader').style.display = 'none';
                updateStats({
                    total: data.total || 0,
                    filtered: data.filtered || data.total || 0,
                    last_run: data.last_run || '-'
                });
                processBySource();
                bindFilterCounts();
            })
            .catch(function(e) {
                console.error('加载数据失败:', e);
                document.getElementById('skeletonLoader').style.display = 'none';
            });
    }

    // ── Update stat cards ────────────────────────────────────────────
    function updateStats(stats) {
        document.getElementById('statFiltered').textContent = stats.filtered;
        document.getElementById('statLastRun').textContent = stats.last_run;
    }

    // ── Bind filter button counts ─────────────────────────────────────
    function bindFilterCounts() {
        document.getElementById('countAll').textContent = projects.length;
        document.getElementById('countGov').textContent = projects.filter(function(p) { return p.business_type === '政府采购'; }).length;
        document.getElementById('countEng').textContent = projects.filter(function(p) { return p.business_type === '工程招投标'; }).length;
    }

    // ── Set active filter button ─────────────────────────────────────
    function setActiveFilterBtn(type) {
        var allBtns = [
            { id: 'filterAll', type: 'all' },
            { id: 'filterGov', type: '政府采购' },
            { id: 'filterEng', type: '工程招投标' }
        ];
        allBtns.forEach(function(b) {
            var el = document.getElementById(b.id);
            if (b.type === type) {
                el.className = 'px-4 py-2 rounded-lg text-sm font-medium transition bg-blue-600 text-white';
            } else {
                el.className = 'px-4 py-2 rounded-lg text-sm font-medium transition bg-gray-200 text-gray-700';
            }
        });
        document.querySelectorAll('#presetToday, #preset3days, #preset7days, #preset30days').forEach(function(b) {
            b.className = 'px-3 py-1 text-xs rounded-lg bg-gray-200 text-gray-700';
        });
    }

    function setActivePreset(btn) {
        document.querySelectorAll('#presetToday, #preset3days, #preset7days, #preset30days').forEach(function(b) {
            b.className = 'px-3 py-1 text-xs rounded-lg bg-gray-200 text-gray-700';
        });
        btn.className = 'px-3 py-1 text-xs rounded-lg bg-blue-600 text-white';
        ['filterAll', 'filterGov', 'filterEng'].forEach(function(id) {
            var el = document.getElementById(id);
            el.className = el.className.replace('bg-blue-600 text-white', 'bg-gray-200 text-gray-700');
        });
    }

    // ── Process & render by source ───────────────────────────────────
    // 2026-06-12 默认只显示的子分类 (招标公告 + 采购公告)
    // 避免 dashboard 出现 中标结果公示/答疑补造 等重复信息淹没主表
    // 用户可改 ALLOWED_SUB_TYPES 或在 console 调 setAllowedSubTypes(arr)
    var ALLOWED_SUB_TYPES = ['招标公告', '采购公告'];

    function processBySource() {
        var filtered = filterType === 'all'
            ? projects
            : projects.filter(function(p) { return p.business_type === filterType; });

        // 默认子分类白名单 (始终生效)
        if (ALLOWED_SUB_TYPES && ALLOWED_SUB_TYPES.length > 0) {
            filtered = filtered.filter(function(p) { return ALLOWED_SUB_TYPES.indexOf(p.tender_type) >= 0; });
        }

        // Date filter
        if (dateStart || dateEnd) {
            filtered = filtered.filter(function(p) {
                var publishDate = p.publish_date_raw || p.publish_date;
                if (!publishDate) return true;
                var dateStr = Array.isArray(publishDate) ? publishDate[0] : publishDate;
                if (typeof dateStr !== 'string') return true;
                var projectDate = new Date(dateStr.replace(/[\[\]]/g, ''));
                if (isNaN(projectDate.getTime())) return true;
                if (dateStart && new Date(dateStart) > projectDate) return false;
                if (dateEnd && new Date(dateEnd) < projectDate) return false;
                return true;
            });
        }

        var grouped = {};
        filtered.forEach(function(p) {
            var source = '未知来源';
            try { source = new URL(p.source_url || p.url).hostname; } catch(e) {}

            if (!grouped[source]) {
                grouped[source] = {
                    total: 0, matched: 0, govCount: 0, engCount: 0,
                    subTypeCounts: {},
                    important: [], budgetTotal: 0, budgets: []
                };
            }
            grouped[source].total++;
            if (p.keywords_matched) grouped[source].matched++;
            if (p.business_type === '政府采购') grouped[source].govCount++;
            if (p.business_type === '工程招投标') grouped[source].engCount++;
            if (p.tender_type) {
                grouped[source].subTypeCounts[p.tender_type] = (grouped[source].subTypeCounts[p.tender_type] || 0) + 1;
            }

            if (p.budget || p.keywords_matched || p.project_overview || p.bidder_requirements || p.bid_amount || p.content_preview) {
                grouped[source].important.push(p);
            }

            if (p.budget) {
                var budgetNum = parseFloat(p.budget.replace(/[^\d.]/g, ''));
                if (budgetNum > 0) {
                    var unit = p.budget.includes('万') ? 10000 : 1;
                    grouped[source].budgets.push(budgetNum * unit);
                }
            }
        });

        Object.keys(grouped).forEach(function(k) {
            var budgets = grouped[k].budgets;
            if (budgets.length > 0) {
                grouped[k].budgetTotal = budgets.reduce(function(a, b) { return a + b; }, 0);
            }
            grouped[k].important.sort(function(a, b) {
                var aScore = (a.budget ? 1 : 0) + (a.keywords_matched ? 1 : 0) + (a.project_overview ? 1 : 0);
                var bScore = (b.budget ? 1 : 0) + (b.keywords_matched ? 1 : 0) + (b.project_overview ? 1 : 0);
                return bScore - aScore;
            });
        });

        bySource = grouped;
        document.getElementById('statSourceCount').textContent = Object.keys(grouped).length;
        renderSourceGroups();
    }

    // ── Render source group sections ─────────────────────────────────
    function renderSourceGroups() {
        var container = document.getElementById('sourceGroups');
        var html = '';
        var sourceNames = Object.keys(bySource);

        if (sourceNames.length === 0) {
            container.innerHTML = '';
            return;
        }

        sourceNames.forEach(function(sourceName) {
            var source = bySource[sourceName];
            var allImportant = source.important;
            var totalImp = allImportant.length;
            var pageSize = impPageSize;
            var page = impPages[sourceName] || 1;
            var totalImpPages = Math.max(1, Math.ceil(totalImp / pageSize));
            if (page > totalImpPages) { page = totalImpPages; impPages[sourceName] = page; }
            var start = (page - 1) * pageSize;
            var pageItems = allImportant.slice(start, start + pageSize);

            var cardsHtml = pageItems.map(function(project) {
                return buildProjectCard(project);
            }).join('');

            var paginationHtml = '';
            if (totalImpPages > 1) {
                var safeId = sourceName.replace(/[^a-zA-Z0-9]/g, '_');
                var sliderId = 'impSlider_' + safeId;
                var inputId = 'impPage_' + safeId;
                var infoId = 'impInfo_' + safeId;
                // 两行结构: 上行信息+数字输入+上下页, 下行 slider+两端标签
                // (2026-06-12: 与 data 页面 commit 8a98c35 一致, 并加 200ms 节流
                //  避免 dashboard 多 source 全表重渲染卡顿)
                paginationHtml =
                    '<div class="flex flex-col gap-2 mt-4 pt-3 border-t border-gray-100">' +
                        // 第一行
                        '<div class="flex items-center justify-between">' +
                            '<span id="' + infoId + '" class="text-xs text-gray-400">第 ' + page + ' / ' + totalImpPages + ' 页，共 ' + totalImp + ' 条</span>' +
                            '<div class="flex items-center gap-1.5">' +
                                '<button type="button" onclick="impPrev(\'' + escHtml(sourceName) + '\')" class="px-2 py-1 text-xs border rounded hover:bg-gray-50 ' + (page <= 1 ? 'opacity-30 pointer-events-none' : '') + '">‹</button>' +
                                '<input type="number" id="' + inputId + '" value="' + page + '" min="1" max="' + totalImpPages + '" ' +
                                    'class="w-14 px-2 py-1 text-xs text-center border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" ' +
                                    'onfocus="this.select()" ' +
                                    'onblur="impClamp(\'' + escHtml(sourceName) + '\')" ' +
                                    'onkeydown="if(event.key===\'Enter\'){event.preventDefault();impGo(\'' + escHtml(sourceName) + '\', this.value); this.blur();}" />' +
                                '<span class="text-xs text-gray-400">/ ' + totalImpPages + '</span>' +
                                '<button type="button" onclick="impNext(\'' + escHtml(sourceName) + '\')" class="px-2 py-1 text-xs border rounded hover:bg-gray-50 ' + (page >= totalImpPages ? 'opacity-30 pointer-events-none' : '') + '">›</button>' +
                            '</div>' +
                        '</div>' +
                        // 第二行: slider + 两端标签
                        '<div class="flex items-center gap-2">' +
                            '<span class="text-xs text-gray-400 shrink-0">1</span>' +
                            '<input type="range" id="' + sliderId + '" min="1" max="' + totalImpPages + '" value="' + page + '" step="1" ' +
                                'class="flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" ' +
                                'oninput="impSliderInput(\'' + escHtml(sourceName) + '\', this.value)" ' +
                                'onchange="impGo(\'' + escHtml(sourceName) + '\', this.value)" ' +
                                'title="拖动滑块跳转到对应页" />' +
                            '<span class="text-xs text-gray-400 shrink-0">' + totalImpPages + '</span>' +
                        '</div>' +
                    '</div>';
            }

            var budgetSection = '';
            if (source.budgetTotal) {
                budgetSection =
                    '<div class="mt-6 pt-4 border-t border-gray-200">' +
                        '<div class="flex items-center justify-between">' +
                            '<span class="text-sm text-gray-500">💰 预算总金额</span>' +
                            '<span class="text-lg font-semibold text-orange-600">' + formatBudget(source.budgetTotal) + '</span>' +
                        '</div>' +
                    '</div>';
            }

            var badges = '';
            if (source.govCount) {
                badges += '<span class="px-3 py-1 bg-blue-500 bg-opacity-50 rounded-full text-xs text-white">政府采购: ' + source.govCount + '</span>';
            }
            if (source.engCount) {
                badges += '<span class="px-3 py-1 bg-green-500 bg-opacity-50 rounded-full text-xs text-white">工程招投标: ' + source.engCount + '</span>';
            }
            // 注: 子分类 badges 删除 (重复 — 政府采购业务大类下全是采购公告, 数字与 政府采购 badge 完全相同)

            html +=
                '<div class="bg-white rounded-lg shadow mb-6 overflow-hidden">' +
                    '<div class="bg-gradient-to-r from-blue-600 to-blue-700 px-6 py-4">' +
                        '<div class="flex items-center justify-between">' +
                            '<div>' +
                                '<h3 class="text-lg font-semibold text-white">' + escHtml(sourceName) + '</h3>' +
                                '<p class="text-sm text-blue-100 mt-1">总计 ' + source.total + ' 条，匹配 ' + source.matched + ' 条</p>' +
                            '</div>' +
                            '<div class="flex items-center space-x-2">' + badges + '</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="p-6">' +
                        '<h4 class="text-sm font-medium text-gray-500 mb-4">📌 重要项目摘要</h4>' +
                        '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">' + cardsHtml + '</div>' +
                        budgetSection + paginationHtml +
                    '</div>' +
                '</div>';
        });

        container.innerHTML = html;
    }

    // ── Build a single project card HTML ─────────────────────────────
    function buildProjectCard(project) {
        var typeClass = project.business_type === '政府采购'
            ? 'bg-blue-100 text-blue-800'
            : 'bg-green-100 text-green-800';

        var budgetHtml = '';
        if (project.budget) {
            budgetHtml +=
                '<div class="flex items-center">' +
                    '<span class="text-gray-400 w-16">预算:</span>' +
                    '<span class="text-orange-600 font-semibold">' + escHtml(formatBudgetValue(project.budget)) + '</span>' +
                '</div>';
        }

        var bidHtml = '';
        if (project.bid_amount) {
            bidHtml +=
                '<div class="flex items-center">' +
                    '<span class="text-gray-400 w-16">中标:</span>' +
                    '<span class="text-green-600 font-semibold">' + escHtml(formatBudgetValue(project.bid_amount)) + '</span>' +
                '</div>';
        }

        var overviewHtml = '';
        if (project.project_overview) {
            overviewHtml +=
                '<div>' +
                    '<span class="text-gray-400">项目概况:</span>' +
                    '<p class="mt-1 text-gray-600 text-xs line-clamp-2">' + escHtml(project.project_overview) + '</p>' +
                '</div>';
        }

        var reqHtml = '';
        if (project.bidder_requirements) {
            reqHtml +=
                '<div>' +
                    '<span class="text-gray-400">资格要求:</span>' +
                    '<p class="mt-1 text-gray-600 text-xs line-clamp-2">' + escHtml(project.bidder_requirements) + '</p>' +
                '</div>';
        }

        var deadlineHtml = '';
        if (project.submission_deadline) {
            deadlineHtml +=
                '<div class="flex items-center">' +
                    '<span class="text-gray-400 w-16">截止:</span>' +
                    '<span class="text-red-600 font-medium">' + escHtml(project.submission_deadline) + '</span>' +
                '</div>';
        }

        var previewHtml = '';
        if (project.content_preview && !project.project_overview) {
            previewHtml +=
                '<div>' +
                    '<span class="text-gray-400">摘要:</span>' +
                    '<p class="mt-1 text-gray-600 text-xs line-clamp-3">' + escHtml(project.content_preview) + '</p>' +
                '</div>';
        }

        // business_type + info_type 已在标题右边的 tender_type 徽章旁, 不重复
        var typeRowHtml = '';

        var contactHtml = '';
        if (project.contact_name || project.contact_phone) {
            var phoneText = project.contact_phone ? ' (' + escHtml(project.contact_phone) + ')' : '';
            contactHtml +=
                '<div class="flex items-center text-xs text-gray-500">' +
                    '<svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
                        '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>' +
                    '</svg>' +
                    escHtml(project.contact_name) + phoneText +
                '</div>';
        }

        var publishHtml = '';
        if (project.publish_date) {
            publishHtml = '<div class="text-xs text-gray-400">发布: ' + escHtml(project.publish_date) + '</div>';
        }

        var infoRows = [budgetHtml, bidHtml, overviewHtml, reqHtml, deadlineHtml, previewHtml, contactHtml, publishHtml]
            .filter(function(r) { return r !== ''; })
            .join('');

        return (
            '<div class="anim-card border border-gray-200 rounded-xl p-4">' +
                '<div class="flex items-start justify-between mb-2">' +
                    '<a href="' + escHtml(project.url) + '" target="_blank" class="text-sm font-medium text-blue-600 hover:underline line-clamp-2 flex-1">' + escHtml(project.title) + '</a>' +
                    '<span class="' + typeClass + ' ml-2 px-2 py-1 text-xs rounded flex-shrink-0">' + escHtml(project.tender_type) + '</span>' +
                '</div>' +
                (infoRows ? '<div class="mt-3 space-y-2 text-sm"><div class="space-y-2">' + infoRows + '</div></div>' : '') +
            '</div>'
        );
    }

    // ── Utilities ─────────────────────────────────────────────────────
    function formatBudget(total) {
        if (!total) return '-';
        var n = parseFloat(String(total).replace(/[^\d.]/g, ''));
        if (isNaN(n)) return total;
        if (n >= 100000000) return (n / 100000000).toFixed(2) + ' 亿元';
        if (n >= 10000)     return (n / 10000).toFixed(2) + ' 万元';
        return n.toFixed(0) + ' 元';
    }

    function formatBudgetValue(val) {
        return formatBudget(val);
    }

    function escHtml(str) {
        if (str == null) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // ── Important projects pagination ─────────────────────────────
    // 2026-06-12: 加 200ms 节流避免 dashboard 多 source 全表重渲染卡顿
    // - impGo: 数字 input Enter/失焦 + slider onchange 触发 (立即重渲染)
    // - impSliderInput: slider oninput 触发 (只更新 input + 节流重渲染)
    // - impClamp: 数字 input 失焦时越界回滚到 currentPage
    var _impRenderThrottle = {};
    window.impPrev = function(sourceName) {
        var page = impPages[sourceName] || 1;
        if (page <= 1) return;
        impPages[sourceName] = page - 1;
        renderSourceGroups();
    };
    window.impGo = function(sourceName, val) {
        var source = bySource[sourceName];
        if (!source) return;
        var page = parseInt(val, 10);
        if (isNaN(page) || page < 1) page = 1;
        var totalImpPages = Math.max(1, Math.ceil(source.important.length / impPageSize));
        if (page > totalImpPages) page = totalImpPages;
        if (page === impPages[sourceName]) return;  // 没变, 不重渲染
        impPages[sourceName] = page;
        // 数字 input 立即重渲染, slider onchange 也立即重渲染 (松手时)
        if (_impRenderThrottle[sourceName]) {
            clearTimeout(_impRenderThrottle[sourceName]);
            _impRenderThrottle[sourceName] = null;
        }
        renderSourceGroups();
    };
    window.impNext = function(sourceName) {
        var source = bySource[sourceName];
        if (!source) return;
        var total = source.important.length;
        var page = impPages[sourceName] || 1;
        if (page >= Math.ceil(total / impPageSize)) return;
        impPages[sourceName] = page + 1;
        renderSourceGroups();
    };
    // slider 拖动: 实时更新 currentPage + 数字 input, 200ms 节流重渲染
    // (不立即重渲染, 避免每像素触发全表 renderSourceGroups 卡顿)
    window.impSliderInput = function(sourceName, val) {
        var page = parseInt(val, 10);
        if (isNaN(page)) return;
        var safeId = sourceName.replace(/[^a-zA-Z0-9]/g, '_');
        // 实时同步数字 input (不重渲染整个 group)
        var input = document.getElementById('impPage_' + safeId);
        if (input && document.activeElement !== input) input.value = page;
        // 更新 info span ("第 X / Y 页, 共 Z 条")
        var info = document.getElementById('impInfo_' + safeId);
        if (info) {
            var source = bySource[sourceName];
            if (source) {
                var totalImpPages = Math.max(1, Math.ceil(source.important.length / impPageSize));
                info.textContent = '第 ' + page + ' / ' + totalImpPages + ' 页，共 ' + source.important.length + ' 条';
            }
        }
        // 状态更新 (不重渲染 cards, 仅同步 state)
        impPages[sourceName] = page;
        // 200ms 节流: 高频拖动时只 render 最后一次
        if (_impRenderThrottle[sourceName]) return;
        _impRenderThrottle[sourceName] = setTimeout(function() {
            _impRenderThrottle[sourceName] = null;
            renderSourceGroups();
        }, 200);
    };
    // 数字 input 失焦: 越界回滚到 currentPage
    window.impClamp = function(sourceName) {
        var source = bySource[sourceName];
        if (!source) return;
        var safeId = sourceName.replace(/[^a-zA-Z0-9]/g, '_');
        var input = document.getElementById('impPage_' + safeId);
        if (!input) return;
        var totalImpPages = Math.max(1, Math.ceil(source.important.length / impPageSize));
        var page = parseInt(input.value, 10);
        var cur = impPages[sourceName] || 1;
        if (isNaN(page) || page < 1 || page > totalImpPages) {
            // 越界或空: 回滚到 currentPage
            input.value = cur;
            return;
        }
        if (page !== cur) {
            impPages[sourceName] = page;
            renderSourceGroups();
        }
    };

    function clearDateFilter() {
        dateStart = '';
        dateEnd = '';
        dateRangePreset = null;
        document.getElementById('dateStart').value = '';
        document.getElementById('dateEnd').value = '';
        document.getElementById('dateStart').classList.remove('border-blue-400');
        document.getElementById('dateEnd').classList.remove('border-blue-400');
        setActiveFilterBtn(filterType);
        processBySource();
    }

    function setDateRange(days) {
        var today = new Date();
        var end = new Date(today);
        var start = new Date(today);
        start.setDate(start.getDate() - days + 1);

        dateStart = start.toISOString().split('T')[0];
        dateEnd = end.toISOString().split('T')[0];
        dateRangePreset = days;

        document.getElementById('dateStart').value = dateStart;
        document.getElementById('dateEnd').value = dateEnd;
        document.getElementById('dateStart').classList.add('border-blue-400');
        document.getElementById('dateEnd').classList.add('border-blue-400');

        var presetMap = { 1: 'presetToday', 3: 'preset3days', 7: 'preset7days', 30: 'preset30days' };
        setActivePreset(document.getElementById(presetMap[days]));
        processBySource();
    }

    // ── Bind event listeners ──────────────────────────────────────────
    document.getElementById('filterAll').addEventListener('click', function() {
        filterType = 'all';
        setActiveFilterBtn('all');
        processBySource();
    });
    document.getElementById('filterGov').addEventListener('click', function() {
        filterType = '政府采购';
        setActiveFilterBtn('政府采购');
        processBySource();
    });
    document.getElementById('filterEng').addEventListener('click', function() {
        filterType = '工程招投标';
        setActiveFilterBtn('工程招投标');
        processBySource();
    });

    document.getElementById('dateStart').addEventListener('change', function() {
        dateStart = this.value;
        if (dateStart) this.classList.add('border-blue-400');
        else this.classList.remove('border-blue-400');
        dateRangePreset = null;
        setActiveFilterBtn(filterType);
        processBySource();
    });
    document.getElementById('dateEnd').addEventListener('change', function() {
        dateEnd = this.value;
        if (dateEnd) this.classList.add('border-blue-400');
        else this.classList.remove('border-blue-400');
        dateRangePreset = null;
        setActiveFilterBtn(filterType);
        processBySource();
    });
    document.getElementById('clearDateFilter').addEventListener('click', clearDateFilter);

    document.getElementById('presetToday').addEventListener('click', function() { setDateRange(1); });
    document.getElementById('preset3days').addEventListener('click', function() { setDateRange(3); });
    document.getElementById('preset7days').addEventListener('click', function() { setDateRange(7); });
    document.getElementById('preset30days').addEventListener('click', function() { setDateRange(30); });


    // ── Source Health Status Bar ──────────────────────────────────────
    function updateHealthIndicator(id, status, label) {
        var dot = document.getElementById('health-' + id);
        var lbl = document.getElementById('health-' + id + '-label');
        if (!dot || !lbl) return;
        dot.className = 'w-2 h-2 rounded-full flex-shrink-0';
        if (status === 'healthy') {
            dot.classList.add('bg-green-500');
            lbl.textContent = label || '正常';
        } else if (status === 'unhealthy') {
            dot.classList.add('bg-red-500');
            lbl.textContent = label || '异常';
        } else {
            dot.classList.add('bg-yellow-500');
            lbl.textContent = label || '缓慢';
        }
    }

    async function checkHealth() {
        try {
            var r = await fetch('/api/health/extended');
            if (!r.ok) throw new Error('health check failed');
            var d = await r.json();
            var comps = d.components || {};
            updateHealthIndicator('cqggzy', comps.cqggzy ? comps.cqggzy.status : 'unknown', comps.cqggzy ? '正常' : '未知');
            updateHealthIndicator('ccgp', comps.ccgp ? comps.ccgp.status : 'unknown', comps.ccgp ? '正常' : '未知');
            updateHealthIndicator('db', comps.database ? comps.database.status : 'unknown', comps.database ? '正常' : '未知');
            updateHealthIndicator('redis', comps.redis ? comps.redis.status : 'unknown', comps.redis ? '正常' : '未知');
        } catch(e) {
            updateHealthIndicator('cqggzy', 'unknown', '检测失败');
            updateHealthIndicator('ccgp', 'unknown', '检测失败');
            updateHealthIndicator('db', 'unknown', '检测失败');
            updateHealthIndicator('redis', 'unknown', '检测失败');
        }
    }

    // Check health on load and every 60 seconds
    checkHealth();
    setInterval(checkHealth, 60000);

    // ── Start ─────────────────────────────────────────────────────────
    initData();
})();
</script>
{% endblock %}
