{% extends "base.html" %}
{% block title %}采集内容 - 招投标采集系统{% endblock %}
{% block content %}
<div x-data="contentData()" x-init="loadContent()">
    <div class="max-w-7xl mx-auto">
        <!-- 统计卡片 -->
        <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-lg shadow p-4">
                <div class="text-sm text-gray-500">总采集</div>
                <div class="text-2xl font-bold text-blue-600" x-text="stats.total">0</div>
            </div>
            <div class="bg-white rounded-lg shadow p-4">
                <div class="text-sm text-gray-500">已匹配</div>
                <div class="text-2xl font-bold text-green-600" x-text="stats.filtered">0</div>
            </div>
            <div class="bg-white rounded-lg shadow p-4">
                <div class="text-sm text-gray-500">匹配率</div>
                <div class="text-2xl font-bold text-yellow-600" x-text="stats.success_rate">0%</div>
            </div>
            <div class="bg-white rounded-lg shadow p-4">
                <div class="text-sm text-gray-500">最后更新</div>
                <div class="text-lg font-bold text-gray-700" x-text="stats.last_run">-</div>
            </div>
        </div>

        <!-- 内容列表 -->
        <div class="bg-white rounded-lg shadow">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h3 class="text-lg font-semibold text-gray-900">📋 采集内容列表</h3>
                <div class="flex gap-2">
                    <input type="text" x-model="searchKeyword" @input="filterContent()" 
                           class="px-3 py-1 border rounded text-sm" placeholder="搜索关键词...">
                    <select x-model="filterType" @change="filterContent()" class="px-3 py-1 border rounded text-sm">
                        <option value="">全部类型</option>
                        <option value="政府采购">政府采购</option>
                        <option value="工程建设">工程建设</option>
                    </select>
                    <button @click="exportData()" class="px-3 py-1 bg-green-600 text-white text-sm rounded hover:bg-green-700">导出Excel</button>
                </div>
            </div>

            <!-- 内容卡片 -->
            <div class="divide-y divide-gray-200">
                <template x-for="item in filteredItems" :key="item.url">
                    <div class="p-4 hover:bg-gray-50">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <h4 class="text-sm font-medium text-gray-900 mb-1" x-text="item.title"></h4>
                                <div class="flex flex-wrap gap-2 text-xs text-gray-500">
                                    <span class="px-2 py-0.5 bg-blue-100 text-blue-800 rounded" x-text="item.type"></span>
                                    <span x-show="item.keywords_matched" class="px-2 py-0.5 bg-green-100 text-green-800 rounded" x-text="'匹配: ' + item.keywords_matched"></span>
                                    <span x-text="item.publish_date"></span>
                                    <span x-show="item.budget" x-text="'预算: ' + item.budget"></span>
                                </div>
                            </div>
                            <a :href="item.url" target="_blank" class="ml-4 text-blue-600 hover:text-blue-800 text-sm">查看原文 →</a>
                        </div>
                        <div x-show="item.contact_name || item.contact_phone" class="mt-2 text-xs text-gray-600">
                            <span x-show="item.contact_name" x-text="'联系人: ' + item.contact_name"></span>
                            <span x-show="item.contact_phone" class="ml-3" x-text="'电话: ' + item.contact_phone"></span>
                        </div>
                    </div>
                </template>
            </div>

            <!-- 空状态 -->
            <div x-show="filteredItems.length === 0" class="p-12 text-center text-gray-500">
                暂无采集内容
            </div>

            <!-- 分页 -->
            <div x-show="totalPages > 1" class="px-6 py-4 border-t border-gray-200 flex justify-between items-center">
                <div class="text-sm text-gray-500">
                    显示 <span x-text="(currentPage - 1) * pageSize + 1"></span> - <span x-text="Math.min(currentPage * pageSize, totalItems)"></span> 条，共 <span x-text="totalItems"></span> 条
                </div>
                <div class="flex gap-2">
                    <button @click="prevPage()" :disabled="currentPage === 1" 
                            class="px-3 py-1 border rounded text-sm disabled:opacity-50">上一页</button>
                    <span class="px-3 py-1 text-sm" x-text="currentPage + ' / ' + totalPages"></span>
                    <button @click="nextPage()" :disabled="currentPage === totalPages"
                            class="px-3 py-1 border rounded text-sm disabled:opacity-50">下一页</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function contentData() {
    return {
        items: [],
        filteredItems: [],
        stats: { total: 0, filtered: 0, success_rate: '0%', last_run: '-' },
        searchKeyword: '',
        filterType: '',
        currentPage: 1,
        pageSize: 20,
        totalItems: 0,
        totalPages: 1,

        async loadContent() {
            try {
                const res = await fetch('/api/projects?limit=200');
                const data = await res.json();
                this.items = data.data || [];
                this.totalItems = data.total || 0;
                this.totalPages = Math.ceil(this.totalItems / this.pageSize);
                this.filterContent();

                const statsRes = await fetch('/api/stats');
                this.stats = await statsRes.json();
            } catch (e) {
                console.error('加载失败:', e);
            }
        },

        filterContent() {
            let filtered = this.items;
            if (this.searchKeyword) {
                const kw = this.searchKeyword.toLowerCase();
                filtered = filtered.filter(item => 
                    item.title.toLowerCase().includes(kw) || 
                    (item.keywords_matched && item.keywords_matched.toLowerCase().includes(kw))
                );
            }
            if (this.filterType) {
                filtered = filtered.filter(item => item.type === this.filterType);
            }
            this.filteredItems = filtered.slice((this.currentPage - 1) * this.pageSize, this.currentPage * this.pageSize);
            this.totalItems = filtered.length;
            this.totalPages = Math.ceil(this.totalItems / this.pageSize) || 1;
        },

        prevPage() { if (this.currentPage > 1) { this.currentPage--; this.filterContent(); } },
        nextPage() { if (this.currentPage < this.totalPages) { this.currentPage++; this.filterContent(); } },

        exportData() {
            window.location.href = '/api/export';
        }
    };
}
</script>
{% endblock %}
