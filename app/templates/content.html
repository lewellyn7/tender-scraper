{% extends "base.html" %}
{% block title %}采集内容 - 招投标采集系统{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto">

    <!-- ========== Stats Cards ========== -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 mb-6">
        <div class="anim-card bg-white dark:bg-gray-800 rounded-xl shadow-sm p-4 border border-gray-100 dark:border-gray-700">
            <p class="text-xs text-gray-500">总采集</p>
            <p id="statTotal" class="text-2xl font-bold text-blue-600 dark:text-blue-400">—</p>
        </div>
        <div class="anim-card bg-white dark:bg-gray-800 rounded-xl shadow-sm p-4 border border-gray-100 dark:border-gray-700">
            <p class="text-xs text-gray-500">已匹配</p>
            <p id="statFiltered" class="text-2xl font-bold text-green-600">—</p>
        </div>
        <div class="anim-card bg-white dark:bg-gray-800 rounded-xl shadow-sm p-4 border border-gray-100 dark:border-gray-700">
            <p class="text-xs text-gray-500">匹配率</p>
            <p id="statRate" class="text-2xl font-bold text-yellow-600">—</p>
        </div>
        <div class="anim-card bg-white dark:bg-gray-800 rounded-xl shadow-sm p-4 border border-gray-100 dark:border-gray-700">
            <p class="text-xs text-gray-500">最后更新</p>
            <p id="statLastRun" class="text-sm font-bold text-gray-700 dark:text-gray-200">—</p>
        </div>
    </div>

    <!-- ========== List card ========== -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">

        <!-- Header -->
        <div class="px-4 sm:px-6 py-4 border-b border-gray-100 dark:border-gray-700 flex flex-wrap justify-between items-center gap-3">
            <h3 class="text-base font-semibold text-gray-900 dark:text-white">📋 采集内容列表</h3>
            <div class="flex flex-wrap gap-2">
                <input type="text" id="searchKeyword"
                       class="border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-1.5 text-sm
                              bg-white dark:bg-gray-700 dark:text-white placeholder-gray-400
                              focus:outline-none focus:ring-2 focus:ring-blue-500 w-40 sm:w-52 transition"
                       placeholder="搜索关键词...">
                <select id="filterType"
                        class="border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-1.5 text-sm
                               bg-white dark:bg-gray-700 dark:text-white">
                    <option value="">全部类型</option>
                    <option value="政府采购">政府采购</option>
                    <option value="工程建设">工程建设</option>
                </select>
                <button id="exportBtn"
                        class="px-3 py-1.5 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700 transition shadow-sm">
                    导出Excel
                </button>
            </div>
        </div>

        <!-- Skeleton -->
        <div id="skeletonList" class="p-6 space-y-3 hidden">
            <div class="skeleton h-20 rounded-lg"></div>
            <div class="skeleton h-20 rounded-lg"></div>
            <div class="skeleton h-20 rounded-lg"></div>
            <div class="skeleton h-20 rounded-lg"></div>
            <div class="skeleton h-20 rounded-lg"></div>
            <div class="skeleton h-20 rounded-lg"></div>
        </div>

        <!-- Cards list -->
        <div id="cardsList" class="divide-y divide-gray-100 dark:divide-gray-700"></div>

        <!-- Empty state -->
        <div id="emptyState" class="flex flex-col items-center justify-center py-16 text-gray-400 px-4 hidden">
            <svg class="w-14 h-14 mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <p class="text-sm">暂无采集内容</p>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="px-4 sm:px-6 py-4 border-t border-gray-100 dark:border-gray-700 flex flex-wrap justify-between items-center gap-3 hidden">
            <p id="paginationInfo" class="text-xs text-gray-500"></p>
            <div class="flex gap-1.5">
                <button id="prevPage"
                        class="px-3 py-1.5 text-sm border rounded hover:bg-gray-50 dark:hover:bg-gray-700 disabled:opacity-40 disabled:cursor-not-allowed transition">
                    上一页
                </button>
                <span id="pageIndicator" class="px-3 py-1.5 text-sm text-gray-600 dark:text-gray-400"></span>
                <button id="nextPage"
                        class="px-3 py-1.5 text-sm border rounded hover:bg-gray-50 dark:hover:bg-gray-700 disabled:opacity-40 disabled:cursor-not-allowed transition">
                    下一页
                </button>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    var items = [];
    var filteredItems = [];
    var stats = { total: 0, filtered: 0, success_rate: '—', last_run: '—' };
    var loading = false;
    var searchKeyword = '';
    var filterType = '';
    var currentPage = 1;
    var pageSize = 20;
    var totalItems = 0;
    var totalPages = 1;
    var debounceTimer = null;

    // ── DOM refs ──────────────────────────────────────────────────────
    var skeletonEl = document.getElementById('skeletonList');
    var cardsEl = document.getElementById('cardsList');
    var emptyEl = document.getElementById('emptyState');
    var paginationEl = document.getElementById('pagination');

    // ── Load content ──────────────────────────────────────────────────
    function loadContent() {
        loading = true;
        showSkeleton(true);
        Promise.all([
            fetch('/api/projects?limit=200', { credentials: 'include' }),
            fetch('/api/stats', { credentials: 'include' }).catch(function() { return { ok: false }; })
        ])
        .then(function(results) {
            return Promise.all([results[0].json(), results[1].ok ? results[1].json() : null]);
        })
        .then(function(data) {
            var projData = data[0];
            items = projData.data || projData.projects || [];
            totalItems = projData.total || items.length;
            totalPages = Math.ceil(totalItems / pageSize) || 1;

            if (data[1]) {
                stats = data[1];
                document.getElementById('statTotal').textContent = stats.total || '—';
                document.getElementById('statFiltered').textContent = stats.filtered || '—';
                document.getElementById('statRate').textContent = stats.success_rate || '—';
                document.getElementById('statLastRun').textContent = stats.last_run || '—';
            } else {
                document.getElementById('statTotal').textContent = totalItems;
                document.getElementById('statFiltered').textContent = totalItems;
            }

            filterContent();
            loading = false;
            showSkeleton(false);
        })
        .catch(function(e) {
            console.error('加载失败:', e);
            loading = false;
            showSkeleton(false);
        });
    }

    // ── Show/hide skeleton ────────────────────────────────────────────
    function showSkeleton(show) {
        if (show) {
            skeletonEl.classList.remove('hidden');
            cardsEl.classList.add('hidden');
            emptyEl.classList.add('hidden');
            paginationEl.classList.add('hidden');
        } else {
            skeletonEl.classList.add('hidden');
        }
    }

    // ── Filter content ─────────────────────────────────────────────────
    function filterContent() {
        var f = items;
        if (searchKeyword) {
            var kw = searchKeyword.toLowerCase();
            f = f.filter(function(item) {
                return (item.title || '').toLowerCase().includes(kw) ||
                       (item.keywords_matched || '').toLowerCase().includes(kw);
            });
        }
        if (filterType) {
            f = f.filter(function(item) { return item.type === filterType; });
        }
        filteredItems = f;
        totalItems = f.length;
        totalPages = Math.ceil(totalItems / pageSize) || 1;
        currentPage = 1;
        renderCards();
        renderPagination();
    }

    // ── Render cards ──────────────────────────────────────────────────
    function renderCards() {
        if (loading) return;

        var pageItems = filteredItems.slice((currentPage - 1) * pageSize, currentPage * pageSize);

        if (pageItems.length === 0) {
            cardsEl.classList.add('hidden');
            emptyEl.classList.remove('hidden');
            paginationEl.classList.add('hidden');
            return;
        }

        emptyEl.classList.add('hidden');
        cardsEl.classList.remove('hidden');

        var html = pageItems.map(function(item) {
            var badges = '';

            var typeBadge = item.type || '-';
            badges += '<span class="px-2 py-0.5 bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300 rounded font-medium">' + escHtml(typeBadge) + '</span>';

            if (item.keywords_matched) {
                badges += '<span class="px-2 py-0.5 bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300 rounded">' + '匹配: ' + escHtml(item.keywords_matched) + '</span>';
            }

            if (item.publish_date) {
                badges += '<span>' + escHtml(item.publish_date) + '</span>';
            }

            var metaRow = '';
            if (item.budget) {
                metaRow += '<span class="text-orange-600 font-medium">' + '预算: ' + escHtml(item.budget) + '</span>';
            }
            if (item.contact_name) {
                metaRow += '<span>' + '联系人: ' + escHtml(item.contact_name) + '</span>';
            }
            if (item.contact_phone) {
                metaRow += '<span>' + '电话: ' + escHtml(item.contact_phone) + '</span>';
            }

            return (
                '<div class="p-4 sm:p-5 hover:bg-gray-50 dark:hover:bg-gray-700/30 transition">' +
                    '<div class="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-2">' +
                        '<div class="flex-1 min-w-0">' +
                            '<h4 class="text-sm font-medium text-gray-900 dark:text-white line-clamp-2 mb-1.5">' + escHtml(item.title) + '</h4>' +
                            '<div class="flex flex-wrap items-center gap-1.5 text-xs text-gray-500 mb-1.5">' + badges + '</div>' +
                            (metaRow ? '<div class="flex flex-wrap items-center gap-x-4 gap-y-1 text-xs text-gray-500">' + metaRow + '</div>' : '') +
                        '</div>' +
                        '<div class="flex items-center gap-2 shrink-0">' +
                            '<a href="' + escHtml(item.url) + '" target="_blank"' +
                               ' class="inline-flex items-center gap-1 text-blue-600 hover:text-blue-800 text-sm font-medium transition">' +
                                '查看原文' +
                                '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
                                    '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>' +
                                '</svg>' +
                            '</a>' +
                        '</div>' +
                    '</div>' +
                '</div>'
            );
        });

        cardsEl.innerHTML = html.join('');
    }

    // ── Render pagination ─────────────────────────────────────────────
    function renderPagination() {
        if (totalPages <= 1) {
            paginationEl.classList.add('hidden');
            return;
        }

        paginationEl.classList.remove('hidden');

        var start = (currentPage - 1) * pageSize + 1;
        var end = Math.min(currentPage * pageSize, totalItems);
        document.getElementById('paginationInfo').textContent =
            '显示 ' + start + '–' + end + ' 条，共 ' + totalItems + ' 条';

        document.getElementById('pageIndicator').textContent = currentPage + ' / ' + totalPages;

        document.getElementById('prevPage').disabled = currentPage === 1;
        document.getElementById('nextPage').disabled = currentPage === totalPages;
    }

    // ── Navigation ─────────────────────────────────────────────────────
    function prevPage() {
        if (currentPage > 1) {
            currentPage--;
            renderCards();
            renderPagination();
        }
    }

    function nextPage() {
        if (currentPage < totalPages) {
            currentPage++;
            renderCards();
            renderPagination();
        }
    }

    // ── Export ─────────────────────────────────────────────────────────
    function exportData() {
        window.location.href = '/api/export';
    }

    // ── Utility ─────────────────────────────────────────────────────────
    function escHtml(str) {
        if (str == null) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // ── Bind events ────────────────────────────────────────────────────
    document.getElementById('searchKeyword').addEventListener('input', function() {
        var val = this.value;
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function() {
            searchKeyword = val;
            filterContent();
        }, 350);
    });

    document.getElementById('filterType').addEventListener('change', function() {
        filterType = this.value;
        filterContent();
    });

    document.getElementById('exportBtn').addEventListener('click', exportData);
    document.getElementById('prevPage').addEventListener('click', prevPage);
    document.getElementById('nextPage').addEventListener('click', nextPage);

    // ── Start ──────────────────────────────────────────────────────────
    loadContent();
})();
</script>
{% endblock %}
