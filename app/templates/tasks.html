{% extends "base.html" %}
{% block title %}任务管理 - 招投标采集系统{% endblock %}
{% block content %}
<div class="toast-container" id="toastContainer"></div>

<div class="flex justify-between items-center mb-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">任务管理</h1>
    <p class="text-sm text-gray-500 mt-1">采集任务列表与执行状态</p>
  </div>
  <div class="flex gap-2">
    <button onclick="loadTasks()" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700">刷新</button>
  </div>
</div>

<!-- 统计卡片 -->
<div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-4">
    <div class="text-xs text-gray-500 mb-1">任务总数</div>
    <div class="text-3xl font-bold text-blue-600" id="taskTotal">-</div>
  </div>
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-4">
    <div class="text-xs text-gray-500 mb-1">进行中</div>
    <div class="text-3xl font-bold text-green-600" id="taskRunning">-</div>
  </div>
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-4">
    <div class="text-xs text-gray-500 mb-1">已采集项目</div>
    <div class="text-3xl font-bold text-purple-600" id="taskProjects">-</div>
  </div>
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-4">
    <div class="text-xs text-gray-500 mb-1">最近采集</div>
    <div class="text-lg font-semibold text-gray-700 dark:text-gray-200" id="taskLastRun">-</div>
  </div>
</div>

<!-- 任务列表 -->
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm overflow-hidden">
  <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
    <h2 class="font-semibold text-gray-800 dark:text-white">采集任务</h2>
  </div>
  <div class="overflow-x-auto">
    <table class="w-full">
      <thead class="bg-gray-50 dark:bg-gray-700">
        <tr>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">任务名称</th>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">采集源</th>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">采集数量</th>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">最近运行</th>
        </tr>
      </thead>
      <tbody id="taskTableBody" class="divide-y divide-gray-200 dark:divide-gray-700">
        <tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">加载中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
var CACHE = { projects: [], total: 0, last_run: '' };

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function loadTasks() {
  try {
    var projRes = await authFetch('/api/projects?page_size=500');
    var projData = await projRes.json();
    CACHE.projects = projData.projects || [];
    CACHE.total = projData.total || 0;
    CACHE.last_run = projData.last_run || '-';
    renderTaskDashboard();
  } catch(e) {
    console.error('加载任务失败:', e);
    document.getElementById('taskTableBody').innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-red-400">加载失败</td></tr>';
  }
}

function renderTaskDashboard() {
  // 按来源分组统计
  var sourceMap = {};
  CACHE.projects.forEach(function(p) {
    var src = p.source_url || p.source_name || '未知来源';
    if (!sourceMap[src]) sourceMap[src] = { count: 0, matched: 0, latest: '' };
    sourceMap[src].count++;
    if (p.keywords_matched) sourceMap[src].matched++;
    if (p.publish_date > sourceMap[src].latest) sourceMap[src].latest = p.publish_date;
  });

  // 统计数据
  document.getElementById('taskTotal').textContent = Object.keys(sourceMap).length;
  document.getElementById('taskRunning').textContent = '-';  // 无实时采集状态
  document.getElementById('taskProjects').textContent = CACHE.total;
  document.getElementById('taskLastRun').textContent = CACHE.last_run || '-';

  // 渲染任务表格
  var sources = Object.entries(sourceMap).sort(function(a, b) { return b[1].count - a[1].count; });
  var tbody = document.getElementById('taskTableBody');
  
  if (sources.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">暂无采集任务数据</td></tr>';
    return;
  }

  tbody.innerHTML = sources.map(function(entry) {
    var src = entry[0];
    var data = entry[1];
    var statusClass = data.count > 0 ? 'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300' : 'bg-gray-100 text-gray-500';
    var shortSrc = src.replace(/^https?:\/\//, '').split('/')[0];
    return '<tr class="hover:bg-gray-50 dark:hover:bg-gray-750">' +
      '<td class="px-4 py-3 text-sm text-gray-900 dark:text-white">' + escHtml(shortSrc) + '</td>' +
      '<td class="px-4 py-3 text-sm text-gray-500">' + escHtml(shortSrc) + '</td>' +
      '<td class="px-4 py-3"><span class="px-2 py-0.5 text-xs rounded-full ' + statusClass + '">活跃</span></td>' +
      '<td class="px-4 py-3 text-sm font-mono text-gray-700 dark:text-gray-300">' + data.count + ' 条</td>' +
      '<td class="px-4 py-3 text-sm text-gray-500">' + escHtml(data.latest || '-') + '</td>' +
      '</tr>';
  }).join('');
}

loadTasks();
</script>
{% endblock %}
