<!-- Global Animation Styles + 3D Character -->
<style>
.page-enter{opacity:0;transform:translateY(12px)}
.page-enter-active{opacity:1;transform:translateY(0);transition:opacity .35s,transform .35s}
.page-leave-active{opacity:0;transform:translateY(-8px);transition:opacity .25s,transform .25s}
.reveal{opacity:0;transform:translateY(24px);transition:opacity .5s,transform .5s}
.reveal.revealed{opacity:1;transform:translateY(0)}
.reveal-left{opacity:0;transform:translateX(-24px);transition:opacity .5s,transform .5s}
.reveal-left.revealed{opacity:1;transform:translateX(0)}
.reveal-right{opacity:0;transform:translateX(24px);transition:opacity .5s,transform .5s}
.reveal-right.revealed{opacity:1;transform:translateX(0)}
.reveal-scale{opacity:0;transform:scale(0.94);transition:opacity .4s,transform .4s}
.reveal-scale.revealed{opacity:1;transform:scale(1)}
.anim-card{transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s,border-color .22s;cursor:pointer}
.anim-card:hover{transform:translateY(-4px) scale(1.015);box-shadow:0 12px 28px -4px rgba(0,0,0,.14),0 6px 14px -2px rgba(0,0,0,.08);border-color:rgba(59,130,246,.35)}
.anim-card:active{transform:translateY(-1px) scale(.99)}
.anim-btn{position:relative;overflow:hidden}
.anim-btn::after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.45);transform:scale(0);opacity:1;pointer-events:none}
.anim-btn:active::after{transform:scale(3);opacity:0;transition:transform .5s,opacity .5s}
.toast-container{position:fixed;top:5rem;right:1.25rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;pointer-events:none}
.toast-item{pointer-events:auto;padding:.875rem 1.25rem;border-radius:.625rem;box-shadow:0 8px 24px rgba(0,0,0,.12);display:flex;align-items:center;gap:.625rem;font-size:.875rem;font-weight:500;min-width:260px;max-width:360px;animation:toastIn .4s cubic-bezier(.34,1.56,.64,1) forwards}
.toast-item.toast-exit{animation:toastOut .3s ease forwards}
.toast-success{background:rgba(16,185,129,.95);color:#fff}
.toast-error{background:rgba(239,68,68,.95);color:#fff}
.toast-info{background:rgba(59,130,246,.95);color:#fff}
.toast-warning{background:rgba(245,158,11,.95);color:#fff}
.toast-rabbit{background:linear-gradient(135deg,#f472b6,#ec4899);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateX(110%)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(110%}}
.modal-overlay{transition:opacity .25s}
.modal-overlay:not(.modal-active){opacity:0;pointer-events:none}
.modal-overlay.modal-active{opacity:1}
.modal-panel{transition:opacity .3s,transform .3s cubic-bezier(.34,1.56,.64,1);transform:scale(.88) translateY(16px)}
.modal-overlay.modal-active .modal-panel{opacity:1;transform:scale(1) translateY(0)}
.stagger-item{opacity:0;transform:translateY(16px);transition:opacity .4s,transform .4s}
.stagger-item.stagger-visible{opacity:1;transform:translateY(0)}
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:.375rem}
.dark .skeleton{background:linear-gradient(90deg,#1f2937 25%,#374151 50%,#1f2937 75%);background-size:200% 100%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes pulseSoft{0%,100%{opacity:1}50%{opacity:.6}}
.pulse-soft{animation:pulseSoft 2s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite}
@keyframes bounceIn{0%{opacity:0;transform:scale(.3)}50%{transform:scale(1.06)}70%{transform:scale(.96)}100%{opacity:1;transform:scale(1)}}
.bounceIn{animation:bounceIn .45s ease forwards}
@keyframes glowRing{0%{transform:scale(1);opacity:.8}50%{transform:scale(1.15);opacity:.3}100%{transform:scale(1);opacity:.8}}
.glow-ring{animation:glowRing 2s ease-in-out infinite}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.float-y{animation:floatY 3s ease-in-out infinite}
@keyframes neonPulse{0%,100%{box-shadow:0 0 5px #667eea,0 0 10px #667eea,0 0 15px #667eea}50%{box-shadow:0 0 10px #764ba2,0 0 20px #764ba2,0 0 25px #764ba2}}
.neon-border{animation:neonPulse 2s ease-in-out infinite;border:2px solid #667eea}
.gradient-text{background:linear-gradient(135deg,#667eea,#764ba2,#f093fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.progress-anim{transition:width 1s cubic-bezier(.4,0,.2,1)}
#char3d-container{position:fixed;bottom:20px;right:20px;width:160px;height:200px;z-index:9998;pointer-events:all;cursor:pointer}
#char3d-canvas{width:100%;height:100%;border-radius:16px;background:transparent!important}
.particle-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.5}
@keyframes rabbitBounce{0%,100%{transform:translateY(0) scale(1)}25%{transform:translateY(-32px) scale(1.1)}45%{transform:translateY(-14px) scale(0.96)}65%{transform:translateY(-22px) scale(1.04)}82%{transform:translateY(-6px) scale(0.99)}100%{transform:translateY(0) scale(1)}}
.rabbit-bounce{animation:rabbitBounce .75s cubic-bezier(.34,1.56,.64,1) forwards}
</style>
<div id="char3d-container"><canvas id="char3d-canvas"></canvas></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
    var container = document.getElementById("char3d-container");
    var canvas = document.getElementById("char3d-canvas");
    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.1, 100);
    camera.position.set(0, 0.5, 6);
    var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
    renderer.setSize(canvas.clientWidth, canvas.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);

    var ambientLight = new THREE.AmbientLight(0xffeeff, 0.7); scene.add(ambientLight);
    var mainLight = new THREE.DirectionalLight(0xffffff, 1.1); mainLight.position.set(3, 5, 4); scene.add(mainLight);
    var fillLight = new THREE.DirectionalLight(0xaaddff, 0.5); fillLight.position.set(-3, 2, -2); scene.add(fillLight);
    var rimLight = new THREE.PointLight(0xffaacc, 0.8, 10); rimLight.position.set(0, -2, -3); scene.add(rimLight);

    var whiteMat = new THREE.MeshPhongMaterial({ color: 0xffffff, specular: 0xdddddd, shininess: 60 });
    var innerEarMat = new THREE.MeshPhongMaterial({ color: 0xffb6c1, specular: 0xff99aa, shininess: 40, side: THREE.DoubleSide });
    var eyeRedMat = new THREE.MeshPhongMaterial({ color: 0xcc1111, specular: 0xff4444, shininess: 200, emissive: 0x440000, emissiveIntensity: 0.3 });
    var eyeHighlightMat = new THREE.MeshPhongMaterial({ color: 0xffffff, specular: 0xffffff, shininess: 300, emissive: 0xffffff, emissiveIntensity: 0.6 });
    var noseMat = new THREE.MeshPhongMaterial({ color: 0xffaabb, specular: 0xff99aa, shininess: 80 });
    var mouthMat = new THREE.MeshPhongMaterial({ color: 0xdd8899, shininess: 30 });
    var pawMat = new THREE.MeshPhongMaterial({ color: 0xffeeee, specular: 0xffcccc, shininess: 40 });
    var tailMat = new THREE.MeshPhongMaterial({ color: 0xffffff, specular: 0xdddddd, shininess: 50 });

    var rabbit = new THREE.Group();
    scene.add(rabbit);

    var bodyGeo = new THREE.SphereGeometry(1, 32, 24);
    bodyGeo.scale(0.95, 1.0, 0.75);
    rabbit.add(new THREE.Mesh(bodyGeo, whiteMat));

    var headGeo = new THREE.SphereGeometry(0.65, 32, 24);
    var head = new THREE.Mesh(headGeo, whiteMat);
    head.position.set(0, 1.3, 0.45);
    rabbit.add(head);

    function createEar(x) {
        var eg = new THREE.Group();
        eg.position.set(x, 2.3, 0.3);
        var earShape = new THREE.Shape();
        earShape.moveTo(0, 0);
        earShape.bezierCurveTo(-0.18, 0.2, -0.22, 0.8, -0.12, 1.3);
        earShape.bezierCurveTo(-0.06, 1.55, 0.06, 1.55, 0.12, 1.3);
        earShape.bezierCurveTo(0.22, 0.8, 0.18, 0.2, 0, 0);
        var earGeo = new THREE.ExtrudeGeometry(earShape, { depth: 0.1, bevelEnabled: true, bevelThickness: 0.04, bevelSize: 0.04, bevelSegments: 4 });
        earGeo.rotateX(-Math.PI * 0.05);
        eg.add(new THREE.Mesh(earGeo, whiteMat));
        var innerEarShape = new THREE.Shape();
        innerEarShape.moveTo(0, 0.05);
        innerEarShape.bezierCurveTo(-0.10, 0.25, -0.13, 0.82, -0.07, 1.28);
        innerEarShape.bezierCurveTo(-0.03, 1.46, 0.03, 1.46, 0.07, 1.28);
        innerEarShape.bezierCurveTo(0.13, 0.82, 0.10, 0.25, 0, 0.05);
        var innerEarGeo = new THREE.ExtrudeGeometry(innerEarShape, { depth: 0.04, bevelEnabled: false });
        innerEarGeo.rotateX(-Math.PI * 0.05);
        var innerEar = new THREE.Mesh(innerEarGeo, innerEarMat);
        innerEar.position.z = 0.07;
        eg.add(innerEar);
        eg.rotation.z = x < 0 ? 0.12 : -0.12;
        eg.rotation.x = -0.1;
        return eg;
    }
    var leftEar = createEar(-0.25);
    var rightEar = createEar(0.25);
    rabbit.add(leftEar);
    rabbit.add(rightEar);

    function createEye(x) {
        var eg = new THREE.Group();
        eg.position.set(x, 1.45, 1.0);
        eg.add(new THREE.Mesh(new THREE.SphereGeometry(0.14, 16, 12), whiteMat));
        var eyeball = new THREE.Mesh(new THREE.SphereGeometry(0.10, 16, 12), eyeRedMat);
        eyeball.position.z = 0.06;
        eg.add(eyeball);
        var hl = new THREE.Mesh(new THREE.SphereGeometry(0.03, 8, 8), eyeHighlightMat);
        hl.position.set(0.035, 0.035, 0.15);
        eg.add(hl);
        return eg;
    }
    rabbit.add(createEye(-0.22));
    rabbit.add(createEye(0.22));

    var noseGeo = new THREE.SphereGeometry(0.08, 12, 8);
    noseGeo.scale(1.2, 0.8, 0.6);
    var nose = new THREE.Mesh(noseGeo, noseMat);
    nose.position.set(0, 1.22, 1.08);
    rabbit.add(nose);

    var lipShape = new THREE.Shape();
    lipShape.moveTo(-0.12, 0);
    lipShape.bezierCurveTo(-0.06, -0.04, 0.06, -0.04, 0.12, 0);
    var lip = new THREE.Mesh(new THREE.ShapeGeometry(lipShape), mouthMat);
    lip.position.set(0, 1.15, 1.06);
    lip.rotation.x = -0.2;
    rabbit.add(lip);

    for (var tx = -1; tx <= 1; tx += 2) {
        var tooth = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.09, 0.04), new THREE.MeshPhongMaterial({ color: 0xfffff0, shininess: 80 }));
        tooth.position.set(tx * 0.055, 1.07, 1.08);
        rabbit.add(tooth);
    }

    function createFrontPaw(x) {
        var pg = new THREE.Group();
        pg.position.set(x, -0.5, 0.55);
        var armGeo = new THREE.CylinderGeometry(0.1, 0.12, 0.35, 8);
        armGeo.rotateZ(Math.PI * 0.25 * (x < 0 ? -1 : 1));
        pg.add(new THREE.Mesh(armGeo, pawMat));
        var pawGeo = new THREE.SphereGeometry(0.13, 12, 8);
        pawGeo.scale(1, 0.6, 1.1);
        var paw = new THREE.Mesh(pawGeo, pawMat);
        paw.position.set(x < 0 ? -0.18 : 0.18, -0.22, 0.05);
        pg.add(paw);
        return pg;
    }
    rabbit.add(createFrontPaw(-0.55));
    rabbit.add(createFrontPaw(0.55));

    function createBackLeg(x) {
        var lg = new THREE.Group();
        lg.position.set(x, -0.85, -0.1);
        var thighGeo = new THREE.SphereGeometry(0.35, 16, 12);
        thighGeo.scale(0.9, 1.0, 0.85);
        lg.add(new THREE.Mesh(thighGeo, whiteMat));
        var lower = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.12, 0.4, 8), whiteMat);
        lower.position.set(0, -0.35, 0.15);
        lg.add(lower);
        var footGeo = new THREE.SphereGeometry(0.18, 12, 8);
        footGeo.scale(1.3, 0.5, 1.4);
        var foot = new THREE.Mesh(footGeo, whiteMat);
        foot.position.set(0, -0.55, 0.28);
        lg.add(foot);
        return lg;
    }
    rabbit.add(createBackLeg(-0.5));
    rabbit.add(createBackLeg(0.5));

    var tail = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 8), tailMat);
    tail.position.set(0, -0.15, -0.85);
    rabbit.add(tail);

    rabbit.position.set(0, 0.1, 0);

    var time = 0;
    var baseY = rabbit.position.y;
    var floatSpeed = 1.0;
    var floatAmp = 0.12;
    var isBouncing = false;

    container.addEventListener("click", function() {
        if (isBouncing) return;
        isBouncing = true;
        container.classList.add("rabbit-bounce");
        showRabbitToast();
        setTimeout(function() { container.classList.remove("rabbit-bounce"); isBouncing = false; }, 750);
    });

    function showRabbitToast() {
        var tc = document.querySelector(".toast-container");
        if (!tc) { tc = document.createElement("div"); tc.className = "toast-container"; document.body.appendChild(tc); }
        var t = document.createElement("div");
        t.className = "toast-item toast-rabbit";
        t.innerHTML = '<span style="font-size:1.2em">🐰</span><span>你好！我是 Jarvis！</span>';
        tc.appendChild(t);
        setTimeout(function() { t.classList.add("toast-exit"); setTimeout(function() { t.remove(); }, 300); }, 3000);
    }

    function renderLoop() {
        requestAnimationFrame(renderLoop);
        time += 0.016;
        rabbit.position.y = baseY + Math.sin(time * floatSpeed) * floatAmp;
        rabbit.rotation.y = Math.sin(time * 0.6) * 0.06;
        var earSway = Math.sin(time * 1.8) * 0.06;
        leftEar.rotation.z = 0.12 + earSway;
        rightEar.rotation.z = -0.12 - earSway;
        var noseTwitch = Math.sin(time * 3.5) * 0.015;
        nose.scale.set(1.2 + noseTwitch, 0.8 + noseTwitch * 0.5, 0.6);
        tail.rotation.y = Math.sin(time * 2.5) * 0.2;
        tail.scale.set(1, 1, 1 + Math.sin(time * 2.5) * 0.1);
        rimLight.intensity = 0.6 + Math.sin(time * 2) * 0.2;
        renderer.render(scene, camera);
    }

    window.addEventListener("resize", function() {
        var w = canvas.clientWidth, h = canvas.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });

    renderLoop();
})();
</script>
