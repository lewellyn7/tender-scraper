{% extends "base.html" %}
{% block content %}
<div class="toast-container" id="toastContainer"></div>
<div x-data="favoritesApp()" x-init="init()">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">我的收藏</h1>
    <div class="flex gap-2">
      <select x-model="filterStatus" @change="loadFavorites()" class="border rounded px-3 py-1.5 text-sm bg-white dark:bg-gray-800 dark:border-gray-600">
        <option value="">全部状态</option>
        <option value="pending">待跟进</option>
        <option value="tracking">跟踪中</option>
        <option value="archived">已归档</option>
      </select>
    </div>
  </div>
  <div x-show="loading" class="text-center py-12 text-gray-500">加载中...</div>
  <div x-show="!loading && favorites.length === 0" class="text-center py-12 text-gray-400">
    <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
    <p>暂无收藏项目</p>
  </div>
  <div class="grid gap-3" x-show="!loading">
    <template x-for="item in favorites" :key="item.project_url">
      <div class="anim-card border border-gray-200 dark:border-gray-700 rounded-xl p-4 bg-white dark:bg-gray-800">
        <div class="flex justify-between items-start">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-1 flex-wrap">
              <span class="text-xs px-2 py-0.5 rounded font-medium" :class="getStatusClass(item.status)" x-text="getStatusLabel(item.status)"></span>
              <template x-if="item.annotation && item.annotation.priority === 'high'">
                <span class="text-xs px-2 py-0.5 rounded bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-200 font-medium">高优先级</span>
              </template>
              <template x-if="item.annotation && item.annotation.priority === 'critical'">
                <span class="text-xs px-2 py-0.5 rounded bg-red-200 text-red-800 dark:bg-red-800 dark:text-red-200 font-bold">紧急</span>
              </template>
            </div>
            <h3 class="font-medium text-gray-900 dark:text-white text-sm mb-1" x-text="item.title"></h3>
            <div class="text-xs text-gray-500 dark:text-gray-400 space-x-3">
              <span x-text="item.tender_type || item.type || '-'"></span>
              <span class="text-amber-600 dark:text-amber-400 font-medium" x-text="item.budget || '-'" x-show="item.budget"></span>
              <span x-text="item.publish_date ? item.publish_date.slice(0,10) : '-'"></span>
              <span class="text-gray-400" x-text="'收藏于 ' + (item.updated_at ? item.updated_at.slice(0,16).replace(\'T\',\' \') : \'-\')"></span>
            </div>
            <div class="mt-2 text-xs text-gray-600 dark:text-gray-300 bg-gray-50 dark:bg-gray-700 rounded p-2" x-show="item.annotation && item.annotation.note" x-cloak>
              <span class="text-blue-500 mr-1">&#9998;</span><span x-text="item.annotation.note"></span>
            </div>
            <template x-if="item.annotation && item.annotation.tags && item.annotation.tags.length">
              <div class="mt-1 flex gap-1 flex-wrap">
                <template x-for="tag in item.annotation.tags" :key="tag">
                  <span class="text-xs px-1.5 py-0.5 bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-200 rounded" x-text="tag"></span>
                </template>
              </div>
            </template>
          </div>
          <div class="flex flex-col gap-1 ml-3 items-end">
            <a :href="item.project_url" target="_blank" class="text-blue-500 hover:text-blue-700 text-xs" title="查看原文">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
            </a>
            <button @click="openAnnotationModal(item)" class="text-green-500 hover:text-green-700 text-xs" title="添加批注">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
            </button>
            <button @click="removeFavorite(item.project_url)" class="text-red-400 hover:text-red-600 text-xs" title="取消收藏">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
            </button>
            <select x-model="item.status" @change="updateFavStatus(item.project_url, item.status)" class="text-xs border rounded px-1 py-0.5 bg-white dark:bg-gray-700 dark:border-gray-600 mt-1">
              <option value="pending">待跟进</option>
              <option value="tracking">跟踪中</option>
              <option value="archived">已归档</option>
            </select>
          </div>
        </div>
      </div>
    </template>
  </div>
  <!-- Annotation Modal -->
  <div x-show="showAnnotationModal" x-cloak class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div @click.outside="showAnnotationModal = false" class="bg-white dark:bg-gray-800 rounded-lg p-6 w-full max-w-md shadow-xl">
      <h3 class="text-lg font-bold mb-4 text-gray-900 dark:text-white">项目批注</h3>
      <div class="mb-3">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">优先级</label>
        <select x-model="annotationForm.priority" class="w-full border rounded px-3 py-2 bg-white dark:bg-gray-700 dark:border-gray-600">
          <option value="normal">普通</option>
          <option value="high">高优先级</option>
          <option value="critical">紧急</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">备注</label>
        <textarea x-model="annotationForm.note" rows="4" class="w-full border rounded px-3 py-2 bg-white dark:bg-gray-700 dark:border-gray-600" placeholder="添加备注..."></textarea>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">标签 (逗号分隔)</label>
        <input x-model="annotationForm.tags_str" type="text" class="w-full border rounded px-3 py-2 bg-white dark:bg-gray-700 dark:border-gray-600" placeholder="智慧城市, 数字化, 重要">
      </div>
      <div class="flex gap-3 justify-end">
        <button @click="showAnnotationModal = false" class="px-4 py-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded">取消</button>
        <button @click="saveAnnotation()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">保存</button>
      </div>
    </div>
  </div>
</div>
<script>
function favoritesApp() {
  return {
    favorites: [],
    filterStatus: "",
    loading: false,
    showAnnotationModal: false,
    annotationForm: { project_url: "", note: "", priority: "normal", tags: [], tags_str: "" },
    async init() { await this.loadFavorites() },
    async loadFavorites() {
      this.loading = true;
      try {
        const res = await fetch("/api/favorites?status=" + this.filterStatus);
        const data = await res.json();
        this.favorites = data.favorites || [];
      } finally { this.loading = false }
    },
    async removeFavorite(url) {
      if (!confirm("确认取消收藏?")) return;
      await fetch("/api/favorites/" + encodeURIComponent(url), { method: "DELETE" });
      this.favorites = this.favorites.filter(f => f.project_url !== url);
    },
    async updateFavStatus(url, status) {
      await fetch("/api/favorites/" + encodeURIComponent(url), { method: "PATCH", headers: {"Content-Type": "application/json"}, body: JSON.stringify(status) });
    },
    openAnnotationModal(item) {
      this.annotationForm = {
        project_url: item.project_url,
        note: item.annotation?.note || "",
        priority: item.annotation?.priority || "normal",
        tags: item.annotation?.tags || [],
        tags_str: (item.annotation?.tags || []).join(", ")
      };
      this.showAnnotationModal = true;
    },
    async saveAnnotation() {
      const tags = this.annotationForm.tags_str.split(",").map(t => t.trim()).filter(Boolean);
      await fetch("/api/annotations", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ ...this.annotationForm, tags })
      });
      this.showAnnotationModal = false;
      await this.loadFavorites();
    },
    getStatusClass(status) {
      return { pending: "bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200",
               tracking: "bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200",
               archived: "bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-400" }[status] || "";
    },
    getStatusLabel(status) {
      return { pending: "待跟进", tracking: "跟踪中", archived: "已归档" }[status] || status;
    }
  }
}
</script>
{% endblock %}
