{% extends "base.html" %}
{% block content %}
<div class="toast-container" id="toastContainer"></div>
<div id="favoritesApp">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white flex items-center gap-2">我的收藏 <span class="help-btn" data-tooltip="收藏招标项目

对有价值的招标项目点击红心收藏。

• 点击红心添加 / 取消收藏
• 状态下拉切换处理进度（待跟进 / 跟踪中 / 已归档）
• 添加批注和优先级标签
• 来源于采集系统和自定义爬虫">?</span></h1>
    <div class="flex gap-2">
      <select id="filterStatus" class="border rounded px-3 py-1.5 text-sm bg-white dark:bg-gray-800 dark:border-gray-600">
        <option value="">全部状态</option>
        <option value="pending">待跟进</option>
        <option value="tracking">跟踪中</option>
        <option value="archived">已归档</option>
      </select>
    </div>
  </div>
  <div id="loadingState" class="text-center py-12 text-gray-500 hidden">加载中...</div>
  <div id="emptyState" class="text-center py-12 text-gray-400 hidden">
    <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
    <p>暂无收藏项目</p>
  </div>
  <div id="favoritesGrid" class="grid gap-3 hidden"></div>

  <!-- Annotation Modal -->
  <div id="annotationModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div id="annotationModalContent" class="bg-white dark:bg-gray-800 rounded-lg p-6 w-full max-w-md shadow-xl">
      <h3 class="text-lg font-bold mb-4 text-gray-900 dark:text-white">项目批注</h3>
      <div class="mb-3">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">优先级</label>
        <select id="annotationPriority" class="w-full border rounded px-3 py-2 bg-white dark:bg-gray-700 dark:border-gray-600">
          <option value="normal">普通</option>
          <option value="high">高优先级</option>
          <option value="critical">紧急</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">备注</label>
        <textarea id="annotationNote" rows="4" class="w-full border rounded px-3 py-2 bg-white dark:bg-gray-700 dark:border-gray-600" placeholder="添加备注..."></textarea>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">标签 (逗号分隔)</label>
        <input id="annotationTags" type="text" class="w-full border rounded px-3 py-2 bg-white dark:bg-gray-700 dark:border-gray-600" placeholder="智慧城市, 数字化, 重要">
      </div>
      <div class="flex gap-3 justify-end">
        <button type="button" id="cancelAnnotationBtn" class="px-4 py-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded">取消</button>
        <button type="button" id="saveAnnotationBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">保存</button>
      </div>
    </div>
  </div>
</div>
<script>
  // Auth helper

(function() {
  const state = {
    favorites: [],
    filterStatus: "",
    loading: false,
    showAnnotationModal: false,
    annotationForm: { project_url: "", note: "", priority: "normal", tags: [], tags_str: "" }
  };

  const loadingEl = document.getElementById('loadingState');
  const emptyEl = document.getElementById('emptyState');
  const gridEl = document.getElementById('favoritesGrid');
  const filterEl = document.getElementById('filterStatus');
  const modalEl = document.getElementById('annotationModal');
  const annotationPriorityEl = document.getElementById('annotationPriority');
  const annotationNoteEl = document.getElementById('annotationNote');
  const annotationTagsEl = document.getElementById('annotationTags');

  function getStatusClass(status) {
    return { pending: "bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200",
             tracking: "bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200",
             archived: "bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-400" }[status] || "";
  }
  function getStatusLabel(status) {
    return { pending: "待跟进", tracking: "跟踪中", archived: "已归档" }[status] || status;
  }

  function renderFavorites() {
    loadingEl.classList.add('hidden');
    if (state.favorites.length === 0) {
      emptyEl.classList.remove('hidden');
      gridEl.classList.add('hidden');
      return;
    }
    emptyEl.classList.add('hidden');
    gridEl.classList.remove('hidden');
    gridEl.innerHTML = state.favorites.map(item => {
      const tags = (item.annotation && item.annotation.tags && item.annotation.tags.length)
        ? item.annotation.tags.map(tag => `<span class="text-xs px-1.5 py-0.5 bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-200 rounded">${tag}</span>`).join('')
        : '';
      const noteHtml = (item.annotation && item.annotation.note)
        ? `<div class="mt-2 text-xs text-gray-600 dark:text-gray-300 bg-gray-50 dark:bg-gray-700 rounded p-2"><span class="text-blue-500 mr-1">&#9998;</span>${item.annotation.note}</div>`
        : '';
      const priorityHigh = (item.annotation && item.annotation.priority === 'high')
        ? '<span class="text-xs px-2 py-0.5 rounded bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-200 font-medium">高优先级</span>'
        : '';
      const priorityCritical = (item.annotation && item.annotation.priority === 'critical')
        ? '<span class="text-xs px-2 py-0.5 rounded bg-red-200 text-red-800 dark:bg-red-800 dark:text-red-200 font-bold">紧急</span>'
        : '';
      const budget = item.budget ? `<span class="text-amber-600 dark:text-amber-400 font-medium">${item.budget}</span>` : '';
      const publishDate = item.publish_date ? item.publish_date.slice(0,10) : '-';
      const collectedAt = item.updated_at ? item.updated_at.slice(0,16).replace('T',' ') : '-';
      return `<div class="anim-card border border-gray-200 dark:border-gray-700 rounded-xl p-4 bg-white dark:bg-gray-800">
        <div class="flex justify-between items-start">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-1 flex-wrap">
              <span class="text-xs px-2 py-0.5 rounded font-medium ${getStatusClass(item.status)}">${getStatusLabel(item.status)}</span>
              ${priorityHigh}${priorityCritical}
            </div>
            <h3 class="font-medium text-gray-900 dark:text-white text-sm mb-1 truncate" title="${item.title || ''}">${item.title || ''}</h3>
            <div class="text-xs text-gray-500 dark:text-gray-400 space-x-3">
              <span>${item.tender_type || item.type || '-'}</span>
              ${budget ? `<span class="text-amber-600 dark:text-amber-400 font-medium">${item.budget}</span>` : ''}
              <span>${publishDate}</span>
              <span class="text-gray-400">收藏于 ${collectedAt}</span>
            </div>
            ${noteHtml}
            ${tags ? `<div class="mt-1 flex gap-1 flex-wrap">${tags}</div>` : ''}
          </div>
          <div class="flex flex-col gap-1 ml-3 items-end">
            <a href="${item.project_url}" target="_blank" class="text-blue-500 hover:text-blue-700 text-xs" title="查看原文">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
            </a>
            <button type="button" data-annotate="${item.project_url}" class="text-green-500 hover:text-green-700 text-xs" title="添加批注">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
            </button>
            <button type="button" data-remove="${item.project_url}" class="text-red-400 hover:text-red-600 text-xs" title="取消收藏">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
            </button>
            <select data-status="${item.project_url}" class="text-xs border rounded px-1 py-0.5 bg-white dark:bg-gray-700 dark:border-gray-600 mt-1">
              <option value="pending" ${item.status === 'pending' ? 'selected' : ''}>待跟进</option>
              <option value="tracking" ${item.status === 'tracking' ? 'selected' : ''}>跟踪中</option>
              <option value="archived" ${item.status === 'archived' ? 'selected' : ''}>已归档</option>
            </select>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  async function loadFavorites() {
    state.loading = true;
    loadingEl.classList.remove('hidden');
    emptyEl.classList.add('hidden');
    gridEl.classList.add('hidden');
    try {
      const res = await fetch("/api/favorites?status=" + state.filterStatus, {headers: authHeaders()});
      const data = await res.json();
      state.favorites = data.favorites || [];
    } catch(e) {
      if (typeof showToast === 'function') showToast('加载失败', 'error');
    } finally {
      state.loading = false;
      renderFavorites();
    }
  }

  async function removeFavorite(url) {
    if (!confirm("确认取消收藏?")) return;
    await fetch("/api/favorites?project_url=" + encodeURIComponent(url), { method: "DELETE", headers: authHeaders() });
    state.favorites = state.favorites.filter(f => f.project_url !== url);
    renderFavorites();
  }

  async function updateFavStatus(url, status, btn) {
    if (btn) { btn.disabled = true; btn.classList.add('opacity-50'); }
    try {
      await fetch("/api/favorites/status?project_url=" + encodeURIComponent(url), {
        method: "PATCH",
        headers: Object.assign({"Content-Type": "application/json"}, authHeaders()),
        body: JSON.stringify({status: status})
      });
      // Update local state and re-render
      var item = state.favorites.find(f => f.project_url === url);
      if (item) { item.status = status; }
      renderFavorites();
      showToast('状态已更新', 'success');
    } catch (e) {
      showToast('更新失败', 'error');
    } finally {
      if (btn) { btn.disabled = false; btn.classList.remove('opacity-50'); }
    }
  }

  function openAnnotationModal(item) {
    state.annotationForm = {
      project_url: item.project_url,
      note: item.annotation?.note || "",
      priority: item.annotation?.priority || "normal",
      tags: item.annotation?.tags || [],
      tags_str: (item.annotation?.tags || []).join(", ")
    };
    annotationPriorityEl.value = state.annotationForm.priority;
    annotationNoteEl.value = state.annotationForm.note;
    annotationTagsEl.value = state.annotationForm.tags_str;
    modalEl.classList.remove('hidden');
  }

  function closeAnnotationModal() {
    modalEl.classList.add('hidden');
  }

  async function saveAnnotation() {
    var saveBtn = document.getElementById('saveAnnotationBtn');
    if (saveBtn) saveBtn.disabled = true;
    try {
      const tags = state.annotationForm.tags_str.split(",").map(t => t.trim()).filter(Boolean);
      await fetch("/api/annotations", {
        method: "POST",
        headers: Object.assign({"Content-Type": "application/json"}, authHeaders()),
        body: JSON.stringify({ ...state.annotationForm, tags })
      });
      closeAnnotationModal();
      await loadFavorites();
    } finally {
      if (saveBtn) saveBtn.disabled = false;
    }
  }

  // Event listeners
  filterEl.addEventListener('change', () => {
    state.filterStatus = filterEl.value;
    loadFavorites();
  });

  gridEl.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-remove]');
    if (btn) {
      const url = btn.getAttribute('data-remove');
      removeFavorite(url);
      return;
    }
    const btn2 = e.target.closest('button[data-annotate]');
    if (btn2) {
      const url = btn2.getAttribute('data-annotate');
      const item = state.favorites.find(f => f.project_url === url);
      if (item) openAnnotationModal(item);
      return;
    }
  });

  gridEl.addEventListener('change', (e) => {
    if (e.target.matches('select[data-status]')) {
      const url = e.target.getAttribute('data-status');
      const status = e.target.value;
      updateFavStatus(url, status, e.target);
    }
  });

  document.getElementById('cancelAnnotationBtn').addEventListener('click', closeAnnotationModal);
  document.getElementById('saveAnnotationBtn').addEventListener('click', saveAnnotation);
  annotationPriorityEl.addEventListener('change', () => { state.annotationForm.priority = annotationPriorityEl.value; });
  annotationNoteEl.addEventListener('input', () => { state.annotationForm.note = annotationNoteEl.value; });
  annotationTagsEl.addEventListener('input', () => { state.annotationForm.tags_str = annotationTagsEl.value; });

  document.getElementById('annotationModalContent').addEventListener('click', (e) => e.stopPropagation());
  modalEl.addEventListener('click', (e) => {
    if (e.target === modalEl) closeAnnotationModal();
  });

  // Init
  loadFavorites();
})();
</script>
{% endblock %}
