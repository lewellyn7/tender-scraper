{% extends "base.html" %}

{% block title %}数据管理 - 招投标采集系统{% endblock %}

{% block content %}
<div x-data="dataManagement()" x-init="loadData()">
    <!-- 筛选工具栏 -->
    <div class="bg-white rounded-lg shadow mb-6 p-4">
        <div class="flex flex-wrap items-center gap-4">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-sm font-medium text-gray-700 mb-1">关键词搜索</label>
                <input type="text" x-model="filters.keyword" @input="search()" placeholder="输入标题关键词..." 
                       class="w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            <div class="w-40">
                <label class="block text-sm font-medium text-gray-700 mb-1">分类</label>
                <select x-model="filters.category" @change="search()" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                    <option value="">全部</option>
                    <option value="政府采购">政府采购</option>
                    <option value="工程建设">工程建设</option>
                </select>
            </div>
            <div class="flex items-end">
                <button @click="exportExcel()" class="px-4 py-2 bg-green-600 text-white rounded-md">导出 Excel</button>
            </div>
        </div>
    </div>

    <!-- 数据表格 -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">标题</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">分类</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">发布日期</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">关键词</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <template x-for="item in projects" :key="item.id">
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-3 text-sm font-medium text-gray-900" x-text="item.title"></td>
                            <td class="px-4 py-3 text-sm text-gray-500" x-text="item.category"></td>
                            <td class="px-4 py-3 text-sm text-gray-500" x-text="item.publish_date"></td>
                            <td class="px-4 py-3 text-sm text-gray-500" x-text="item.keywords_matched || '-'"></td>
                            <td class="px-4 py-3 text-sm">
                                <a :href="item.url" target="_blank" class="text-blue-600 hover:text-blue-800">原文</a>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
function dataManagement() {
    return {
        projects: [],
        filters: { keyword: '', category: '' },
        
        async loadData() {
            try {
                const params = new URLSearchParams(this.filters);
                const res = await fetch('/api/projects?' + params);
                const data = await res.json();
                this.projects = data.data;
            } catch (e) { console.error(e); }
        },
        
        search() { this.loadData(); },
        exportExcel() { alert('导出功能开发中'); }
    };
}
</script>
{% endblock %}
