{% extends "base.html" %}
{% block title %}采集内容 - 招投标采集系统{% endblock %}
{% block content %}
<div id="dataApp" class="space-y-4">
  <!-- 页面标题+说明 -->
  <div class="flex items-center gap-2">
    <h1 class="text-xl font-bold text-gray-900 dark:text-white flex items-center gap-2">采集内容 <span class="help-btn" data-tooltip="采集内容页面

展示所有采集到的招标数据。支持表格/卡片两种视图切换，按关键词和类型筛选。

采集系统和自定义爬虫获取的数据会自动出现在此处。">?</span></h1>
  </div>
  <!-- 统计面板（ClickHouse 风格） -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
    <div class="bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-lg p-4">
      <div class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-1">全部采集</div>
      <p id="statTotal" class="text-5xl font-bold tracking-tight text-blue-600 dark:text-blue-400">—</p>
    </div>
    <div class="bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-lg p-4">
      <div class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-1">今日新增</div>
      <p id="statFiltered" class="text-5xl font-bold tracking-tight text-green-600 dark:text-green-400">—</p>
    </div>
    <div class="bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-lg p-4">
      <div class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-1">详情完整率<span class="help-btn" data-tooltip="代理指标: 最近 7 天 publish_date 中 full_content 非空占比

DB 暂无采集成功率数据（crawl_executions/task_executions 0 行）
待 collector 写入后切换为真实成功率">?</span></div>
      <p id="statRate" class="text-5xl font-bold tracking-tight text-yellow-600 dark:text-yellow-400">—</p>
    </div>
    <div class="bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-lg p-4">
      <div class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-1">本周采集<span class="help-btn" data-tooltip="按 ISO 周统计 (周一~周日, Asia/Shanghai): 本周累计采集项目总数">?</span></div>
      <p id="statWeekly" class="text-5xl font-bold tracking-tight text-gray-700 dark:text-gray-200">—</p>
    </div>
  </div>

  <!-- 工具栏 -->
  <div class="bg-white rounded-lg shadow p-4">
    <div class="flex flex-wrap items-end gap-3">
      <!-- 视图切换（表格/卡片） -->
      <div class="flex items-center gap-1">
        <div class="flex rounded-md overflow-hidden border border-gray-300">
          <button type="button" id="view-table" class="px-3 py-1.5 text-sm font-medium bg-blue-600 text-white" onclick="switchView('table')">表格</button>
          <button type="button" id="view-card" class="px-3 py-1.5 text-sm font-medium bg-white text-gray-600 dark:bg-gray-800 dark:text-gray-300" onclick="switchView('card')">卡片</button>
        </div>
        <span class="help-btn" data-tooltip="切换数据展示形式

• 表格：紧凑列表，方便快速浏览多条
• 卡片：突出标题和摘要，适合精读">?</span>
      </div>
      <!-- 关键词搜索 -->
      <div class="flex-1 min-w-[200px] flex items-center gap-1">
        <input type="text" id="searchKeyword" placeholder="搜索标题...（多关键词 / -排除）" class="w-full px-3 py-2 border border-gray-300 rounded-md dark:bg-gray-700 dark:border-gray-600">
        <span class="help-btn" data-tooltip="按标题 / 关键词标签 搜索

基础：
• 留空显示全部
• 按回车键触发
• 输入 / 也能快速聚焦到此框

多关键词（空格 或 逗号 分隔）：
• AI 智能      → 包含 AI 或 智能（OR）
• AI,智能,开源   → 逗号也能分隔

负关键词（前缀 -）：
• AI -音频      → 包含 AI 且不包含 音频
• AI 智能 -音频 -开源 → 多正多负组合

导出同步生效：表上看到的与 Excel/CSV 导出结果一致。">?</span>
      </div>
      <!-- 视图切换（逐条/按项目） -->
      <div class="flex items-center gap-1">
        <div class="flex rounded-md overflow-hidden border border-gray-300">
          <button type="button" id="view-item" class="px-3 py-1.5 text-sm font-medium bg-blue-600 text-white" onclick="switchProjectView('item')">逐条</button>
          <button type="button" id="view-project" class="px-3 py-1.5 text-sm font-medium bg-white text-gray-600 dark:bg-gray-800 dark:text-gray-300" onclick="switchProjectView('project')">按项目</button>
        </div>
        <span class="help-btn" data-tooltip="切换数据组织方式

• 逐条：每条采集记录一行/一卡
• 按项目：按项目编号聚合，显示项目维度的所有公告">?</span>
      </div>
      <!-- 类型筛选 -->
      <div class="w-36 flex items-center gap-1">
        <select id="filterType" class="w-full px-3 py-2 border border-gray-300 rounded-md dark:bg-gray-700 dark:border-gray-600">
          <option value="">全类型</option>
          <option value="政府采购">政府采购</option>
          <option value="工程招投标">工程招投标</option>
          <option value="医院采购">医院采购</option>
        </select>
        <span class="help-btn" data-tooltip="按业务大类筛选

• 政府采购：来自 CCGP，包含采购公告/结果等
• 工程招投标：来自 CQGGZY，包含招标/中标等
• 医院采购：来自重医附一院 (fahcqmu.cn)，包含医院采购公告

切换类型会重置右侧信息类型选项">?</span>
      </div>
      <!-- 信息类型筛选 -->
      <div class="w-36 flex items-center gap-1">
        <select id="filterInfoType" class="w-full px-3 py-2 border border-gray-300 rounded-md dark:bg-gray-700 dark:border-gray-600">
          <option value="">全部公示</option>
        </select>
        <span class="help-btn" data-tooltip="按公示类型细分筛选

选项随左侧业务类型联动：
• 政府采购 → 采购公告/答疑变更/结果/合同
• 工程招投标 → 招标/中标/补遗/计划

按项目视图下用于按 info_type 进一步过滤分组">?</span>
      </div>
      <!-- 日期筛选 -->
      <div class="flex items-center gap-2">
        <input type="date" id="filterDateStart" placeholder="开始日期" class="px-3 py-2 border border-gray-300 rounded-md text-sm dark:bg-gray-700 dark:border-gray-600">
        <span class="text-gray-500">-</span>
        <input type="date" id="filterDateEnd" placeholder="结束日期" class="px-3 py-2 border border-gray-300 rounded-md text-sm dark:bg-gray-700 dark:border-gray-600">
        <span class="help-btn" data-tooltip="按发布日期范围筛选

• 留空表示不限
• 格式：YYYY-MM-DD
• 改变日期会立即重新筛选
• 同样作用于导出 Excel">?</span>
      </div>
<!-- 关键词标签云 -->
  <div id="keywordCloud" class="flex flex-wrap gap-2 mt-3 px-1"></div>

  <!-- 导出 -->
      <button type="button" id="exportBtn" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">导出 Excel</button>
    </div>
  </div>

  <!-- 骨架屏 -->
  <div id="skeletonList" class="hidden space-y-3">
    <div class="bg-white rounded-lg h-20 animate-pulse"></div>
    <div class="bg-white rounded-lg h-20 animate-pulse"></div>
    <div class="bg-white rounded-lg h-20 animate-pulse"></div>
  </div>

  <!-- 项目分组视图 -->
  <div id="projectsGrid" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

  <!-- 卡片视图 -->
  <div id="cardsList" class="space-y-2 hidden"></div>

  <!-- 表格视图 -->
  <div id="tableView" class="bg-white rounded-lg shadow overflow-hidden">
    <div class="overflow-x-auto -ms-0.5">
      <table class="min-w-full divide-y divide-gray-200 table-fixed">
        <thead class="bg-gray-50">
          <tr>
            <th class="w-12 px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">收藏</th>
            <th class="w-80 px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">标题</th>
            <th class="w-24 px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">业务类型</th>
            <th class="w-28 px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">信息类型</th>
            <th class="w-28 px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">日期</th>
            <th class="w-24 px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">关键词</th>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">内容摘要</th>
            <th class="w-20 px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
          </tr>
        </thead>
        <tbody id="projectsTableBody" class="bg-white divide-y divide-gray-200">
        </tbody>
      </table>
    </div>
  </div>

  <!-- 空状态 -->
  <div id="emptyState" class="hidden flex flex-col items-center justify-center py-16 text-gray-400">
    <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
    <p class="text-lg font-medium">暂无数据</p>
    <p class="text-sm mt-1">调整筛选条件或等待采集任务执行</p>
  </div>

    <!-- 分页（进度条拖拉拽 + 数字跳转） -->
  <div id="pagination" class="hidden flex flex-col gap-3 px-4 py-3 bg-white rounded-lg shadow">
    <!-- 第一行: 每页条数 + 信息 + 跳转控件 -->
    <div class="flex flex-wrap items-center justify-between gap-3">
      <div class="flex items-center gap-2">
        <span class="text-xs text-gray-500">每页</span>
        <select id="pageSizeSelect" class="px-2 py-1 text-sm border rounded hover:bg-gray-50">
          <option value="10">10</option>
          <option value="20">20</option>
          <option value="50">50</option>
        </select>
        <span class="text-xs text-gray-500">条</span>
      </div>
      <p id="paginationInfo" class="text-xs text-gray-500"></p>
      <div class="flex items-center gap-1.5">
        <button type="button" id="prevPage" class="px-2.5 py-1.5 text-sm border rounded hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed" disabled title="上一页">‹</button>
        <input type="number" id="pageInput" value="1" min="1"
          class="w-14 px-2 py-1 text-sm text-center border rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
          title="输入页码后回车跳转" />
        <span class="text-xs text-gray-500">/ <span id="totalPagesLabel">1</span></span>
        <button type="button" id="nextPage" class="px-2.5 py-1.5 text-sm border rounded hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed" disabled title="下一页">›</button>
      </div>
    </div>
    <!-- 第二行: 进度条 (slider) -->
    <div class="flex items-center gap-2">
      <span class="text-xs text-gray-400 shrink-0">1</span>
      <input type="range" id="pageSlider" min="1" max="1" value="1" step="1"
        class="flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
        title="拖动滑块跳转到对应页" />
      <span class="text-xs text-gray-400 shrink-0" id="sliderMaxLabel">1</span>
    </div>
  </div>
</div>

<script>
(function() {
  var currentView = 'card';
  var currentPage = 1;
  var pageSize = parseInt(document.getElementById('pageSizeSelect').value, 10) || 20;
  var totalItems = 0;
  var totalPages = 0;
  var allItems = [];
  var filteredItems = [];
  var selectedKeyword = '';

  // DOM refs
  var skeletonEl = document.getElementById('skeletonList');
  var cardsEl = document.getElementById('cardsList');
  var tableEl = document.getElementById('tableView');
  var tableBodyEl = document.getElementById('projectsTableBody');
  var emptyEl = document.getElementById('emptyState');
  var paginationEl = document.getElementById('pagination');

  function showSkeleton(show) {
    if (show) {
      skeletonEl.classList.remove('hidden');
      cardsEl.classList.add('hidden');
      tableEl.classList.add('hidden');
      emptyEl.classList.add('hidden');
      paginationEl.classList.add('hidden');
    } else {
      skeletonEl.classList.add('hidden');
    }
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;');
  }
  function escAttr(str) {
    if (!str) return '';
    return String(str).replace(/"/g, '&quot;');
  }
  function truncate(str, len) {
    if (!str) return '';
    str = String(str);
    return str.length > len ? str.substring(0, len) + '…' : str;
  }

  function switchView(view) {
    currentView = view;
    document.getElementById('view-table').className = 'px-3 py-1.5 text-sm font-medium ' + (view === 'table' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 dark:bg-gray-800 dark:text-gray-300');
    document.getElementById('view-card').className = 'px-3 py-1.5 text-sm font-medium ' + (view === 'card' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 dark:bg-gray-800 dark:text-gray-300');
    localStorage.setItem('dataView', view);
    render();
  }

  var currentProjectView = 'item';

  function switchProjectView(view) {
    currentProjectView = view;
    document.getElementById('view-item').className = 'px-3 py-1.5 text-sm font-medium ' + (view === 'item' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 dark:bg-gray-800 dark:text-gray-300');
    document.getElementById('view-project').className = 'px-3 py-1.5 text-sm font-medium ' + (view === 'project' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 dark:bg-gray-800 dark:text-gray-300');
    if (view === 'project') {
      loadProjectGroups();
    } else {
      var projectsGrid = document.getElementById('projectsGrid');
      projectsGrid.classList.add('hidden');
      cardsEl.classList.remove('hidden');
      tableEl.classList.add('hidden');
    }
  }

  async function loadProjectGroups() {
    showSkeleton(true);
    try {
      // 传递当前筛选条件
      var typeFilter = document.getElementById('filterType').value || '';
      var qs = '?limit=200' + (typeFilter ? '&biz_type=' + encodeURIComponent(typeFilter) : '');
      var res = await authFetch('/api/projects/groups' + qs);
      if (!res.ok) throw new Error('请求失败');
      var data = await res.json();
      var groups = data.groups || data.data || [];
      // 前端按 info_type 进一步筛选
      var infoTypeFilter = document.getElementById('filterInfoType').value || '';
      if (infoTypeFilter) {
        groups = groups.filter(function(g) {
          return g.record_types && g.record_types.includes(infoTypeFilter);
        });
      }
      renderProjectGroups(groups);
    } catch(e) {
      console.error('加载项目分组失败:', e);
      var projectsGrid = document.getElementById('projectsGrid');
      projectsGrid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-8">加载失败，请重试</div>';
      projectsGrid.classList.remove('hidden');
      cardsEl.classList.add('hidden');
      tableEl.classList.add('hidden');
      skeletonEl.classList.add('hidden');
    }
  }

  function renderProjectGroups(groups) {
    showSkeleton(false);
    var projectsGrid = document.getElementById('projectsGrid');
    if (!groups || groups.length === 0) {
      projectsGrid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-8">暂无数据</div>';
      projectsGrid.classList.remove('hidden');
      cardsEl.classList.add('hidden');
      tableEl.classList.add('hidden');
      paginationEl.classList.add('hidden');
      return;
    }
    projectsGrid.classList.remove('hidden');
    cardsEl.classList.add('hidden');
    tableEl.classList.add('hidden');
    projectsGrid.innerHTML = groups.map(function(group) {
      var name = group.name || group.project_name || '-';
      var originalName = group.original_name || '';
      var code = group.code || group.project_code || '-';
      var bizType = group.business_type || group.biz_type || group.type || '-';
      var updateTime = group.updated_at || group.update_time || group.latest_date || '-';
      if (updateTime && updateTime.length > 10) updateTime = updateTime.slice(0, 10);
      var recordTypes = group.record_types || group.info_types || [];
      var count = group.count || group.record_count || 0;
      var overview = group.overview || '';
      var url = group.url || '';
      var typeBadges = recordTypes.map(function(t) {
        return '<span class="px-2 py-0.5 text-xs rounded bg-purple-100 text-purple-800 dark:bg-purple-900/30 dark:text-purple-300">' + escHtml(t) + '</span>';
      }).join('');
      // Hover tooltip: 优先用 title 属性（兼容所有浏览器），截断过长内容
      var titleText = overview ? overview.replace(/<[^>]+>/g, '').slice(0, 300) : '';
      var card = (
        '<div class="bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-xl p-4 hover:shadow-md transition-shadow relative group-card" data-group-idx="' + (groups.indexOf(group)) + '"' +
        (titleText ? ' title="' + escHtml(titleText.replace(/"/g, '"')) + '"' : '') + '>' +
          '<div class="flex items-start justify-between mb-2">' +
            '<div class="flex-1 min-w-0">' +
              '<h3 class="text-sm font-semibold text-gray-900 dark:text-white truncate" title="' + escHtml(name) + '">' + escHtml(name) + '</h3>' +
              (originalName && originalName !== name ? '<p class="text-xs text-gray-400 truncate mt-0.5" title="原始名称">原始: ' + escHtml(originalName) + '</p>' : '') +
            '</div>' +
            '<span class="ml-2 shrink-0 px-2 py-0.5 text-xs rounded-full bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300 font-medium cursor-pointer toggle-expand" data-group-idx="' + (groups.indexOf(group)) + '">' + count + '条 ▾</span>' +
          '</div>' +
          '<div class="space-y-1.5">' +
            '<div class="flex items-center gap-2 text-xs text-gray-500">' +
              '<span class="font-medium">编号:</span><span class="text-gray-700 dark:text-gray-300 truncate font-mono" title="' + escHtml(code) + '">' + escHtml(code) + '</span>' +
            '</div>' +
            '<div class="flex items-center gap-2 text-xs text-gray-500">' +
              '<span class="font-medium">业务:</span><span class="text-gray-700 dark:text-gray-300">' + escHtml(bizType) + '</span>' +
            '</div>' +
            (typeBadges ? '<div class="flex flex-wrap gap-1 mt-2">' + typeBadges + '</div>' : '') +
            '<div class="flex items-center gap-2 text-xs text-gray-400 mt-2">' +
              '<svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>' +
              '<span>更新: ' + escHtml(updateTime) + '</span>' +
            '</div>' +
          '</div>' +
          // P1-3a: 子公告展开面板 (默认隐藏)
          '<div class="group-children hidden mt-3 pt-3 border-t border-gray-200 dark:border-white/10" data-children-idx="' + (groups.indexOf(group)) + '"></div>' +
        '</div>'
      );
      return card;
    }).join('');

    // P1-3a: 绑定卡片点击展开子公告
    var cardEls = projectsGrid.querySelectorAll('.group-card');
    cardEls.forEach(function(cardEl) {
      var idx = cardEl.getAttribute('data-group-idx');
      var toggle = cardEl.querySelector('.toggle-expand');
      var handler = function(e) {
        // 避免重复触发 (toggle 内部 stopPropagation)
        if (e.target.closest('.group-children a')) return; // 子项点透传
        e.stopPropagation();
        var children = cardEl.querySelector('.group-children');
        if (children.classList.contains('hidden')) {
          // 展开
          var g = groups[parseInt(idx)];
          if (g && g.items && g.items.length > 0) {
            children.innerHTML = renderGroupChildren(g);
          } else {
            children.innerHTML = '<div class="text-xs text-gray-400 py-2">暂无子公告</div>';
          }
          children.classList.remove('hidden');
          if (toggle) toggle.textContent = g.count + '条 ▴';
        } else {
          // 折叠
          children.classList.add('hidden');
          if (toggle) toggle.textContent = g.count + '条 ▾';
        }
      };
      cardEl.addEventListener('click', handler);
    });
  }

  // P1-3a: 子公告列表渲染 (2026-06-19 排序改为纯 publish_date 倒序, 满足"最新优先")
  var INFO_TYPE_ORDER = ['招标公告', '招标计划', '资格预审公告', '答疑补遗', '补充公告', '澄清公告', '中标候选人公示', '中标结果公示', '中标公告', '终止公告', '变更公告', '流标公告', '其他'];
  function renderGroupChildren(g) {
    var items = (g.items || []).slice().sort(function(a, b) {
      // 纯按 publish_date 倒序 (最新在最上面), 同日按 id 倒序
      var dp = (b.publish_date || '').localeCompare(a.publish_date || '');
      if (dp !== 0) return dp;
      return (b.id || 0) - (a.id || 0);
    });
    var html = '<ul class="space-y-1.5">';
    items.forEach(function(it) {
      var date = it.publish_date && it.publish_date.length >= 10 ? it.publish_date.slice(0, 10) : '';

  // 2026-06-30: 渲染本周采集 Mon-Sun 7 格 mini bar (累计显示)
  // byDay: [Mon, Tue, Wed, Thu, Fri, Sat, Sun] 各日项目数 (后端返回的每日原始数)
  // dates: ["2026-06-29", ..., "2026-07-05"]
  // todayIdx: 0=Mon..6=Sun, undefined 时全部按历史样式
  // 显示: 每根柱高度 = 累计到该日的总数 (cumulative running total)
  //       例: byDay=[256,2,0,0,0,0,0] → 累计柱=[256, 258, 258, 258, 258, 258, 258]
  function renderKeywordCloud() {
    var kwMap = {};
    allItems.forEach(function(item) {
      var kw = item.keywords_matched || '';
      if (!kw) return;
      kw.split(/[,，]/).forEach(function(k) {
        k = k.trim();
        if (k) kwMap[k] = (kwMap[k] || 0) + 1;
      });
    });
    var tags = Object.keys(kwMap).sort(function(a, b) { return kwMap[b] - kwMap[a]; }).slice(0, 20);
    var cloud = document.getElementById('keywordCloud');
    if (!tags.length) { cloud.innerHTML = ''; return; }
    cloud.innerHTML = '<span class="text-xs text-gray-400 self-center">关键词：</span>' +
      tags.map(function(k) {
        var active = selectedKeyword === k ? ' bg-blue-600 text-white' : ' bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-blue-100';
        return '<button type="button" class="kw-tag px-2.5 py-1 text-xs rounded-full transition ' + active + '" data-kw="' + escAttr(k) + '">' + escHtml(k) + ' <span class="opacity-60">' + kwMap[k] + '</span></button>';
      }).join('');
    cloud.querySelectorAll('.kw-tag').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var k = this.dataset.kw;
        selectedKeyword = selectedKeyword === k ? '' : k;
        renderKeywordCloud();
        applyFilters();
      });
    });
  }

  function getInfoType(url) {
    if (!url) return '其他';
    if (url.includes('014005001')) return '采购公告';
    if (url.includes('014005002')) return '更正公告';
    if (url.includes('014005003')) return '废标公告';
    if (url.includes('014005004')) return '结果公告';

  // 解析多关键词 + 负关键词（与后端 app/utils/search_parser.py 保持一致）
  // 输入例: "AI 智能 -音频" -> {pos: ["ai","智能"], neg: ["音频"]}
  function parseSearchKeyword(raw) {
    if (!raw) return {pos: [], neg: []};
    // 折叠负号后多余空格（"AI - 音频" -> "AI -音频"）避免负号在 split 中脱落
    var s = raw.replace(/-\s+/g, '-').trim();
    var tokens = s.split(/[\s,]+/);
    var pos = [], neg = [], seenPos = {}, seenNeg = {};
    for (var i = 0; i < tokens.length; i++) {
      var t = tokens[i];
      if (!t) continue;
      var lower = t.toLowerCase();
      if (lower.charAt(0) === '-') {
        var n = lower.replace(/^-+/, '').trim();  // 去掉全部前导 - 避免 "---" 误判
        if (n && !seenNeg[n]) { seenNeg[n] = 1; neg.push(n); }
      } else {
        if (!seenPos[lower]) { seenPos[lower] = 1; pos.push(lower); }
      }
    }
    return {pos: pos, neg: neg};
  }

  // 判断单条记录是否通过关键词过滤
  // 规则：positives 任一命中 OR 通过（OR 逻辑），negatives 任一命中则排除
  function matchKeyword(textLower, pos, neg) {
    if (!pos.length && !neg.length) return true;
    if (pos.length && !pos.some(function(p) { return textLower.indexOf(p) !== -1; })) return false;
    if (neg.length && neg.some(function(n) { return textLower.indexOf(n) !== -1; })) return false;
    return true;
  }

  function applyFilters() {
    var kwRaw = document.getElementById('searchKeyword').value;
    var parsed = parseSearchKeyword(kwRaw);
    var type = document.getElementById('filterType').value;
    var infoType = document.getElementById('filterInfoType').value;
    var dateStart = document.getElementById('filterDateStart').value || '';
    var dateEnd = document.getElementById('filterDateEnd').value || '';
    filteredItems = allItems.filter(function(item) {
      // 关键词：拼 title + keywords_matched 后转小走 OR/AND-NOT 逻辑
      if (parsed.pos.length || parsed.neg.length) {
        var textLower = ((item.title || '') + ' ' + (item.keywords_matched || '')).toLowerCase();
        if (!matchKeyword(textLower, parsed.pos, parsed.neg)) return false;
      }
      if (type && (item.business_type || item.type || item.tender_type || '') !== type) return false;
      if (infoType && (item.info_type || '') !== infoType) return false;
      if (selectedKeyword && !(item.keywords_matched || '').includes(selectedKeyword)) return false;
      // 日期范围筛选（YYYY-MM-DD 字符串比较，格式一致即可正确排序）
      var itemDate = (item.publish_date || '').slice(0, 10);
      if (dateStart && itemDate && itemDate < dateStart) return false;
      if (dateEnd && itemDate && itemDate > dateEnd) return false;
      return true;
    });
    totalItems = filteredItems.length;
    totalPages = Math.ceil(totalItems / pageSize) || 1;
    currentPage = 1;
    render();
  }

  async function loadData() {
    showSkeleton(true);
    // ────── 阶段 0: localStorage cache (10ms) ──────
    var cached = getCachedData();
    if (cached && cached.items && cached.items.length > 0) {
      allItems = cached.items;
      renderKeywordCloud();
      applyFilters();
      var stEl = document.getElementById('statTotal');
      if (stEl && cached.total) stEl.textContent = cached.total.toLocaleString();
      console.log('[cache] 命中 localStorage:', cached.items.length, '条 (full=' + cached.total + ', fully_loaded=' + (cached.fully_loaded||false) + ')');
    }

    // ────── 阶段 1: /api/projects/latest?limit=1000 (50ms) ──────
    // 立即补足 1000 条 (L1 hit 0.1ms / L2 hit 30ms / cold 500ms)
    try {
      var latestRes = await authFetch('/api/projects/latest?limit=' + LATEST_LIMIT);
      if (latestRes.ok) {
        var latest = await latestRes.json();
        mergeLatestItems(latest.projects || []);
        applyFilters();
        saveCachedData(allItems.slice(0, CACHE_MAX_ITEMS), latest.projects[0] ? latest.projects[0].scraped_at : '', latest.total || allItems.length, cached && cached.fully_loaded || false);
        var stEl2 = document.getElementById('statTotal');
        if (stEl2 && latest.total) stEl2.textContent = latest.total.toLocaleString();
        console.log('[latest] fetch', allItems.length, '/', latest.total, '条 in', latest.elapsed_ms, 'ms (source=' + latest.source + ')');
        fetchStatsSummary();
      } else {
        console.warn('[latest] 端点返回', latestRes.status, '→ fallback stream');
        await loadDataStreamLegacy();
      }
    } catch(e) {
      console.error('[latest] 失败:', e);
      await loadDataStreamLegacy();
    }

    // ────── 阶段 2: 智能后台同步 ──────
    // 决策: 首次进入 / cache 未 fully_loaded → 后台 stream 全量
    //       已有 fully_loaded=true 的 cache → 后台 delta only (since lastSync)
    showSkeleton(false);
    renderKeywordCloud();
    applyFilters();
    backgroundSync(cached);
  }

  // 7-01: 合并 latest 项目到 allItems (按 scraped_at DESC, 去重)
  function mergeLatestItems(latestProjects) {
    var map = new Map();
    (latestProjects || []).forEach(function(p) { if (p && p.url) map.set(p.url, p); });
    if (allItems && allItems.length > 0) {
      allItems.forEach(function(p) { if (p && p.url && !map.has(p.url)) map.set(p.url, p); });
    }
    allItems = Array.from(map.values());
    // 截断上限 (防御性, 正常 stream 全量 ~110K 不会触发)
    if (allItems.length > MAX_ALL_ITEMS) allItems = allItems.slice(0, MAX_ALL_ITEMS);
    // 按 scraped_at DESC 排序
    allItems.sort(function(a, b) {
      return (b.scraped_at || '').localeCompare(a.scraped_at || '');
    });
  }

  // 7-01: 智能后台同步 — 首次 stream 全量, 后续 delta
  // 决策依据: localStorage cache 的 fully_loaded 字段
  function backgroundSync(cached) {
    var fullyLoaded = cached && cached.fully_loaded;
    var lastSync = cached ? (cached.last_sync_at || '') : '';
    // 决策表:
    //   first time (no cache)            → stream 全量
    //   cached but not fully_loaded       → stream 全量 (上次没下完)
    //   cached and fully_loaded           → delta only (since lastSync)
    if (!fullyLoaded) {
      console.log('[bg-sync] 首次 / 未完成 → 后台 stream 全量');
      streamFullBackground();
    } else {
      console.log('[bg-sync] 已 fully_loaded → 后台 delta since', lastSync);
      backgroundDeltaSync();
    }
  }

  // 后台 stream 全量 (用户首屏已看到 1000, 后台静默拉余下 108K)
  async function streamFullBackground() {
    try {
      var res = await authFetch('/api/projects?stream=1');
      if (!res.ok || !res.body) {
        console.warn('[stream-full] 失败:', res.status);
        return false;
      }
      var ct = res.headers.get('content-type') || '';
      if (ct.indexOf('ndjson') === -1) return false;

      var reader = res.body.getReader();
      var decoder = new TextDecoder('utf-8');
      var buffer = '';
      var totalExpected = 0;
      var streamItems = [];
      var startTime = Date.now();

      while (true) {
        var result = await reader.read();
        if (result.done) break;
        buffer += decoder.decode(result.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop();
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line) continue;
          try {
            var obj = JSON.parse(line);
            if (obj._meta) {
              if (typeof obj.total === 'number') totalExpected = obj.total;
              if (obj.done) {
                console.log('[stream-full] 完成', streamItems.length, '/', totalExpected, 'in', ((Date.now() - startTime) / 1000).toFixed(1), 's');
              }
            } else {
              streamItems.push(obj);
            }
          } catch(e) { /* skip */ }
        }
      }
      if (buffer.trim()) {
        try { var tail = JSON.parse(buffer); if (!tail._meta) streamItems.push(tail); } catch(e) {}
      }

      // 去重 + 合并
      var seen = new Set();
      streamItems = streamItems.filter(function(p) {
        if (!p || !p.url || seen.has(p.url)) return false;
        seen.add(p.url);
        return true;
      });
      // 合并 (latest 阶段已加 1000, 这里覆盖)
      var map = new Map();
      streamItems.forEach(function(p) { if (p && p.url) map.set(p.url, p); });
      allItems = Array.from(map.values());
      allItems.sort(function(a, b) {
        return (b.scraped_at || '').localeCompare(a.scraped_at || '');
      });

      var topScraped = allItems.length > 0 ? allItems[0].scraped_at : '';
      // 保存到 localStorage, 标记 fully_loaded=true
      saveCachedData(allItems.slice(0, CACHE_MAX_ITEMS), topScraped, allItems.length, true);
      // 更新 total
      var stEl = document.getElementById('statTotal');
      if (stEl) stEl.textContent = allItems.length.toLocaleString();
      applyFilters();
      console.log('[stream-full] allItems 已补全为', allItems.length, '条, 标 fully_loaded=true');
      return true;
    } catch(e) {
      console.error('[stream-full] 失败:', e);
      return false;
    }
  }

  // 7-01: 旧 stream 全量逻辑保留为 fallback (latest 端点失败时用)
  async function loadDataStreamLegacy() {
    try {
      var res = await authFetch('/api/projects?stream=1');
      if (!res.ok || !res.body) {
        // 不支持 stream → 原 JSON 路径
        var jsonRes = await authFetch('/api/projects?page_size=5000');
        var jsonData = await jsonRes.json();
        allItems = jsonData.projects || jsonData.data || [];
        return true;
      }
      // NDJSON stream 解析
      var reader = res.body.getReader();
      var decoder = new TextDecoder();
      var buffer = '';
      var startTime = Date.now();
      var yielded = 0;
      var totalExpected = 0;
      var streamAllItems = [];
      while (true) {
        var r = await reader.read();
        if (r.done) break;
        buffer += decoder.decode(r.value, {stream: true});
        var lines = buffer.split('\\n');
        buffer = lines.pop();
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line) continue;
          try {
            var obj = JSON.parse(line);
            if (obj._meta) {
              totalExpected = obj.total || 0;
            } else if (obj.done) {
              console.log('[stream-legacy] 完成 ' + yielded + ' 条 in ' + ((Date.now() - startTime) / 1000).toFixed(1) + 's');
            } else {
              streamAllItems.push(obj);
              yielded++;
            }
          } catch(e) { /* skip */ }
        }
      }
      // 去重
      var seen = new Set();
      streamAllItems = streamAllItems.filter(function(p) { if (!p || !p.url || seen.has(p.url)) return false; seen.add(p.url); return true; });
      allItems = streamAllItems;
      return true;
    } catch(e) {
      console.error('[stream-legacy] 失败:', e);
      return false;
    }
  }

  // 7-01: fetch /api/stats 填 today/weekly/success_rate/last_run
  function fetchStatsSummary() {
    fetch('/api/stats', {headers: authHeaders()})
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(stats) {
        if (!stats) return;
        var sw = document.getElementById('statWeekly');
        if (sw) sw.textContent = stats.weekly_count != null ? stats.weekly_count : '0';
        var sf = document.getElementById('statFiltered');
        if (sf) sf.textContent = stats.today != null ? stats.today : '0';
        var sr = document.getElementById('statRate');
        if (sr) sr.textContent = stats.success_rate || '—';
        var lr = document.getElementById('statLastRun');
        if (lr && stats.last_run) {
          var m = String(stats.last_run).match(/^(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2})/);
          lr.textContent = m ? m[1] : stats.last_run;
        }
      })
      .catch(function(e) { console.warn('[stats] 拉取失败:', e); });
  }

  // ── 6-30 缓存优化: localStorage 持久化首屏 (200 条轻量版) + 后台 delta 增量 ──
  var CACHE_KEY = 'tender_data_v1';
  var LATEST_LIMIT = 1000;          // 7-01: 首屏拉最新 1000 条 (服务端 L1 cache, <50ms)
  var MAX_ALL_ITEMS = 200000;      // 7-01: allItems 上限 (防御性, 远高于当前 ~110K 全量)
  var CACHE_MAX_ITEMS = 200;        // 200 条轻量版 ~1.2MB
  var CACHE_MAX_AGE_MS = 6 * 3600 * 1000;  // 6h 过期

  function getCachedData() {
    try {
      var raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      var cached = JSON.parse(raw);
      var age = Date.now() - (cached.saved_at || 0);
      if (age > CACHE_MAX_AGE_MS) return null;
      return cached;
    } catch(e) { return null; }
  }

  function saveCachedData(items, lastSyncAt, total, fullyLoaded) {
    try {
      // 轻量版: 去掉 content_preview / full_content 节省 90% 空间
      var lite = items.slice(0, CACHE_MAX_ITEMS).map(function(p) {
        return {
          title: p.title, url: p.url, source_url: p.source_url,
          publish_date: p.publish_date, publish_date_raw: p.publish_date_raw,
          tender_type: p.tender_type, business_type: p.business_type,
          budget: p.budget, region: p.region, scraped_at: p.scraped_at,
          keywords_matched: p.keywords_matched, info_type: p.info_type,
          is_favorite: p.is_favorite || false, _fid: p._fid || null,
          annotation: p.annotation || null
        };
      });
      localStorage.setItem(CACHE_KEY, JSON.stringify({
        saved_at: Date.now(),
        last_sync_at: lastSyncAt,
        total: total,
        items: lite
      }));
      console.log('[cache] saved', lite.length, 'items to localStorage');
    } catch(e) {
      console.warn('[cache] save 失败 (quota?):', e.message);
      // 容量满: 清掉重试 (用更少 items)
      try { localStorage.removeItem(CACHE_KEY); } catch(_) {}
    }
  }

  // 后台静默拉 delta 增量 (不阻塞首屏)
  function backgroundDeltaSync() {
    var cached = getCachedData();
    if (!cached) return;
    var since = cached.last_sync_at || '';
    if (!since) return;
    // 用 requestIdleCallback 包, 浏览器空闲时才拉
    var idle = window.requestIdleCallback || function(fn) { return setTimeout(fn, 1000); };
    idle(function() {
      fetch('/api/projects?delta=1&since=' + encodeURIComponent(since), {headers: authHeaders()})
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(d) {
          if (!d || !d.items || d.items.length === 0) {
            console.log('[delta] no new items since', since);
            return;
          }
          console.log('[delta] 新增', d.items.length, '条');
          // 合并: 新 items 在前, 去重
          var seen = new Set();
          var merged = [];
          d.items.concat(cached.items).forEach(function(p) {
            if (p && p.url && !seen.has(p.url)) {
              seen.add(p.url);
              merged.push(p);
            }
          });
          // 更新 total 字段
          allItems = merged.concat(allItems.slice(merged.length)).slice(0, 20000);
          // 更新 stats
          var sw = document.getElementById('statTotal');
          if (sw) sw.textContent = (cached.total + d.delta_count).toLocaleString();
          // 重新渲染 (后台)
          applyFilters();
          // 保存新 cache
          saveCachedData(merged, d.last_sync_at, cached.total + d.delta_count, cached.fully_loaded || false);
          // 用户提示 (不打扰, 仅 console)
          console.log('[delta] merged into', merged.length, 'items, total =', cached.total + d.delta_count);
        })
        .catch(function(e) { console.warn('[delta] failed:', e); });
    });
  }


  window.toggleFav = async function(e, url, isFav) {
    e.preventDefault();
    e.stopPropagation();
    var item = allItems.find(function(f) { return f.url === url; });
    if (!item) item = filteredItems.find(function(f) { return f.url === url; });
    try {
      var res;
      if (isFav) {
        var id = item && (item._fid || item.id);
        if (id) {
          res = await authFetch("/api/favorites/id/" + id, {method: "DELETE"});
        } else {
          res = await authFetch("/api/favorites?project_url=" + encodeURIComponent(url), {method: "DELETE"});
        }
      } else {
        // 收藏时从 item 取真实字段, 不能 hardcode title: ""
        // (之前 hardcode "" 导致 DB 存空 title, 收藏页显示空卡片)
        res = await authFetch("/api/favorites", {
          method: "POST",
          body: JSON.stringify({
            url: url,
            project_url: url,
            title: (item && item.title) || "",
            tender_type: (item && (item.tender_type || item.type)) || "",
            budget: (item && item.budget) || "",
            publish_date: (item && item.publish_date) || "",
            content_preview: (item && (item.content_preview || item.project_overview)) || "",
            source_url: (item && (item.source_url || item.url)) || url,
          })
        });
      }
      // 2026-06-11 fix(data-fav): 检查 res.ok, 避免 UI 假状态
      // 原因: fetch 4xx/5xx 不抛错, 之前成功 false 也被当成成功 toggle, 刷新后状态丢失
      if (!res || !res.ok) {
        var detail = '';
        try { var j = await res.json(); detail = j.detail || j.error || JSON.stringify(j); } catch(_) {}
        var msg = (isFav ? '取消收藏失败' : '收藏失败') + ' (' + (res ? res.status : 'no-response') + '): ' + detail;
        console.error(msg);
        if (typeof showToast === 'function') showToast(msg, 'error');
        return;  // 不 toggle, 不 render (避免 UI 假状态)
      }
      if (item) item.is_favorite = !isFav;
      render();
      if (typeof showToast === 'function') showToast(isFav ? '已取消收藏' : '已添加到收藏', 'success');
    } catch(err) {
      console.error('收藏操作失败', err);
      if (typeof showToast === 'function') showToast('收藏操作失败: ' + (err.message || err), 'error');
    }
  };

  window.switchView = switchView;

  // 信息类型选项随业务类型联动
  var INFO_OPTIONS = {
    '政府采购': [
      {value: '采购公告', label: '采购公告'},
      {value: '答疑变更', label: '答疑变更'},
      {value: '采购结果公告', label: '采购结果公告'},
      {value: '相关公告', label: '相关公告'},

    ],
    '工程招投标': [
      {value: '招标公告', label: '招标公告'},
      {value: '答疑补遗', label: '答疑补遗'},
      {value: '中标候选人公示', label: '中标候选人公示'},
      {value: '中标结果公示', label: '中标结果公示'},
      {value: '招标计划', label: '招标计划'},
      {value: '相关公告', label: '相关公告'},
      {value: '终止公告', label: '终止公告'},

    ]
  };
  function updateInfoTypeOptions() {
    var bizType = document.getElementById('filterType').value;
    var sel = document.getElementById('filterInfoType');
    // Reset to empty (全部公示) when switching business type
    sel.innerHTML = '<option value="">全部公示</option>';
    if (bizType && INFO_OPTIONS[bizType]) {
      INFO_OPTIONS[bizType].forEach(function(opt) {
        var o = document.createElement('option');
        o.value = opt.value;
        o.textContent = opt.label;
        sel.appendChild(o);
      });
    }
    sel.value = ''; // Always reset to 全部公示 on business type change
  }
  document.getElementById('filterType').addEventListener('change', function() {
    updateInfoTypeOptions();
    applyFilters();
    // 按项目视图下也重载分组
    if (currentProjectView === 'project') {
      loadProjectGroups();
    }
  });
  document.getElementById('pageSizeSelect').addEventListener('change', function() {
    currentPage = 1;
    pageSize = parseInt(document.getElementById('pageSizeSelect').value, 10) || 20;
    totalPages = Math.ceil(totalItems / pageSize) || 1;
    if (currentPage > totalPages) currentPage = totalPages;
    render();
  });
  document.getElementById('filterInfoType').addEventListener('change', function() {
    if (currentProjectView === 'project') {
      loadProjectGroups();
    } else {
      applyFilters();
    }
  });
  // 回车触发关键词搜索
  document.getElementById('searchKeyword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      applyFilters();
    }
  });
  // 日期范围 change 立即触发筛选（修复：之前日期筛选只对导出生效，列表不生效）
  document.getElementById('filterDateStart').addEventListener('change', applyFilters);
  document.getElementById('filterDateEnd').addEventListener('change', applyFilters);
  document.getElementById('exportBtn').addEventListener('click', function() {
    var token = localStorage.getItem('session_token') || '';
    var kw = document.getElementById('searchKeyword').value || '';
    var type = document.getElementById('filterType').value || '';
    var infoType = document.getElementById('filterInfoType').value || '';
    var dateStart = document.getElementById('filterDateStart').value || '';
    var dateEnd = document.getElementById('filterDateEnd').value || '';
    var params = 'session_token=' + encodeURIComponent(token);
    if (kw) params += '&keyword=' + encodeURIComponent(kw);
    if (type) params += '&category=' + encodeURIComponent(type);
    if (infoType) params += '&info_type=' + encodeURIComponent(infoType);
    if (dateStart) params += '&date_start=' + encodeURIComponent(dateStart);
    if (dateEnd) params += '&date_end=' + encodeURIComponent(dateEnd);
    window.location.href = '/api/export/csv?' + params;
  });
  document.getElementById('prevPage').addEventListener('click', function() { if (currentPage > 1) { currentPage--; render(); } });
  document.getElementById('nextPage').addEventListener('click', function() { if (currentPage < totalPages) { currentPage++; render(); } });

  // 数字输入框跳转 (Enter 或 blur 触发)
  var pageInputEl = document.getElementById('pageInput');
  pageInputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); goPage(this.value); this.blur(); }
  });
  pageInputEl.addEventListener('blur', function() {
    var v = parseInt(this.value, 10);
    if (!isNaN(v) && v >= 1 && v <= totalPages) goPage(v);
    else this.value = currentPage;  // 越界回滚到 currentPage
  });
  pageInputEl.addEventListener('focus', function() { this.select(); });

  // 进度条 slider 拖动跳转
  var sliderEl = document.getElementById('pageSlider');
  var sliderThrottle = null;
  sliderEl.addEventListener('input', function() {
    var v = parseInt(this.value, 10);
    if (v === currentPage) return;
    // 节流: 拖动时只更新 currentPage + render, 不滚动 (避免抖动)
    currentPage = v;
    if (sliderThrottle) return;
    sliderThrottle = setTimeout(function() { sliderThrottle = null; render(); }, 80);
  });
  sliderEl.addEventListener('change', function() {
    // 拖动结束: 强制 render 一次 (可能节流掉了末次)
    if (sliderThrottle) { clearTimeout(sliderThrottle); sliderThrottle = null; }
    currentPage = parseInt(this.value, 10);
    render();
  });

  // Restore view preference
  var savedView = localStorage.getItem('dataView');
  if (savedView) { currentView = savedView; }
  document.getElementById('view-table').className = 'px-3 py-1.5 text-sm font-medium ' + (currentView === 'table' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 dark:bg-gray-800 dark:text-gray-300');
  document.getElementById('view-card').className = 'px-3 py-1.5 text-sm font-medium ' + (currentView === 'card' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 dark:bg-gray-800 dark:text-gray-300');

  loadData();

  // Keyboard shortcuts (DESIGN.md 6.5)
  document.addEventListener('keydown', function(e) {
    // '/' focuses search when not in input
    if (e.key === '/' && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) {
      e.preventDefault();
      document.getElementById('searchKeyword').focus();
    }
    // 'G then D' → Dashboard
    // 'C' → collect (navigate to /api/collect)
  });
})();
</script>
