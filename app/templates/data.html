{% extends "base.html" %}
{% block title %}数据管理 - 招投标采集系统{% endblock %}
{% block content %}
<div id="dataApp">
  <!-- 筛选工具栏 -->
  <div class="bg-white rounded-lg shadow mb-6 p-4">
    <div class="flex flex-wrap items-center gap-4">
      <div class="flex-1 min-w-[200px]">
        <label class="block text-sm font-medium text-gray-700 mb-1">关键词搜索</label>
        <input type="text" id="keywordInput" placeholder="输入标题关键词..." class="w-full px-3 py-2 border border-gray-300 rounded-md">
      </div>
      <div class="w-40">
        <label class="block text-sm font-medium text-gray-700 mb-1">分类</label>
        <select id="categorySelect" class="w-full px-3 py-2 border border-gray-300 rounded-md">
          <option value="">全部</option>
          <option value="政府采购">政府采购</option>
          <option value="工程建设">工程建设</option>
        </select>
      </div>
      <div class="flex items-end">
        <button type="button" id="exportBtn" class="px-4 py-2 bg-green-600 text-white rounded-md">导出 Excel</button>
      </div>
    </div>
  </div>

  <!-- 数据表格 -->
  <div class="bg-white rounded-lg shadow overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">标题</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">分类</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">发布日期</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">关键词</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
          </tr>
        </thead>
        <tbody id="projectsTableBody" class="bg-white divide-y divide-gray-200">
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
(function() {
  const state = {
    projects: [],
    filters: { keyword: '', category: '' }
  };

  const tableBodyEl = document.getElementById('projectsTableBody');
  const keywordInputEl = document.getElementById('keywordInput');
  const categorySelectEl = document.getElementById('categorySelect');
  const exportBtnEl = document.getElementById('exportBtn');

  async function loadData() {
    const params = new URLSearchParams();
    if (state.filters.keyword) params.set('keyword', state.filters.keyword);
    if (state.filters.category) params.set('category', state.filters.category);
    
    try {
      const qs = params.toString();
      const res = await authFetch('/api/projects' + (qs ? '?' + qs : ''));
      const data = await res.json();
      state.projects = data.projects || data.data || [];
      renderTable();
    } catch (e) {
      console.error('加载数据失败:', e);
      if (typeof showToast === 'function') showToast('加载失败', 'error');
    }
  }

  function renderTable() {
    if (state.projects.length === 0) {
      tableBodyEl.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">暂无数据</td></tr>';
      return;
    }
    
    tableBodyEl.innerHTML = state.projects.map(item => `
      <tr class="hover:bg-gray-50">
        <td class="px-4 py-3 text-sm font-medium text-gray-900">${item.title || ''}</td>
        <td class="px-4 py-3 text-sm text-gray-500">${item.category || item.tender_type || '-'}</td>
        <td class="px-4 py-3 text-sm text-gray-500">${item.publish_date || '-'}</td>
        <td class="px-4 py-3 text-sm text-gray-500">${item.keywords_matched || '-'}</td>
        <td class="px-4 py-3 text-sm">
          <a href="${item.url}" target="_blank" class="text-blue-600 hover:text-blue-800">原文</a>
        </td>
      </tr>
    `).join('');
  }

  // Event listeners
  keywordInputEl.addEventListener('input', () => {
    state.filters.keyword = keywordInputEl.value;
    loadData();
  });

  categorySelectEl.addEventListener('change', () => {
    state.filters.category = categorySelectEl.value;
    loadData();
  });

  exportBtnEl.addEventListener('click', () => {
    window.location.href = '/api/export';
  });

  // Init
  loadData();
})();
</script>
{% endblock %}
