{% extends "base.html" %}
{% block title %}重庆烟草 · 采集系统{% endblock %}
{% block content %}

<!-- 头部 + 健康检查 -->
<div class="flex items-center justify-between mb-6">
    <div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">🚬 重庆烟草</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
            来源：<a href="https://www.966599.com/c/4/" target="_blank" class="text-blue-600 dark:text-blue-400 hover:underline">966599.com</a>
            · 5 分类 · 全量采集 ~3150 条
        </p>
    </div>
    <div class="flex items-center gap-2">
        <div id="health-dot" class="w-2 h-2 rounded-full bg-gray-300"></div>
        <span class="text-xs text-gray-500 dark:text-gray-400" id="health-label">检测中…</span>
    </div>
</div>

<!-- 统计卡片 (5 张) -->
<div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 px-3 py-2">
        <p class="text-xs text-gray-500 dark:text-gray-400">总项目数</p>
        <p class="text-xl font-semibold text-gray-900 dark:text-white mt-1" id="stat-total">—</p>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 px-3 py-2">
        <p class="text-xs text-gray-500 dark:text-gray-400">结果公示</p>
        <p class="text-xl font-semibold text-blue-600 dark:text-blue-400 mt-1" id="stat-result">—</p>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 px-3 py-2">
        <p class="text-xs text-gray-500 dark:text-gray-400">采购公告</p>
        <p class="text-xl font-semibold text-emerald-600 dark:text-emerald-400 mt-1" id="stat-purchase">—</p>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 px-3 py-2">
        <p class="text-xs text-gray-500 dark:text-gray-400">变更/流标</p>
        <p class="text-xl font-semibold text-orange-600 dark:text-orange-400 mt-1" id="stat-change">—</p>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 px-3 py-2">
        <p class="text-xs text-gray-500 dark:text-gray-400">招租公告</p>
        <p class="text-xl font-semibold text-purple-600 dark:text-purple-400 mt-1" id="stat-rental">—</p>
    </div>
</div>

<!-- 筛选栏 -->
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 p-4 mb-6">
    <div class="flex flex-wrap items-center gap-3">
        <input id="kw" type="text" placeholder="关键词 (title / content_preview)" class="flex-1 min-w-[200px] px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg text-sm" />

        <select id="infoType" class="px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg text-sm">
            <option value="">全部类型</option>
            <option value="result_notice">结果公示</option>
            <option value="purchase_notice">采购公告</option>
            <option value="change_notice">变更公告</option>
            <option value="failed_notice">流标</option>
            <option value="rental_notice">招租公告</option>
        </select>

        <input type="date" id="dateStart" class="px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg text-sm" title="起始日期" />
        <span class="text-gray-500">→</span>
        <input type="date" id="dateEnd" class="px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg text-sm" title="结束日期" />

        <button id="btnSearch" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium">搜索</button>
        <button id="btnClear" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg text-sm">清除</button>
    </div>
</div>

<!-- 项目列表 -->
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
    <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-700 flex items-center justify-between">
        <h2 class="text-sm font-semibold text-gray-900 dark:text-white">项目列表 <span class="text-gray-400 ml-1" id="list-count">(—)</span></h2>
        <div class="flex items-center gap-2">
            <button id="btnPrev" class="px-2 py-1 text-xs rounded bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 disabled:opacity-30" disabled>← 上一页</button>
            <span class="text-xs text-gray-500" id="page-info">第 1 页</span>
            <button id="btnNext" class="px-2 py-1 text-xs rounded bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 disabled:opacity-30" disabled>下一页 →</button>
        </div>
    </div>

    <div id="project-list" class="divide-y divide-gray-100 dark:divide-gray-700">
        <div class="px-4 py-12 text-center text-gray-400 text-sm">加载中…</div>
    </div>
</div>

<!-- 详情模态框 -->
<div id="detail-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onclick="if(event.target===this)closeDetail()">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-3xl w-full max-h-[85vh] overflow-y-auto">
        <div class="sticky top-0 bg-white dark:bg-gray-800 border-b border-gray-100 dark:border-gray-700 px-6 py-4 flex items-center justify-between">
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white" id="detail-title">详情</h3>
            <button onclick="closeDetail()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-2xl leading-none">&times;</button>
        </div>
        <div class="px-6 py-4" id="detail-body">
            <p class="text-gray-400 text-sm">加载中…</p>
        </div>
        <div class="px-6 py-3 border-t border-gray-100 dark:border-gray-700 flex justify-end">
            <a id="detail-link" href="#" target="_blank" rel="noopener" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium">打开原文 ↗</a>
        </div>
    </div>
</div>

<script>
// ─── 全局状态 ───────────────────────────────────────────────────────────────
const cqycState = {
    page: 1,
    pageSize: 50,
    total: 0,
    keyword: "",
    infoType: "",
    dateStart: "",
    dateEnd: "",
};

// ─── 工具函数 ─────────────────────────────────────────────────────────────
function formatDate(iso) {
    if (!iso) return "";
    return iso.slice(0, 10);
}

function getGenericType(infoType) {
    const map = {
        "result_notice": "结果公示",
        "purchase_notice": "采购公告",
        "change_notice": "变更公告",
        "failed_notice": "流标",
        "rental_notice": "招租公告",
    };
    return map[infoType] || "其他";
}

// ─── API 调用 ──────────────────────────────────────────────────────────────
async function fetchHealth() {
    const res = await fetch("/api/cqyc/health");
    const d = await res.json();
    const dot = document.getElementById("health-dot");
    const label = document.getElementById("health-label");
    if (d.status === "ok") {
        dot.className = "w-2 h-2 rounded-full bg-green-500";
        label.textContent = `${d.total_rows.toLocaleString()} 条 · ${formatDate(d.last_scraped_at)}`;
    } else {
        dot.className = "w-2 h-2 rounded-full bg-red-500";
        label.textContent = d.error || "异常";
    }
}

async function fetchStats() {
    const res = await fetch("/api/cqyc/stats");
    const d = await res.json();
    document.getElementById("stat-total").textContent = d.total.toLocaleString();
    document.getElementById("stat-result").textContent = (d.by_info_type["result_notice"] || 0).toLocaleString();
    document.getElementById("stat-purchase").textContent = (d.by_info_type["purchase_notice"] || 0).toLocaleString();
    document.getElementById("stat-change").textContent = ((d.by_info_type["change_notice"] || 0) + (d.by_info_type["failed_notice"] || 0)).toLocaleString();
    document.getElementById("stat-rental").textContent = (d.by_info_type["rental_notice"] || 0).toLocaleString();
}

async function fetchProjects() {
    const params = new URLSearchParams({
        page: cqycState.page.toString(),
        page_size: cqycState.pageSize.toString(),
    });
    if (cqycState.keyword) params.set("keyword", cqycState.keyword);
    if (cqycState.infoType) params.set("info_type", cqycState.infoType);
    if (cqycState.dateStart) params.set("date_start", cqycState.dateStart);
    if (cqycState.dateEnd) params.set("date_end", cqycState.dateEnd);

    const res = await fetch(`/api/cqyc/projects?${params}`);
    const d = await res.json();
    cqycState.total = d.total;
    renderList(d.items);
    renderPagination(d.page, d.has_more);
}

// ─── 渲染 ──────────────────────────────────────────────────────────────────
function renderList(items) {
    const container = document.getElementById("project-list");
    if (!items || items.length === 0) {
        container.innerHTML = `<div class="px-4 py-12 text-center text-gray-400 text-sm">暂无数据</div>`;
        document.getElementById("list-count").textContent = "(0)";
        return;
    }

    document.getElementById("list-count").textContent = `(${cqycState.total.toLocaleString()})`;

    const html = items.map(p => {
        const typeBadge = getGenericType(p.info_type);
        const date = formatDate(p.publish_date) || formatDate(p.scraped_at) || "—";
        const preview = (p.content_preview || "").slice(0, 120);
        return `
            <div class="px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-700/50 cursor-pointer" onclick="openDetail('${encodeURIComponent(p.url)}')">
                <div class="flex items-start justify-between gap-3">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="px-2 py-0.5 rounded text-[10px] font-medium bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300">${typeBadge}</span>
                            <span class="text-xs text-gray-400">${date}</span>
                        </div>
                        <h3 class="text-sm font-medium text-gray-900 dark:text-white truncate">${p.title}</h3>
                        ${preview ? `<p class="text-xs text-gray-500 dark:text-gray-400 mt-1 line-clamp-2">${preview}</p>` : ""}
                    </div>
                    <svg class="w-5 h-5 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </div>
            </div>
        `;
    }).join("");

    container.innerHTML = html;
}

function renderPagination(page, hasMore) {
    const info = document.getElementById("page-info");
    const btnPrev = document.getElementById("btnPrev");
    const btnNext = document.getElementById("btnNext");

    info.textContent = `第 ${page} 页 / 共 ${Math.ceil(cqycState.total / cqycState.pageSize)} 页`;
    btnPrev.disabled = page <= 1;
    btnNext.disabled = !hasMore;
}

// ─── 详情 ──────────────────────────────────────────────────────────────────
async function openDetail(encodedUrl) {
    const url = decodeURIComponent(encodedUrl);
    const modal = document.getElementById("detail-modal");
    const titleEl = document.getElementById("detail-title");
    const bodyEl = document.getElementById("detail-body");
    const linkEl = document.getElementById("detail-link");

    modal.classList.remove("hidden");
    titleEl.textContent = "加载中…";
    bodyEl.innerHTML = `<p class="text-gray-400 text-sm">加载中…</p>`;

    try {
        const res = await fetch(`/api/cqyc/project/${encodeURIComponent(url)}`);
        const p = await res.json();
        if (p.error) throw new Error(p.error);

        titleEl.textContent = p.title;
        const typeBadge = getGenericType(p.info_type);
        const date = formatDate(p.publish_date) || "—";

        bodyEl.innerHTML = `
            <div class="flex items-center gap-2 mb-3">
                <span class="px-2 py-1 rounded text-xs font-medium bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300">${typeBadge}</span>
                <span class="text-xs text-gray-400">${date}</span>
            </div>
            ${p.project_no ? `<p class="text-xs text-gray-500 mb-2"><strong>项目编号:</strong> ${p.project_no}</p>` : ""}
            ${p.budget ? `<p class="text-xs text-gray-500 mb-2"><strong>预算:</strong> ${p.budget}</p>` : ""}
            ${p.full_content ? `<div class="prose dark:prose-invert max-w-none text-sm">${p.full_content.split("\n").map(para => `<p>${para}</p>`).join("")}</div>` : "<p class='text-gray-400 text-sm'>暂无正文</p>"}
        `;

        linkEl.href = p.url;
    } catch (e) {
        bodyEl.innerHTML = `<p class="text-red-500 text-sm">加载失败：${e.message}</p>`;
    }
}

function closeDetail() {
    document.getElementById("detail-modal").classList.add("hidden");
}

// ─── 事件绑定 ──────────────────────────────────────────────────────────────
document.getElementById("btnSearch").addEventListener("click", () => {
    cqycState.keyword = document.getElementById("kw").value.trim();
    cqycState.infoType = document.getElementById("infoType").value;
    cqycState.dateStart = document.getElementById("dateStart").value;
    cqycState.dateEnd = document.getElementById("dateEnd").value;
    cqycState.page = 1;
    fetchProjects();
});

document.getElementById("btnClear").addEventListener("click", () => {
    document.getElementById("kw").value = "";
    document.getElementById("infoType").value = "";
    document.getElementById("dateStart").value = "";
    document.getElementById("dateEnd").value = "";
    cqycState.keyword = "";
    cqycState.infoType = "";
    cqycState.dateStart = "";
    cqycState.dateEnd = "";
    cqycState.page = 1;
    fetchProjects();
});

document.getElementById("btnPrev").addEventListener("click", () => {
    if (cqycState.page > 1) {
        cqycState.page--;
        fetchProjects();
    }
});

document.getElementById("btnNext").addEventListener("click", () => {
    if (cqycState.total > cqycState.page * cqycState.pageSize) {
        cqycState.page++;
        fetchProjects();
    }
});

// ─── 初始化 ────────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
    fetchHealth();
    fetchStats();
    fetchProjects();
});
</script>

{% endblock %}
