{% extends "base.html" %}
{% block content %}
<div class="toast-container" id="toastContainer"></div>

  <div class="flex justify-between items-center mb-6">
    <div class="flex items-center gap-4">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
        <span id="pageTitle">数据分析</span>
        <span class="help-btn" data-tooltip="基于收藏项目的统计分析

展示采集趋势、预算分布、来源占比、关键词热度。帮助了解招标市场动态，发现优质采购机会。">?</span>
      </h1>
      <!-- Tab Switcher -->
      <div class="flex rounded-lg border border-gray-200 dark:border-gray-700 overflow-hidden text-sm">
        <button type="button" id="tabStats" class="px-4 py-1.5 bg-blue-600 text-white font-medium" onclick="switchTab('stats')">📊 统计</button>
        <button type="button" id="tabHealth" class="px-4 py-1.5 bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700" onclick="switchTab('health')">💚 健康度</button>
      </div>
    </div>
    <div class="flex gap-3 items-center">
      <label class="text-sm text-gray-600 dark:text-gray-400" id="daysLabel">统计周期:</label>
      <select id="daysSelect" class="border rounded px-3 py-1.5 text-sm bg-white dark:bg-gray-800 dark:border-gray-600">
        <option value="7">近7天</option>
        <option value="14">近14天</option>
        <option value="30" selected>近30天</option>
        <option value="60">近60天</option>
        <option value="90">近90天</option>
      </select>
      <button type="button" id="refreshBtn" class="px-3 py-1.5 bg-blue-600 text-white rounded text-sm hover:bg-blue-700">刷新</button>
    </div>
  </div>

  <!-- NL Query Filter Banner (shown when ?q= is in URL) -->
  <div id="nlQueryBanner" class="hidden mb-4 flex items-center justify-between bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-xl px-4 py-3">
    <div class="flex items-center gap-2 text-sm text-blue-700 dark:text-blue-300">
      <span>🔍</span>
      <span>当前显示关键词「<strong id="nlQueryText"></strong>」的统计结果</span>
    </div>
    <div class="flex gap-2">
      <a href="/nl-query" class="text-xs px-3 py-1 bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300 rounded-lg hover:bg-blue-200 dark:hover:bg-blue-800 transition">← 返回查询</a>
      <button type="button" id="clearNlQuery" class="text-xs px-3 py-1 text-gray-400 hover:text-gray-600 transition">× 清除</button>
    </div>
  </div>

  <!-- Summary Cards -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
    <div class="bg-white dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700">
      <p class="text-sm text-gray-500 dark:text-gray-400">采集项目</p>
      <p class="text-2xl font-bold text-blue-600 dark:text-blue-400" id="statTotal">0</p>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700">
      <p class="text-sm text-gray-500 dark:text-gray-400">政府项目</p>
      <p class="text-2xl font-bold text-green-600 dark:text-green-400" id="govCount">0</p>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700">
      <p class="text-sm text-gray-500 dark:text-gray-400">工程项目</p>
      <p class="text-2xl font-bold text-purple-600 dark:text-purple-400" id="engCount">0</p>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700">
      <p class="text-sm text-gray-500 dark:text-gray-400">有预算项目</p>
      <p class="text-2xl font-bold text-amber-600 dark:text-amber-400" id="budgetCount">0</p>
    </div>
  </div>

  <div id="loadingEl" class="text-center py-12 text-gray-500">加载中...</div>
  <div id="contentEl" class="space-y-6" style="display:none">
    <!-- Trend Chart -->
    <div class="anim-card bg-white dark:bg-gray-800 rounded-xl p-6 border border-gray-200 dark:border-gray-700">
      <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4 flex items-center gap-2">采集趋势 <span class="help-btn" data-tooltip="每日采集数量随时间变化

展示过去一段时间内每天新增的招标项目数量。用于判断市场活跃周期和评估采集效率。">?</span></h2>
      <div id="trend_chart" class="h-64"></div>
    </div>

    <div class="grid md:grid-cols-2 gap-6">
      <!-- Budget Distribution -->
      <div class="anim-card bg-white dark:bg-gray-800 rounded-xl p-6 border border-gray-200 dark:border-gray-700">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4 flex items-center gap-2">预算分布 <span class="help-btn" data-tooltip="项目预算金额分布

按金额区间统计招标项目数量。便于快速筛选预算合理的机会，避免投入过高或过低的项目。">?</span></h2>
        <div id="budget_chart" class="h-64"></div>
      </div>

      <!-- Source Distribution -->
      <div class="anim-card bg-white dark:bg-gray-800 rounded-xl p-6 border border-gray-200 dark:border-gray-700">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4 flex items-center gap-2">来源分布 <span class="help-btn" data-tooltip="招标信息来源分布

统计收藏项目来自哪些网站（如政府采购网、公共资源交易中心等）。了解主要招标渠道分布。">?</span></h2>
        <div id="source_chart" class="h-64"></div>
      </div>
    </div>

    <!-- Keyword Heat -->
    <div class="anim-card bg-white dark:bg-gray-800 rounded-xl p-6 border border-gray-200 dark:border-gray-700">
      <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4 flex items-center gap-2">关键词热度 TOP20 <span class="help-btn" data-tooltip="标题关键词热度排行

从收藏项目标题中提取出现频率最高的20个关键词。反映当前招标市场的热点领域和主题趋势。">?</span></h2>
      <div id="keywordHeatContainer" class="flex flex-wrap gap-2"></div>
      <p id="keywordHeatEmpty" class="text-gray-400 text-sm" style="display:none">暂无数据</p>
    </div>
  </div>

  <!-- ═══════════════════ HEALTH DASHBOARD ═══════════════════ -->
  <div id="healthContent" class="space-y-6" style="display:none">
    <!-- Overall Score + Metric Cards -->
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-6" id="healthCards">
      <!-- injected by JS -->
    </div>

    <!-- Radar + Trend -->
    <div class="grid md:grid-cols-2 gap-6">
      <div class="anim-card bg-white dark:bg-gray-800 rounded-xl p-6 border border-gray-200 dark:border-gray-700">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">健康度雷达图</h2>
        <div id="healthRadarChart" class="h-64"></div>
      </div>
      <div class="anim-card bg-white dark:bg-gray-800 rounded-xl p-6 border border-gray-200 dark:border-gray-700">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">综合得分趋势</h2>
        <div class="flex gap-2 mb-4">
          <button type="button" id="trend7dBtn" class="px-3 py-1 text-xs rounded border border-blue-600 text-blue-600 bg-blue-50 dark:bg-blue-900/20" onclick="loadHealthTrend(7)">7天</button>
          <button type="button" id="trend30dBtn" class="px-3 py-1 text-xs rounded border border-gray-300 dark:border-gray-600 text-gray-500" onclick="loadHealthTrend(30)">30天</button>
        </div>
        <div id="healthTrendChart" class="h-56"></div>
      </div>
    </div>

    <!-- Alert Banner -->
    <div id="healthAlertBanner" class="hidden anim-card bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-xl px-5 py-4">
      <div class="flex items-start gap-3">
        <span class="text-2xl">⚠️</span>
        <div>
          <p class="font-semibold text-amber-800 dark:text-amber-200 mb-1">健康度告警</p>
          <ul id="healthAlertList" class="text-sm text-amber-700 dark:text-amber-300 space-y-1"></ul>
        </div>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// === Analytics Vanilla JS ===
(function() {
  // State
  const state = {
    days: '30',
    stats: {},
    trend: {},
    budgetDist: {},
    keywordHeat: {},
    sourceDist: {},
    maxKwCount: 1,
    charts: {},
  };

  // DOM refs
  const els = {
    daysSelect: document.getElementById('daysSelect'),
    refreshBtn: document.getElementById('refreshBtn'),
    loadingEl: document.getElementById('loadingEl'),
    contentEl: document.getElementById('contentEl'),
    statTotal: document.getElementById('statTotal'),
    govCount: document.getElementById('govCount'),
    engCount: document.getElementById('engCount'),
    budgetCount: document.getElementById('budgetCount'),
    kwContainer: document.getElementById('keywordHeatContainer'),
    kwEmpty: document.getElementById('keywordHeatEmpty'),
  };

  // Init: handle ?q= NL query filter
  (function() {
    var params = new URLSearchParams(window.location.search);
    var q = params.get('q');
    if (q) {
      var banner = document.getElementById('nlQueryBanner');
      var text = document.getElementById('nlQueryText');
      text.textContent = q;
      banner.classList.remove('hidden');
      document.getElementById('clearNlQuery').addEventListener('click', function() {
        window.location.href = '/analytics';
      });
    }
  })();

  async function loadAnalytics() {
    els.loadingEl.style.display = 'block';
    els.contentEl.style.display = 'none';

    try {
      const res = await authFetch('/api/analytics?days=' + state.days);
      const data = await res.json();

      state.stats = data;
      state.trend = data.trends || [];
      state.budgetDist = data.budget_dist || [];
      state.keywordHeat = data.keyword_heat || {};
      state.sourceDist = data.source_dist || {};

      updateSummary();
      renderCharts();
      renderKeywordHeat();
    } finally {
      els.loadingEl.style.display = 'none';
      els.contentEl.style.display = 'block';
    }
  }

  function updateSummary() {
    const s = state.stats.summary || {};
    els.statTotal.textContent = s.total || 0;
    els.budgetCount.textContent = state.budgetDist.reduce(function(r, n) { return r + (n.count || 0); }, 0);
    els.govCount.textContent = '-';
    els.engCount.textContent = '-';
  }

  function getKwClass(count) {
    var ratio = count / state.maxKwCount;
    if (ratio > 0.7) return "bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-200";
    if (ratio > 0.4) return "bg-orange-100 text-orange-700 dark:bg-orange-900 dark:text-orange-200";
    if (ratio > 0.2) return "bg-yellow-100 text-yellow-700 dark:bg-yellow-900 dark:text-yellow-200";
    return "bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-200";
  }

  function renderKeywordHeat() {
    var kws = state.keywordHeat;
    var keys = Object.keys(kws);
    state.maxKwCount = Math.max(1, Math.max.apply(null, Object.values(kws)));

    if (keys.length === 0) {
      els.kwContainer.style.display = 'none';
      els.kwEmpty.style.display = 'block';
      return;
    }
    els.kwContainer.style.display = 'flex';
    els.kwEmpty.style.display = 'none';

    els.kwContainer.innerHTML = '';
    keys.forEach(function(kw) {
      var count = kws[kw];
      var ratio = count / state.maxKwCount;
      var fontSize = (0.7 + ratio * 0.6).toFixed(2);
      var span = document.createElement('span');
      span.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-medium ' + getKwClass(count);
      span.style.fontSize = fontSize + 'rem';
      span.textContent = kw + ' ' + count;
      els.kwContainer.appendChild(span);
    });
  }

  function destroyCharts() {
    Object.values(state.charts).forEach(function(c) { if (c) c.destroy(); });
    state.charts = {};
  }

  function renderCharts() {
    destroyCharts();
    renderTrendChart();
    renderBudgetChart();
    renderSourceChart();
  }

  function renderTrendChart() {
    var el = document.getElementById('trend_chart');
    if (!el) return;
    var trend = Array.isArray(state.trend) ? state.trend : [];
    var labels = trend.map(function(t) { return t.date || ''; });
    var totals = trend.map(function(t) { return t.count || 0; });
    var ctx = el.getContext('2d');
    state.charts.trend = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: '采集数量',
          data: totals,
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59,130,246,0.1)',
          tension: 0.3,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { precision: 0 } }
        }
      }
    });
  }

  function renderBudgetChart() {
    var el = document.getElementById('budget_chart');
    if (!el) return;
    var dist = Array.isArray(state.budgetDist) ? state.budgetDist : [];
    var labels = dist.map(function(d) { return d.range || ''; });
    var data = dist.map(function(d) { return d.count || 0; });
    var ctx = el.getContext('2d');
    state.charts.budget = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: labels,
        datasets: [{
          data: data,
          backgroundColor: ['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6']
        }]
      },
      options: { responsive: true, maintainAspectRatio: false }
    });
  }

  function renderSourceChart() {
    var el = document.getElementById('source_chart');
    if (!el) return;
    var dist = Array.isArray(state.sourceDist) ? state.sourceDist.slice(0, 8) : [];
    var labels = dist.map(function(d) { return (d.source || '').replace('www.',''); });
    var data = dist.map(function(d) { return d.count || 0; });
    var ctx = el.getContext('2d');
    state.charts.source = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{ label: '项目数', data: data, backgroundColor: '#6366f1' }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: {
          x: { beginAtZero: true, ticks: { precision: 0 } }
        }
      }
    });
  }

  // Event listeners
  els.daysSelect.addEventListener('change', function() {
    state.days = this.value;
    loadAnalytics();
  });
  els.refreshBtn.addEventListener('click', function() {
    // Refresh current tab
    if (typeof window.switchTab === 'function') {
      var healthContent = document.getElementById('healthContent');
      if (healthContent && healthContent.style.display !== 'none') {
        loadHealth();
        return;
      }
    }
    loadAnalytics();
  });

  // Bootstrap
  document.addEventListener('DOMContentLoaded', loadAnalytics);

  // ── Health Dashboard ──────────────────────────────────────────
  (function() {
    var healthState = {
      data: null,
      trendDays: 7,
      charts: {},
    };

    var METRIC_KEYS = [
      'crawl_success_rate', 'crawl_avg_latency_ms',
      'crawl_items_per_hour', 'self_heal_rate', 'ban_escape_rate',
    ];
    var METRIC_COLORS = [
      '#22c55e', '#f59e0b', '#3b82f6', '#8b5cf6', '#ec4899',
    ];

    function switchTab(tab) {
      var isStats = tab === 'stats';
      document.getElementById('contentEl').style.display = isStats ? '' : 'none';
      document.getElementById('healthContent').style.display = isStats ? 'none' : '';
      document.getElementById('tabStats').className = isStats
        ? 'px-4 py-1.5 bg-blue-600 text-white font-medium'
        : 'px-4 py-1.5 bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700';
      document.getElementById('tabHealth').className = !isStats
        ? 'px-4 py-1.5 bg-blue-600 text-white font-medium'
        : 'px-4 py-1.5 bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700';
      document.getElementById('daysSelect').style.display = isStats ? '' : 'none';
      document.getElementById('daysLabel').style.display = isStats ? '' : 'none';
      document.getElementById('pageTitle').textContent = isStats ? '数据分析' : '💚 健康度仪表盘';
      if (!isStats && !healthState.data) loadHealth();
    }
    window.switchTab = switchTab;

    function loadHealth() {
      authFetch('/api/analytics/health')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          healthState.data = data;
          renderHealthCards(data.metrics);
          renderHealthRadar(data.metrics);
          renderHealthTrend(healthState.trendDays);
          renderHealthAlerts(data.alerts);
        })
        .catch(function(e) { console.error('health load error', e); });
    }

    function loadHealthTrend(days) {
      healthState.trendDays = days;
      document.getElementById('trend7dBtn').className = days === 7
        ? 'px-3 py-1 text-xs rounded border border-blue-600 text-blue-600 bg-blue-50 dark:bg-blue-900/20'
        : 'px-3 py-1 text-xs rounded border border-gray-300 dark:border-gray-600 text-gray-500';
      document.getElementById('trend30dBtn').className = days === 30
        ? 'px-3 py-1 text-xs rounded border border-blue-600 text-blue-600 bg-blue-50 dark:bg-blue-900/20'
        : 'px-3 py-1 text-xs rounded border border-gray-300 dark:border-gray-600 text-gray-500';
      renderHealthTrend(days);
    }
    window.loadHealthTrend = loadHealthTrend;

    function renderHealthCards(metrics) {
      var container = document.getElementById('healthCards');
      var score = healthState.data ? healthState.data.overall_score : 0;
      var color = score >= 80 ? 'green' : score >= 60 ? 'amber' : 'red';
      var scoreLabel = score >= 80 ? '优秀' : score >= 60 ? '一般' : '需关注';
      var scoreColor = score >= 80 ? 'text-green-600 dark:text-green-400' : score >= 60 ? 'text-amber-600 dark:text-amber-400' : 'text-red-600 dark:text-red-400';

      var html = '<div class="bg-white dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700 col-span-2 md:col-span-3 lg:col-span-1 flex flex-col justify-center">' +
        '<p class="text-sm text-gray-500 dark:text-gray-400">综合健康度</p>' +
        '<p class="text-4xl font-bold ' + scoreColor + '">' + score.toFixed(1) + '</p>' +
        '<p class="text-xs text-gray-400 mt-1">' + scoreLabel + '</p></div>';

      var colorMap = {
        crawl_success_rate: 'blue', crawl_avg_latency_ms: 'amber',
        crawl_items_per_hour: 'purple', self_heal_rate: 'green', ban_escape_rate: 'pink',
      };
      METRIC_KEYS.forEach(function(key) {
        var m = metrics[key];
        if (!m) return;
        var val = m.value;
        var displayVal = key.includes('rate') ? (val * 100).toFixed(1) + '%' :
                         key.includes('latency') ? val.toFixed(0) + 'ms' :
                         val.toFixed(1);
        var c = colorMap[key] || 'gray';
        html += '<div class="bg-white dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700">' +
          '<p class="text-sm text-gray-500 dark:text-gray-400">' + m.label + '</p>' +
          '<p class="text-2xl font-bold text-' + c + '-600 dark:text-' + c + '-400">' + displayVal + '</p>' +
          '<div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5 mt-2">' +
          '<div class="bg-' + c + '-500 h-1.5 rounded-full" style="width:' + Math.min(100, m.score) + '%"></div></div>' +
          '<p class="text-xs text-gray-400 mt-1">目标: ' + (key.includes('rate') ? (m.target * 100).toFixed(0) + '%' : m.target + m.unit) + '</p></div>';
      });
      container.innerHTML = html;
    }

    function renderHealthRadar(metrics) {
      var el = document.getElementById('healthRadarChart');
      if (!el) return;
      var ctx = el.getContext('2d');
      if (healthState.charts.radar) healthState.charts.radar.destroy();

      var labels = METRIC_KEYS.map(function(k) { return metrics[k] ? metrics[k].label : k; });
      var scores = METRIC_KEYS.map(function(k) { return metrics[k] ? metrics[k].score : 0; });

      healthState.charts.radar = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: labels,
          datasets: [{
            label: '健康度',
            data: scores,
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59,130,246,0.15)',
            pointBackgroundColor: METRIC_COLORS,
            pointRadius: 4,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            r: {
              beginAtZero: true,
              max: 100,
              ticks: { stepSize: 20, display: false },
              grid: { color: 'rgba(128,128,128,0.15)' },
            }
          },
          plugins: { legend: { display: false } },
        }
      });
    }

    function renderHealthTrend(days) {
      var el = document.getElementById('healthTrendChart');
      if (!el || !healthState.data) return;
      var ctx = el.getContext('2d');
      if (healthState.charts.trend) healthState.charts.trend.destroy();

      var trends = days === 7 ? (healthState.data.trends_7d || []) : (healthState.data.trends_30d || []);
      var labels = trends.map(function(t) { return t.date || ''; });
      var scores = trends.map(function(t) { return t.overall_score || 0; });

      healthState.charts.trend = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: '健康度评分',
            data: scores,
            borderColor: '#22c55e',
            backgroundColor: 'rgba(34,197,94,0.1)',
            tension: 0.3,
            fill: true,
            spanGaps: true,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: false, min: 0, max: 100, ticks: { precision: 0 } },
            x: { ticks: { maxRotation: 45, minRotation: 45 } },
          }
        }
      });
    }

    function renderHealthAlerts(alerts) {
      var banner = document.getElementById('healthAlertBanner');
      var list = document.getElementById('healthAlertList');
      if (!alerts || alerts.length === 0) {
        banner.classList.add('hidden');
        return;
      }
      banner.classList.remove('hidden');
      list.innerHTML = '';
      alerts.forEach(function(a) {
        var li = document.createElement('li');
        li.textContent = a;
        list.appendChild(li);
      });
    }

    // Expose to window for tab switching
    window.loadHealth = loadHealth;
  })();
})();
</script>
{% endblock %}
