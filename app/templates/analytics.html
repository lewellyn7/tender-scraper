{% extends "base.html" %}
{% block content %}
<div class="toast-container" id="toastContainer"></div>
<div x-data="analyticsApp()" x-init="init()">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">数据分析</h1>
    <div class="flex gap-3 items-center">
      <label class="text-sm text-gray-600 dark:text-gray-400">统计周期:</label>
      <select x-model="days" @change="loadAnalytics()" class="border rounded px-3 py-1.5 text-sm bg-white dark:bg-gray-800 dark:border-gray-600">
        <option value="7">近7天</option>
        <option value="14">近14天</option>
        <option value="30">近30天</option>
        <option value="60">近60天</option>
        <option value="90">近90天</option>
      </select>
      <button @click="loadAnalytics()" class="px-3 py-1.5 bg-blue-600 text-white rounded text-sm hover:bg-blue-700">刷新</button>
    </div>
  </div>

  <!-- Summary Cards -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
    <div class="bg-white dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700">
      <p class="text-sm text-gray-500 dark:text-gray-400">采集项目</p>
      <p class="text-2xl font-bold text-blue-600 dark:text-blue-400" x-text="stats.total_count || 0"></p>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700">
      <p class="text-sm text-gray-500 dark:text-gray-400">政府项目</p>
      <p class="text-2xl font-bold text-green-600 dark:text-green-400" x-text="govCount"></p>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700">
      <p class="text-sm text-gray-500 dark:text-gray-400">工程项目</p>
      <p class="text-2xl font-bold text-purple-600 dark:text-purple-400" x-text="engCount"></p>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700">
      <p class="text-sm text-gray-500 dark:text-gray-400">有预算项目</p>
      <p class="text-2xl font-bold text-amber-600 dark:text-amber-400" x-text="budgetCount"></p>
    </div>
  </div>

  <div x-show="loading" class="text-center py-12 text-gray-500">加载中...</div>
  <div x-show="!loading" class="space-y-6">
    <!-- Trend Chart -->
    <div class="anim-card bg-white dark:bg-gray-800 rounded-xl p-6 border border-gray-200 dark:border-gray-700">
      <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">采购趋势</h2>
      <div id="trend_chart" class="h-64"></div>
      <div class="flex gap-4 mt-4 text-sm">
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-blue-500"></span> 总数</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-green-500"></span> 政府</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-purple-500"></span> 工程</span>
      </div>
    </div>

    <div class="grid md:grid-cols-2 gap-6">
      <!-- Budget Distribution -->
      <div class="anim-card bg-white dark:bg-gray-800 rounded-xl p-6 border border-gray-200 dark:border-gray-700">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">预算分布</h2>
        <div id="budget_chart" class="h-64"></div>
      </div>

      <!-- Source Distribution -->
      <div class="anim-card bg-white dark:bg-gray-800 rounded-xl p-6 border border-gray-200 dark:border-gray-700">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">来源分布</h2>
        <div id="source_chart" class="h-64"></div>
      </div>
    </div>

    <!-- Keyword Heat -->
    <div class="anim-card bg-white dark:bg-gray-800 rounded-xl p-6 border border-gray-200 dark:border-gray-700">
      <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">关键词热度 TOP20</h2>
      <div class="flex flex-wrap gap-2" x-show="keywordHeat && Object.keys(keywordHeat).length">
        <template x-for="(count, kw) in keywordHeat" :key="kw">
          <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium"
                :class="getKwClass(count)"
                :style="\'font-size:\' + (0.7 + count / maxKwCount * 0.6) + \'rem\'"
                x-text="kw + \' \' + count">
          </span>
        </template>
      </div>
      <p x-show="!keywordHeat || Object.keys(keywordHeat).length === 0" class="text-gray-400 text-sm">暂无数据</p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
function analyticsApp() {
  return {
    days: "30",
    loading: false,
    stats: {},
    trend: {},
    budgetDist: {},
    keywordHeat: {},
    sourceDist: {},
    maxKwCount: 1,
    charts: {},
    async init() { await this.loadAnalytics(); },
    async loadAnalytics() {
      this.loading = true;
      try {
        const res = await fetch("/api/analytics?days=" + this.days);
        const data = await res.json();
        this.stats = data;
        this.trend = data.trend || {};
        this.budgetDist = data.budget_dist || {};
        this.keywordHeat = data.keyword_heat || {};
        this.sourceDist = data.source_dist || {};
        this.maxKwCount = Math.max(1, ...Object.values(this.keywordHeat || {}));
        this.renderCharts();
      } finally { this.loading = false; }
    },
    get govCount() {
      return Object.values(this.trend).reduce((s, d) => s + (d.gov || 0), 0);
    },
    get engCount() {
      return Object.values(this.trend).reduce((s, d) => s + (d.eng || 0), 0);
    },
    get budgetCount() {
      return Object.values(this.budgetDist).reduce((s, n) => s + n, 0);
    },
    getKwClass(count) {
      const ratio = count / this.maxKwCount;
      if (ratio > 0.7) return "bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-200";
      if (ratio > 0.4) return "bg-orange-100 text-orange-700 dark:bg-orange-900 dark:text-orange-200";
      if (ratio > 0.2) return "bg-yellow-100 text-yellow-700 dark:bg-yellow-900 dark:text-yellow-200";
      return "bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-200";
    },
    renderCharts() {
      this.renderTrendChart();
      this.renderBudgetChart();
      this.renderSourceChart();
    },
    renderTrendChart() {
      const el = document.getElementById("trend_chart");
      if (!el) return;
      if (this.charts.trend) this.charts.trend.destroy();
      const sorted = Object.keys(this.trend).sort();
      const ctx = el.getContext("2d");
      this.charts.trend = new Chart(ctx, {
        type: "line",
        data: {
          labels: sorted,
          datasets: [
            { label: "总数", data: sorted.map(d => this.trend[d]?.total || 0), borderColor: "#3b82f6", backgroundColor: "rgba(59,130,246,0.1)", tension: 0.3, fill: true },
            { label: "政府", data: sorted.map(d => this.trend[d]?.gov || 0), borderColor: "#22c55e", tension: 0.3 },
            { label: "工程", data: sorted.map(d => this.trend[d]?.eng || 0), borderColor: "#a855f7", tension: 0.3 }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });
    },
    renderBudgetChart() {
      const el = document.getElementById("budget_chart");
      if (!el) return;
      if (this.charts.budget) this.charts.budget.destroy();
      const ctx = el.getContext("2d");
      this.charts.budget = new Chart(ctx, {
        type: "doughnut",
        data: {
          labels: Object.keys(this.budgetDist),
          datasets: [{ data: Object.values(this.budgetDist), backgroundColor: ["#3b82f6","#22c55e","#f59e0b","#ef4444","#8b5cf6"] }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    },
    renderSourceChart() {
      const el = document.getElementById("source_chart");
      if (!el) return;
      if (this.charts.source) this.charts.source.destroy();
      const entries = Object.entries(this.sourceDist).slice(0, 8);
      const ctx = el.getContext("2d");
      this.charts.source = new Chart(ctx, {
        type: "bar",
        data: {
          labels: entries.map(e => e[0].replace("www.","")),
          datasets: [{ label: "项目数", data: entries.map(e => e[1]), backgroundColor: "#6366f1" }]
        },
        options: { responsive: true, maintainAspectRatio: false, indexAxis: "y", plugins: { legend: { display: false } } }
      });
    }
  }
}
</script>
{% endblock %}
