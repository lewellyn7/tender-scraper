{% extends "base.html" %}
{% block content %}
<div class="toast-container" id="toastContainer"></div>
<div id="logsApp">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">运行日志</h1>
    <div class="flex gap-3 items-center">
      <select id="levelFilter" class="border rounded px-3 py-1.5 text-sm bg-white dark:bg-gray-800 dark:border-gray-600">
        <option value="">全部级别</option>
        <option value="INFO">INFO</option>
        <option value="WARNING">WARNING</option>
        <option value="ERROR">ERROR</option>
      </select>
      <input type="number" id="limitInput" value="200" min="50" max="500" class="border rounded px-3 py-1.5 text-sm w-24 bg-white dark:bg-gray-800 dark:border-gray-600">
      <span class="text-sm text-gray-500 dark:text-gray-400">条</span>
      <button type="button" id="refreshBtn" class="px-3 py-1.5 bg-blue-600 text-white rounded text-sm hover:bg-blue-700">刷新</button>
      <button type="button" id="clearBtn" class="px-3 py-1.5 bg-red-600 text-white rounded text-sm hover:bg-red-700">清理</button>
    </div>
  </div>

  <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 overflow-hidden">
    <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 grid grid-cols-4 gap-4 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">
      <span>时间</span><span>级别</span><span>来源</span><span>消息</span>
    </div>
    <div id="loadingState" class="text-center py-12 text-gray-500 hidden">加载中...</div>
    <div id="emptyState" class="text-center py-12 text-gray-400 hidden">暂无日志</div>
    <div id="logsContainer" class="max-h-[70vh] overflow-y-auto"></div>
  </div>
</div>
<script>
  // Auth helper

(function() {
  const state = { logs: [], levelFilter: "", limit: 200, loading: false };

  const loadingEl = document.getElementById('loadingState');
  const emptyEl = document.getElementById('emptyState');
  const containerEl = document.getElementById('logsContainer');
  const levelFilterEl = document.getElementById('levelFilter');
  const limitEl = document.getElementById('limitInput');

  function formatTime(t) {
    if (!t) return "-";
    return t.replace("T", " ").slice(0, 19);
  }

  function getLevelClass(level) {
    return { ERROR: "text-red-600 dark:text-red-400", WARNING: "text-yellow-600 dark:text-yellow-400", INFO: "text-green-600 dark:text-green-400" }[level] || "text-gray-500";
  }

  function getRowBgClass(level) {
    return { ERROR: "bg-red-50 dark:bg-red-950/30", WARNING: "bg-yellow-50 dark:bg-yellow-950/30", INFO: "bg-green-50 dark:bg-green-950/30" }[level] || "";
  }

  function renderLogs() {
    loadingEl.classList.add('hidden');
    if (state.logs.length === 0) {
      emptyEl.classList.remove('hidden');
      containerEl.classList.add('hidden');
      return;
    }
    emptyEl.classList.add('hidden');
    containerEl.classList.remove('hidden');
    containerEl.innerHTML = state.logs.map(log => {
      const bgClass = getRowBgClass(log.log_level);
      const levelClass = getLevelClass(log.log_level);
      return `<div class="px-4 py-2 border-b border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50 grid grid-cols-4 gap-4 text-sm items-center ${bgClass}">
        <span class="text-xs text-gray-500 dark:text-gray-400 font-mono">${formatTime(log.created_at)}</span>
        <span class="font-mono font-bold text-xs ${levelClass}">${log.log_level || ''}</span>
        <span class="text-xs text-gray-500 dark:text-gray-400">${log.source || ''}</span>
        <span class="text-gray-700 dark:text-gray-300 text-xs break-all">${log.message || ''}</span>
      </div>`;
    }).join('');
  }

  async function loadLogs() {
    state.loading = true;
    loadingEl.classList.remove('hidden');
    emptyEl.classList.add('hidden');
    containerEl.classList.add('hidden');
    try {
      const url = "/api/logs?limit=" + state.limit + (state.levelFilter ? "&level=" + state.levelFilter : "");
      const res = await fetch(url, {headers: authHeaders()});
      const data = await res.json();
      state.logs = data.logs || [];
    } catch(e) {
      if (typeof showToast === 'function') showToast('加载失败', 'error');
    } finally {
      state.loading = false;
      renderLogs();
    }
  }

  async function clearLogs() {
    if (!confirm("确认清理7天前的日志?")) return;
    await fetch("/api/logs?before_days=7", { method: "DELETE", headers: authHeaders() });
    await loadLogs();
  }

  levelFilterEl.addEventListener('change', () => {
    state.levelFilter = levelFilterEl.value;
    loadLogs();
  });

  limitEl.addEventListener('change', () => {
    state.limit = parseInt(limitEl.value) || 200;
    loadLogs();
  });

  document.getElementById('refreshBtn').addEventListener('click', loadLogs);
  document.getElementById('clearBtn').addEventListener('click', clearLogs);

  loadLogs();
})();
</script>
{% endblock %}
