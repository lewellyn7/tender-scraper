[tool.black]
line-length = 100
target-version = ["py310"]
include = '.pyi?$'
extend-exclude = '''
/(
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["app"]
skip = [".venv", "build", "dist"]

[tool.ruff]
line-length = 100
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "build",
    "dist",
    ".skills",        # OpenClaw workspace
    ".openclaw",     # OpenClaw config
    "backups",       # Backup files not in use
    "archive",       # Archived old versions
    "scripts/deploy-webhook.py",  # Standalone webhook script
]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
ignore = [
    "E501",   # line too long
    "E402",   # module level import not at top (intentional for config patterns)
    "F821",   # undefined name (forward references in type hints)
    "F841",   # unused local variable (minor)
    "E722",   # bare except (legacy code)
    "N802",   # function name casing (Chinese test names in legacy tests)
    "N999",   # invalid module name (webhook script)
    "N805",   # first argument naming (legacy async code)
    "E712",   # equality comparison to True/False (test assertions)
    "F401",   # unused import (conditional imports for optional deps)
    # pre-existing on main (PR #64 之前就有, 与 cache 优化无关, 不应阻断 build):
    "N806",   # variable in function should be lowercase (legacy UPPER_CASE constants)
    "W291",   # trailing whitespace (legacy code)
    "W293",   # whitespace on blank line (legacy code)
    "E702",   # multiple statements on one line (semicolon, legacy one-liners)
    "E741",   # ambiguous variable name 'l/I/O' (legacy code)
    "I001",   # import block unsorted (legacy imports)
    "F541",   # f-string missing placeholders (legacy logger messages)
    "E401",   # multiple imports on one line (legacy import style)
    "W292",   # missing newline at end of file (legacy files)
    "F811",   # redefined while unused (legacy test fixtures)
    "E701",   # multiple statements on one line (colon) (legacy one-liners)
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
