# ============================================================
# 招投标采集系统 - 生产部署配置
# ============================================================
services:
  # --- Web API 服务 ---
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: tender-scraper-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
      - scraper-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - tender-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # --- 定时采集任务 (用同一个镜像，通过 command 区分) ---
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: tender-scraper-scheduler
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler"]
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
      - scraper-data:/app/data
    networks:
      - tender-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    depends_on:
      web:
        condition: service_healthy

  # --- Prometheus 监控 ---
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: tender-scraper-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - tender-net

  # --- Grafana 可视化 ---
  grafana:
    image: grafana/grafana:10.4.2
    container_name: tender-scraper-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - tender-net
    depends_on:
      - prometheus

  # --- 告警 Webhook 服务 (可选) ---
  alertmgr:
    image: prom/alertmanager:v0.27.0
    container_name: tender-scraper-alertmgr
    restart: unless-stopped
    ports:
      - "9093:9093"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmgr-data:/alertmanager
    networks:
      - tender-net
    depends_on:
      - prometheus

  # --- Redis 缓存服务 ---
  redis:
    image: redis:7.2-alpine
    container_name: tender-scraper-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - tender-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

# ============================================================
# 网络
# ============================================================
networks:
  tender-net:
    driver: bridge

# ============================================================
# 持久化卷
# ============================================================
volumes:
  scraper-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmgr-data:
    driver: local
