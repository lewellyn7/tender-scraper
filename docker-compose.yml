# ============================================================
# 招投标采集系统 - 生产部署配置
# ============================================================
services:
  # --- PostgreSQL + pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tender-scraper-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-root}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-root123}
      - POSTGRES_DB=${DB_NAME:-tender_scraper}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_vectors.sql:/docker-entrypoint-initdb.d/03-vectors.sql:ro
      - ./scripts/init_harvest.sql:/docker-entrypoint-initdb.d/04-harvest.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-root} -d ${DB_NAME:-tender_scraper}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tender-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # --- Web API 服务 ---
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: tender-scraper-web
    restart: unless-stopped
    ports:
      - "8888:8000"
    environment:
      - TZ=Asia/Shanghai
      - PORT=8000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DATABASE_URL=postgresql://${DB_USER:-root}:${DB_PASSWORD:-root123}@postgres:5432/${DB_NAME:-tender_scraper}
      - RAGFLOW_MCP_URL=http://host.docker.internal:9382
      - RAGFLOW_API_KEY=ragflow-Z95CAjDHSyKZflHv6xMD6SXvmjdkSzCZCZK5BSyQcSw
      - RAGFLOW_BASE_URL=http://host.docker.internal:8088
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
      - scraper-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8888/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - tender-net
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # --- 定时采集任务 (用同一个镜像，通过 command 区分) ---
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: tender-scraper-scheduler
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler"]
    environment:
      - TZ=Asia/Shanghai
      - PORT=8000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DATABASE_URL=postgresql://${DB_USER:-root}:${DB_PASSWORD:-root123}@postgres:5432/${DB_NAME:-tender_scraper}
      - RAGFLOW_MCP_URL=http://host.docker.internal:9382
      - RAGFLOW_API_KEY=ragflow-Z95CAjDHSyKZflHv6xMD6SXvmjdkSzCZCZK5BSyQcSw
      - RAGFLOW_BASE_URL=http://host.docker.internal:8088
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
      - scraper-data:/app/data
    networks:
      - tender-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres-data:
  scraper-data:

networks:
  tender-net:
    driver: bridge
