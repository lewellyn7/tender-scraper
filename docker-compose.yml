services:
  redis:
    image: redis:7-alpine
    container_name: tender-scraper-redis
    restart: unless-stopped
    ports:
    - 6381:6379
    volumes:
    - redis-data:/data
    command: 'redis-server --requirepass ${REDIS_PASSWORD:-} --appendonly yes --maxmemory
      256mb --maxmemory-policy allkeys-lru

      '
    healthcheck:
      test:
      - CMD
      - redis-cli
      - -a
      - ${REDIS_PASSWORD:-YOUR_REDIS_PASSWORD_HERE}
      - ping
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
    - tender-net
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tender-scraper-postgres
    restart: unless-stopped
    ports:
    - 5435:5432
    environment:
    - POSTGRES_USER=${DB_USER:-root}
    - POSTGRES_PASSWORD=${DB_PASSWORD}
    - POSTGRES_DB=${DB_NAME:-tender_scraper}
    - POSTGRES_INITDB_ARGS=--encoding=UTF8
    volumes:
    - postgres-data:/var/lib/postgresql/data
    - ./scripts/init_vectors.sql:/docker-entrypoint-initdb.d/03-vectors.sql:ro
    - ./scripts/init_harvest.sql:/docker-entrypoint-initdb.d/04-harvest.sql:ro
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${DB_USER:-root} -d ${DB_NAME:-tender_scraper}
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - tender-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: tender-scraper-web
    restart: unless-stopped
    ports:
    - 8889:8000
    environment:
    - TZ=Asia/Shanghai
    - HOST=0.0.0.0
    - PORT=8000
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    - DB_HOST=postgres
    - DB_PORT=5432
    - DATABASE_URL=postgresql://${DB_USER:-root}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-tender_scraper}
    - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    - PROJECTS_CACHE_TTL=300
    - INTERNAL_CACHE_CLEAR_KEY=cache_clear_10dc6901049c3c860fdbded525024a06
    - WEB_URL=http://tender-scraper-web:8000
    - RAGFLOW_MCP_URL=http://host.docker.internal:9382
    - RAGFLOW_API_KEY=${RAGFLOW_API_KEY:-YOUR_RAGFLOW_API_KEY_HERE}
    - RAGFLOW_BASE_URL=http://host.docker.internal:8088
    - VLLM_EMBEDDING_URL=http://host.docker.internal:8000/v1/embeddings
    - EMBEDDING_MODEL=Qwen/Qwen3-Embedding-4B
    - MINIMAX_API_KEY=${MINIMAX_API_KEY:-tp-c3haossx7ac16crmb0s9uql5otylg3kxlz2tsnmrmlajjbfz}
    - MINIMAX_BASE_URL=https://api.minimax.chat/v1
    - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-team}
    - VECTOR_STORE_BACKEND=pgvector
    extra_hosts:
    - host.docker.internal:host-gateway
    volumes:
    - ./config:/app/config
    - ./output:/app/output
    - scraper-data:/app/data
    - logs-data:/app/logs
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: '5'
        labels: service,app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import redis; r=redis.from_url('redis://:CHANGE_ME_redis_password@redis:6379/0'); r.ping(); exit(0)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
    - tender-net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: tender-scraper-prometheus
    restart: unless-stopped
    ports:
    - 9090:9090
    volumes:
    - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
    - prometheus-data:/prometheus
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --storage.tsdb.retention.time=15d
    - --web.console.libraries=/usr/share/prometheus/console_libraries
    - --web.console.templates=/usr/share/prometheus/consoles
    - --web.enable-lifecycle
    networks:
    - tender-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
  grafana:
    image: grafana/grafana:10.4.0
    container_name: tender-scraper-grafana
    restart: unless-stopped
    ports:
    - 3030:3000
    environment:
    - GF_SECURITY_ADMIN_USER=admin
    - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    - GF_USERS_ALLOW_SIGN_UP=false
    - GF_SERVER_ROOT_URL=http://localhost:3030
    - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
    - grafana-data:/var/lib/grafana
    - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
    - tender-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: tender-scraper-scheduler
    restart: unless-stopped
    command:
    - python
    - -m
    - app.scheduler
    environment:
    - TZ=Asia/Shanghai
    - HOST=0.0.0.0
    - PORT=8000
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    - DB_HOST=postgres
    - DB_PORT=5432
    - DATABASE_URL=postgresql://${DB_USER:-root}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-tender_scraper}
    - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    - PROJECTS_CACHE_TTL=300
    - INTERNAL_CACHE_CLEAR_KEY=cache_clear_10dc6901049c3c860fdbded525024a06
    - WEB_URL=http://tender-scraper-web:8000
    - RAGFLOW_MCP_URL=http://host.docker.internal:9382
    - RAGFLOW_API_KEY=${RAGFLOW_API_KEY:-YOUR_RAGFLOW_API_KEY_HERE}
    - RAGFLOW_BASE_URL=http://host.docker.internal:8088
    - VLLM_EMBEDDING_URL=http://host.docker.internal:8000/v1/embeddings
    - EMBEDDING_MODEL=Qwen/Qwen3-Embedding-4B
    - MINIMAX_API_KEY=${MINIMAX_API_KEY:-tp-c3haossx7ac16crmb0s9uql5otylg3kxlz2tsnmrmlajjbfz}
    - MINIMAX_BASE_URL=https://api.minimax.chat/v1
    - VECTOR_STORE_BACKEND=pgvector
    extra_hosts:
    - host.docker.internal:host-gateway
    volumes:
    - ./output:/app/output
    - scraper-data:/app/data
    - logs-data:/app/logs
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: '5'
        labels: service,app
    networks:
    - tender-net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import redis; r=redis.from_url('redis://:${REDIS_PASSWORD}@redis:6379/0'); r.ping(); exit(0)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── 采集 Worker ────────────────────────────────────────────
  collector:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: tender-scraper-collector
    restart: unless-stopped
    command: ["python", "-m", "app.workers.collector"]
    environment:
    - TZ=Asia/Shanghai
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    - DB_HOST=postgres
    - DB_PORT=5432
    - DATABASE_URL=postgresql://${DB_USER:-root}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-tender_scraper}
    - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    - PROJECTS_CACHE_TTL=300
    - INTERNAL_CACHE_CLEAR_KEY=cache_clear_10dc6901049c3c860fdbded525024a06
    - WEB_URL=http://tender-scraper-web:8000
    - RAGFLOW_MCP_URL=http://host.docker.internal:9382
    - RAGFLOW_API_KEY=${RAGFLOW_API_KEY:-YOUR_RAGFLOW_API_KEY_HERE}
    - RAGFLOW_BASE_URL=http://host.docker.internal:8088
    - VLLM_EMBEDDING_URL=http://host.docker.internal:8000/v1/embeddings
    - EMBEDDING_MODEL=Qwen/Qwen3-Embedding-4B
    - MINIMAX_API_KEY=${MINIMAX_API_KEY:-tp-c3haossx7ac16crmb0s9uql5otylg3kxlz2tsnmrmlajjbfz}
    - MINIMAX_BASE_URL=https://api.minimax.chat/v1
    - VECTOR_STORE_BACKEND=pgvector
    - COLLECT_CHANNEL=tender:collect:trigger
    - RESULT_CHANNEL=tender:collect:result
    extra_hosts:
    - host.docker.internal:host-gateway
    volumes:
    - ./output:/app/output
    - scraper-data:/app/data
    - logs-data:/app/logs
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "5"
    healthcheck:
      # P1-2: 优先打 /health/live (inspect collector 状态), 退化到 redis.ping()
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health/live', timeout=2)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
    - tender-net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

volumes:
  postgres-data: null
  redis-data: null
  scraper-data: null
  logs-data: null
  prometheus-data: null
  grafana-data: null
networks:
  tender-net:
    driver: bridge
