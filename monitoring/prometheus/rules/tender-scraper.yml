groups:
  - name: tender-scraper
    interval: 30s
    rules:
      # Web 服务宕机
      - alert: WebServiceDown
        expr: up{job="tender-scraper-web"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Tender Scraper Web 服务不可用"
          description: "Web API 服务已宕机超过 1 分钟"

      # HTTP 错误率过高
      - alert: HighHTTPErrorRate
        expr: |
          rate(http_requests_total{status_code=~"5.."}[5m]) 
          / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "HTTP 5xx 错误率超过 5%"
          description: "服务 {{ $labels.endpoint }} 5xx 错误率 {{ $value | humanizePercentage }}"

      # API 延迟过高
      - alert: HighAPILatency
        expr: |
          histogram_quantile(0.95, 
            rate(http_request_duration_seconds_bucket[5m])
          ) > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "API P95 延迟超过 2 秒"
          description: "{{ $labels.endpoint }} P95 = {{ $value }}s"

      # Redis 连接失败
      - alert: RedisDown
        expr: absent(container_network_receive_bytes_total{container_name="tender-scraper-redis"})
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis 缓存服务不可用"

      # PostgreSQL 连接失败
      - alert: PostgresDown
        expr: absent(container_network_receive_bytes_total{container_name="tender-scraper-postgres"})
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL 数据库服务不可用"

      # 采集任务失败率
      - alert: HighHarvestFailureRate
        expr: |
          rate(harvest_tasks_total{status="failure"}[10m])
          / rate(harvest_tasks_total[10m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "采集任务失败率超过 10%"
          description: "来源 {{ $labels.source }} 失败率 {{ $value | humanizePercentage }}"

      # 资质过期告警
      - alert: QualificationExpired
        expr: qualification_days_until_expiry <= 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "资质已过期"
          description: "{{ $labels.qualification_name }} (证书号: {{ $labels.certificate_no }}) 已过期"

      # 资质7天内到期
      - alert: QualificationExpiringSoon
        expr: qualification_days_until_expiry > 0 and qualification_days_until_expiry <= 7
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "资质即将到期"
          description: "{{ $labels.qualification_name }} 将在 {{ $value }} 天后到期"
