# PostgreSQL Exporter 查询配置
# 参考: https://prometheus.io/docs/instrumenting/exporters/

pg_stat_database:
  query: |
    SELECT
      datname,
      numbackfill AS backfill,
      blks_hit AS blks_hit,
      blks_read AS blks_read,
      conflig AS confligt,
      deadlocks,
      tup_deleted AS tup_del,
      tup_fetched AS tup_fetch,
      tup_inserted AS tup_ins,
      tup_returned AS tup_return,
      tup_updated AS tup_upd,
      xact_commit AS xact_commit,
      xact_rollback AS xact_rollback
    FROM pg_stat_database
    WHERE datname NOT IN ('template0', 'template1', 'postgres')
  metrics:
    - datname:
        usage: "LABEL"
    - backfill:
        usage: "GAUGE"
    - blks_hit:
        usage: "COUNTER"
    - blks_read:
        usage: "COUNTER"
    - confligt:
        usage: "COUNTER"
    - deadlocks:
        usage: "COUNTER"
    - tup_del:
        usage: "COUNTER"
    - tup_fetch:
        usage: "COUNTER"
    - tup_ins:
        usage: "COUNTER"
    - tup_return:
        usage: "COUNTER"
    - tup_upd:
        usage: "COUNTER"
    - xact_commit:
        usage: "COUNTER"
    - xact_rollback:
        usage: "COUNTER"

pg_stat_activity:
  query: |
    SELECT
      state,
      COUNT(*) AS num_conns
    FROM pg_stat_activity
    WHERE datname IS NOT NULL
    GROUP BY state
  metrics:
    - state:
        usage: "LABEL"
    - num_conns:
        usage: "GAUGE"

pg_database:
  query: |
    SELECT
      datname,
      pg_database_size(datname) AS size_bytes
    FROM pg_database
    WHERE datname NOT IN ('template0', 'template1')
  metrics:
    - datname:
        usage: "LABEL"
    - size_bytes:
        usage: "GAUGE"
